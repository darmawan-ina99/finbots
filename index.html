<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KeuanganBot · Chat & Catat Otomatis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0B0F17;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #FFFFFF;
        }

        .app {
            max-width: 420px;
            width: 100%;
            height: 100vh;
            background: #0B0F17;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px 6px;
            font-size: 14px;
            font-weight: 500;
            color: #CBD5E1;
            background: #0B0F17;
        }

        /* Main Content Scroll */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 80px;
            scrollbar-width: thin;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            background: #11141F;
            border-top: 1px solid #1E293B;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 16px 20px;
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: #7E8A98;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item.active {
            color: #22C55E;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* Chat Screen */
        .chat-area {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 180px);
        }

        .chat-messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: fadeInUp 0.25s ease;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            background: #1E293B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .message-bubble {
            background: #111827;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #1E293B;
            white-space: pre-line;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #22C55E, #16A34A);
            color: #052E16;
            border: none;
            font-weight: 500;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.5;
        }

        .quick-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0 12px;
        }

        .quick-chip {
            background: #111827;
            border: 1px solid #1E293B;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            color: #94A3B8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-chip:active {
            background: #22C55E20;
            border-color: #22C55E;
            color: #22C55E;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            background: #111827;
            border-radius: 32px;
            padding: 5px 5px 5px 18px;
            border: 1px solid #1E293B;
            transition: border-color 0.2s;
        }

        .chat-input-wrapper:focus-within {
            border-color: #22C55E;
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        .chat-input::placeholder {
            color: #4B5563;
        }

        .chat-send {
            background: #22C55E;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .chat-send:active {
            transform: scale(0.92);
        }

        /* Dashboard Cards */
        .card-balance {
            background: linear-gradient(145deg, #111827, #0F172A);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(34,197,94,0.15);
        }

        .balance-label {
            font-size: 12px;
            color: #94A3B8;
            margin-bottom: 6px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 18px;
        }

        .stats-row {
            display: flex;
            gap: 12px;
        }

        .stat-card {
            flex: 1;
            background: rgba(34,197,94,0.08);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(34,197,94,0.2);
        }

        .stat-card.expense {
            background: rgba(239,68,68,0.08);
            border-color: rgba(239,68,68,0.2);
        }

        .stat-label {
            font-size: 11px;
            color: #94A3B8;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 4px;
            color: #22C55E;
        }

        .stat-card.expense .stat-value {
            color: #EF4444;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            margin: 12px 0 12px;
        }

        .section-title {
            font-weight: 600;
            font-size: 16px;
        }

        .chart-card {
            background: #111827;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #1E293B;
        }

        .chart-wrapper {
            position: relative;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-height: 160px;
        }

        .legend-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            background: #0F172A;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .summary-card {
            background: #111827;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1E293B;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1E293B;
        }

        .green {
            color: #22C55E;
            font-weight: 600;
        }

        .red {
            color: #EF4444;
            font-weight: 600;
        }

        /* Riwayat */
        .transaction-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #1E293B;
        }

        .transaction-icon {
            width: 42px;
            height: 42px;
            background: #1E293B;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .transaction-detail {
            flex: 1;
        }

        .transaction-name {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .transaction-meta {
            font-size: 11px;
            color: #7E8A98;
        }

        .transaction-amount {
            font-weight: 700;
        }

        .income-text {
            color: #22C55E;
        }

        .expense-text {
            color: #EF4444;
        }

        /* profil sederhana */
        .profile-card {
            background: #111827;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #1E293B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 12px;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #22C55E;
            color: #052E16;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="status-bar">
        <span id="liveTime">09:30</span>
        <span>📶 🔋</span>
    </div>

    <div class="main-content" id="mainContent"></div>

    <div class="bottom-nav">
        <button class="nav-item" data-nav="chat">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Chat</span>
        </button>
        <button class="nav-item active" data-nav="dashboard">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Dashboard</span>
        </button>
        <button class="nav-item" data-nav="riwayat">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Riwayat</span>
        </button>
        <button class="nav-item" data-nav="profil">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profil</span>
        </button>
    </div>
</div>

<div id="toastMsg" class="toast">✓ Tersimpan</div>

<script>
    // ---------- DATA (OFFLINE) ----------
    let transactions = JSON.parse(localStorage.getItem('keuangan_bot_data')) || [
        { id: 1, type: 'income', amount: 5000000, category: 'gaji', desc: 'Gaji Pokok', date: new Date(Date.now() - 86400000).toISOString(), icon: '💼' },
        { id: 2, type: 'expense', amount: 25000, category: 'makanan', desc: 'Ayam Goreng', date: new Date(Date.now() - 7200000).toISOString(), icon: '🍗' },
        { id: 3, type: 'expense', amount: 15000, category: 'minuman', desc: 'Es Teh', date: new Date(Date.now() - 10800000).toISOString(), icon: '🧋' },
        { id: 4, type: 'expense', amount: 40000, category: 'transport', desc: 'Gojek', date: new Date(Date.now() - 14400000).toISOString(), icon: '🚗' }
    ];

    const categoryMap = {
        income: [
            { name: 'gaji', label: 'Gaji', icon: '💼' },
            { name: 'bonus', label: 'Bonus', icon: '🎁' },
            { name: 'jualan', label: 'Jualan', icon: '🛒' },
            { name: 'lainnya', label: 'Lainnya', icon: '💰' }
        ],
        expense: [
            { name: 'makanan', label: 'Makanan', icon: '🍗' },
            { name: 'minuman', label: 'Minuman', icon: '🧋' },
            { name: 'transport', label: 'Transport', icon: '🚗' },
            { name: 'belanja', label: 'Belanja', icon: '🛍️' },
            { name: 'hiburan', label: 'Hiburan', icon: '🎬' },
            { name: 'rokok', label: 'Rokok', icon: '🚬' },
            { name: 'kopi', label: 'Kopi', icon: '☕' },
            { name: 'lainnya', label: 'Lainnya', icon: '📦' }
        ]
    };

    let currentScreen = 'dashboard';
    let chartInstance = null;
    let chatHistory = []; // untuk tampilan chat

    // helpers
    function formatRupiah(amount) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
    }

    function formatShortRupiah(amount) {
        if (amount >= 1e6) return 'Rp' + (amount / 1e6).toFixed(1) + 'jt';
        if (amount >= 1e3) return 'Rp' + (amount / 1e3).toFixed(0) + 'rb';
        return 'Rp' + amount;
    }

    function getRelativeTime(dateStr) {
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'baru saja';
        if (mins < 60) return mins + ' menit lalu';
        const hours = Math.floor(mins / 60);
        if (hours < 24) return hours + ' jam lalu';
        return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
    }

    function saveToLocal() {
        localStorage.setItem('keuangan_bot_data', JSON.stringify(transactions));
    }

    function getSummary() {
        let income = 0, expense = 0;
        transactions.forEach(t => {
            if (t.type === 'income') income += t.amount;
            else expense += t.amount;
        });
        return { income, expense, balance: income - expense };
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#EF4444' : '#22C55E';
        toast.style.color = isError ? '#FFF' : '#052E16';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ================== PARSING CHAT OTOMATIS ==================
    function parseTransactionFromText(text) {
        const lower = text.toLowerCase();
        // Cek apakah hanya perintah lihat
        if (lower.includes('saldo') || lower.includes('dashboard') || lower.includes('ringkasan')) {
            return { command: 'summary' };
        }
        if (lower.includes('riwayat') || lower.includes('transaksi terakhir')) {
            return { command: 'history' };
        }

        // Ekstrak nominal
        const amountMatch = text.match(/(\d+(?:[.,]\d+)?)\s*(rb|ribu|k|jt|juta)?/i);
        if (!amountMatch) return null;

        let amount = parseFloat(amountMatch[1].replace(',', '.'));
        const unit = (amountMatch[2] || '').toLowerCase();
        if (unit === 'rb' || unit === 'ribu' || unit === 'k') amount *= 1000;
        if (unit === 'jt' || unit === 'juta') amount *= 1000000;
        if (isNaN(amount) || amount <= 0) return null;

        // Tentukan tipe (pemasukan/pengeluaran) berdasarkan kata kunci
        let type = 'expense';
        const incomeKeywords = ['gaji', 'gajian', 'bonus', 'terima', 'masuk', 'jual', 'jualan', 'pendapatan', 'thr'];
        if (incomeKeywords.some(k => lower.includes(k))) type = 'income';

        // Ambil deskripsi: hilangkan angka dan unit
        let desc = text.replace(amountMatch[0], '').trim();
        desc = desc.replace(/^(beli|bayar|makan|minum|ngopi|transport|gojek|grab|ojol|bensin)/i, '').trim();
        if (!desc) desc = type === 'income' ? 'Pemasukan' : 'Pengeluaran';
        desc = desc.slice(0, 40);

        // Klasifikasi kategori otomatis
        let category = 'lainnya';
        if (type === 'expense') {
            if (lower.includes('makan') || lower.includes('ayam') || lower.includes('nasi') || lower.includes('bakso') || lower.includes('soto')) category = 'makanan';
            else if (lower.includes('minum') || lower.includes('teh') || lower.includes('kopi') || lower.includes('es') || lower.includes('jus')) category = 'minuman';
            else if (lower.includes('rokok') || lower.includes('surya') || lower.includes('gudang')) category = 'rokok';
            else if (lower.includes('kopi')) category = 'kopi';
            else if (lower.includes('transport') || lower.includes('bensin') || lower.includes('ojek') || lower.includes('gojek') || lower.includes('grab') || lower.includes('taksi')) category = 'transport';
            else if (lower.includes('belanja') || lower.includes('pasar') || lower.includes('supermarket')) category = 'belanja';
            else if (lower.includes('nonton') || lower.includes('film') || lower.includes('game')) category = 'hiburan';
        } else {
            if (lower.includes('gaji') || lower.includes('gajian')) category = 'gaji';
            else if (lower.includes('bonus') || lower.includes('thr')) category = 'bonus';
            else if (lower.includes('jual')) category = 'jualan';
        }

        const catList = categoryMap[type];
        const catObj = catList.find(c => c.name === category) || catList[catList.length - 1];

        return {
            command: 'add',
            type,
            amount,
            category,
            desc,
            icon: catObj.icon
        };
    }

    // Fungsi untuk menambah transaksi dari chat
    function addTransactionFromChat(parsed) {
        const newTx = {
            id: Date.now(),
            type: parsed.type,
            amount: parsed.amount,
            category: parsed.category,
            desc: parsed.desc,
            date: new Date().toISOString(),
            icon: parsed.icon
        };
        transactions.push(newTx);
        saveToLocal();
        const typeLabel = parsed.type === 'income' ? 'Pemasukan' : 'Pengeluaran';
        showToast(`${typeLabel} ${formatRupiah(parsed.amount)} untuk ${parsed.desc}`);
        return newTx;
    }

    // =============== RENDER CHAT (dengan history) ===============
    function renderChat() {
        const welcomeHtml = chatHistory.length === 0
            ? `<div class="message bot"><div class="message-avatar">🤖</div><div class="message-bubble">👋 Halo! Aku Bot Keuangan.<br><br>✍️ <b>Cukup ketik transaksi seperti ngobrol:</b><br>• "beli ayam goreng 25rb"<br>• "gajian 5jt"<br>• "bensin 20rb"<br><br>📊 Atau ketik "saldo" / "riwayat"<br><br>Semua data tersimpan offline.</div></div>`
            : '';

        const messagesHtml = chatHistory.map(msg => `
            <div class="message ${msg.role}">
                <div class="message-avatar">${msg.role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-bubble">${msg.text}<div class="message-time">${msg.time}</div></div>
            </div>
        `).join('');

        const html = `
            <div class="chat-area">
                <div class="chat-messages" id="chatMessagesList">
                    ${welcomeHtml}
                    ${messagesHtml}
                </div>
                <div class="quick-chips">
                    <div class="quick-chip" data-msg="saldo saya">💰 Cek Saldo</div>
                    <div class="quick-chip" data-msg="riwayat transaksi">📋 Riwayat</div>
                    <div class="quick-chip" data-msg="beli ayam geprek 25rb">🍗 Ayam 25rb</div>
                    <div class="quick-chip" data-msg="gajian 4.5jt">💼 Gaji 4.5jt</div>
                    <div class="quick-chip" data-msg="kopi susu 18rb">☕ Kopi 18rb</div>
                </div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chatInputField" class="chat-input" placeholder="Ketik transaksi di sini..." autocomplete="off">
                    <button id="chatSendBtn" class="chat-send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;

        // Scroll ke bawah
        setTimeout(() => {
            const msgDiv = document.getElementById('chatMessagesList');
            if (msgDiv) msgDiv.scrollTop = msgDiv.scrollHeight;
        }, 50);

        document.getElementById('chatSendBtn')?.addEventListener('click', () => sendChatMessage());
        document.getElementById('chatInputField')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
        document.querySelectorAll('.quick-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const input = document.getElementById('chatInputField');
                if (input) {
                    input.value = chip.dataset.msg;
                    sendChatMessage();
                }
            });
        });
    }

    function addChatMessage(role, text) {
        chatHistory.push({
            role,
            text,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        // batasi history supaya tidak terlalu panjang
        if (chatHistory.length > 60) chatHistory = chatHistory.slice(-50);
    }

    async function sendChatMessage() {
        const input = document.getElementById('chatInputField');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';

        // Tampilkan pesan user
        addChatMessage('user', msg);
        renderChat();

        // Simulasi mikir sebentar
        setTimeout(() => {
            const parsed = parseTransactionFromText(msg);
            let botReply = '';

            if (!parsed) {
                botReply = '😅 Maaf, aku tidak menemukan nominal. Contoh: "beli nasi 15rb" atau "gaji 5jt"';
                addChatMessage('bot', botReply);
                renderChat();
                return;
            }

            if (parsed.command === 'summary') {
                const s = getSummary();
                botReply = `📊 *Ringkasan Keuangan*\n\n💵 Pemasukan: ${formatRupiah(s.income)}\n💸 Pengeluaran: ${formatRupiah(s.expense)}\n💰 Saldo: ${formatRupiah(s.balance)}`;
                addChatMessage('bot', botReply);
                renderChat();
                return;
            }

            if (parsed.command === 'history') {
                const last5 = [...transactions].reverse().slice(0, 5);
                if (last5.length === 0) {
                    botReply = 'Belum ada transaksi tercatat. Mulai dengan mengetik transaksi ya!';
                } else {
                    botReply = '📋 *5 Transaksi Terakhir:*\n\n' + last5.map(t => `${t.icon} ${t.desc} : ${t.type === 'income' ? '+' : '-'} ${formatRupiah(t.amount)}`).join('\n');
                }
                addChatMessage('bot', botReply);
                renderChat();
                return;
            }

            if (parsed.command === 'add') {
                const newTx = addTransactionFromChat(parsed);
                const s = getSummary();
                botReply = `✅ *Tersimpan!*\n${parsed.type === 'income' ? '➕ Pemasukan' : '➖ Pengeluaran'} ${formatRupiah(parsed.amount)} untuk *${parsed.desc}*\n\n💳 Saldo terbaru: ${formatRupiah(s.balance)}`;
                addChatMessage('bot', botReply);
                renderChat();

                // Jika dashboard sedang aktif, refresh
                if (currentScreen === 'dashboard') renderDashboard();
                if (currentScreen === 'riwayat') renderRiwayat();
                return;
            }

            botReply = 'Aku belum paham. Coba format seperti "beli bakso 20rb" atau "gaji 5jt"';
            addChatMessage('bot', botReply);
            renderChat();
        }, 300);
    }

    // =============== DASHBOARD ===============
    function renderDashboard() {
        const s = getSummary();
        const recent = transactions.slice(-3).reverse();
        let recentHtml = '';
        recent.forEach(t => {
            recentHtml += `
                <div class="transaction-item">
                    <div class="transaction-icon">${t.icon}</div>
                    <div class="transaction-detail">
                        <div class="transaction-name">${t.desc}</div>
                        <div class="transaction-meta">${getRelativeTime(t.date)}</div>
                    </div>
                    <div class="transaction-amount ${t.type === 'income' ? 'income-text' : 'expense-text'}">
                        ${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount)}
                    </div>
                </div>
            `;
        });

        const html = `
            <div class="card-balance">
                <div class="balance-label">Saldo Tersedia</div>
                <div class="balance-amount">${formatRupiah(s.balance)}</div>
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div>
                    <div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div>
                </div>
            </div>

            <div class="section-header"><div class="section-title">📊 Grafik Pengeluaran</div></div>
            <div class="chart-card">
                <div class="chart-wrapper"><canvas id="expenseChartCanvas"></canvas></div>
                <div id="legendContainer" class="legend-list"></div>
            </div>

            <div class="summary-card">
                <div class="section-title">Ringkasan</div>
                <div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div>
                <div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div>
                <div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div>
            </div>

            <div class="section-header"><div class="section-title">🕒 Transaksi Terbaru</div></div>
            <div class="tx-list" style="background:#111827; border-radius:24px; padding:0 16px; border:1px solid #1E293B;">
                ${recentHtml || '<div style="padding: 24px; text-align:center; color:#6B7280;">Belum ada transaksi</div>'}
            </div>

            <div style="margin-top: 20px; text-align:center; background:#0F172A; padding:12px; border-radius:24px;">
                🔒 100% Offline · Data hanya di perangkatmu
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;

        setTimeout(() => {
            const ctx = document.getElementById('expenseChartCanvas')?.getContext('2d');
            if (!ctx) return;
            const expenses = transactions.filter(t => t.type === 'expense');
            const catTotals = {};
            expenses.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });
            const labels = Object.keys(catTotals);
            const data = Object.values(catTotals);
            const colors = ['#22C55E','#EF4444','#F59E0B','#8B5CF6','#3B82F6','#EC4899','#14B8A6','#F97316'];
            if (chartInstance) chartInstance.destroy();
            if (labels.length) {
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: true, cutout: '65%', plugins: { legend: { display: false } } }
                });
                const legendHtml = labels.map((l, i) => `<div class="legend-item"><div class="legend-dot" style="background:${colors[i % colors.length]}; width:10px; height:10px; border-radius:10px;"></div>${l} ${formatShortRupiah(data[i])}</div>`).join('');
                document.getElementById('legendContainer').innerHTML = legendHtml;
            } else {
                document.getElementById('legendContainer').innerHTML = '<div style="color:#6B7280;">Belum ada pengeluaran</div>';
            }
        }, 50);
    }

    // =============== RIWAYAT ===============
    function renderRiwayat() {
        const s = getSummary();
        const reversed = [...transactions].reverse();
        let itemsHtml = '';
        reversed.forEach(t => {
            itemsHtml += `
                <div class="transaction-item">
                    <div class="transaction-icon">${t.icon}</div>
                    <div class="transaction-detail">
                        <div class="transaction-name">${t.desc}</div>
                        <div class="transaction-meta">${getRelativeTime(t.date)} · ${t.category}</div>
                    </div>
                    <div class="transaction-amount ${t.type === 'income' ? 'income-text' : 'expense-text'}">
                        ${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount)}
                    </div>
                </div>
            `;
        });
        if (!transactions.length) itemsHtml = '<div style="padding:32px; text-align:center; color:#6B7280;">Belum ada transaksi. Coba chat untuk mencatat!</div>';

        const html = `
            <div class="stats-row" style="margin-bottom:16px">
                <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div>
                <div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div>
            </div>
            <div class="tx-list" style="background:#111827; border-radius:24px; padding:0 16px; border:1px solid #1E293B;">
                ${itemsHtml}
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    // =============== PROFIL ===============
    function renderProfil() {
        const s = getSummary();
        const totalTx = transactions.length;
        const incomeCount = transactions.filter(t => t.type === 'income').length;
        const expenseCount = totalTx - incomeCount;
        const html = `
            <div class="profile-card">
                <div class="profile-avatar">🐣</div>
                <div style="font-size:18px; font-weight:700;">Bot Keuangan</div>
                <div style="color:#7E8A98; font-size:12px;">Offline · 100% Privat</div>
                <div class="stats-row" style="margin-top: 20px;">
                    <div class="stat-card"><div class="stat-label">Transaksi</div><div class="stat-value">${totalTx}</div></div>
                    <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value" style="color:#22C55E">${incomeCount}</div></div>
                    <div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value" style="color:#EF4444">${expenseCount}</div></div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div>
                <div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div>
                <div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div>
            </div>
            <button id="resetDataBtn" style="width:100%; background:#EF4444; border:none; padding:14px; border-radius:40px; color:white; font-weight:600; margin-top:8px;">Hapus Semua Data</button>
            <button id="exportBtn" style="width:100%; background:#1E293B; border:1px solid #2D3A4E; padding:14px; border-radius:40px; color:#CBD5E1; margin-top:12px;">Ekspor ke JSON</button>
        `;
        document.getElementById('mainContent').innerHTML = html;

        document.getElementById('resetDataBtn')?.addEventListener('click', () => {
            if (confirm('Hapus semua transaksi? Data akan hilang permanen.')) {
                transactions = [];
                chatHistory = [];
                saveToLocal();
                showToast('Semua data dihapus');
                if (currentScreen === 'dashboard') renderDashboard();
                else if (currentScreen === 'riwayat') renderRiwayat();
                else renderProfil();
            }
        });
        document.getElementById('exportBtn')?.addEventListener('click', () => {
            const blob = new Blob([JSON.stringify(transactions, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `finansbot_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data diekspor');
        });
    }

    // =============== NAVIGASI ===============
    function switchScreen(screen) {
        currentScreen = screen;
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-nav="${screen}"]`);
        if (activeNav) activeNav.classList.add('active');

        if (screen === 'chat') renderChat();
        else if (screen === 'dashboard') renderDashboard();
        else if (screen === 'riwayat') renderRiwayat();
        else if (screen === 'profil') renderProfil();
    }

    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.addEventListener('click', () => switchScreen(nav.dataset.nav));
    });

    // update jam
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Start dengan chat sesuai keinginan basicnya chat
    switchScreen('chat');
</script>
</body>
      </html>
