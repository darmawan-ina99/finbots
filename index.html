<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinansBot · Catat Keuangan via Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0B0F17;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #FFFFFF;
        }

        .app {
            max-width: 450px;
            width: 100%;
            height: 100vh;
            background: #0B0F17;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 90px;
            scrollbar-width: thin;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 450px;
            margin: 0 auto;
            background: rgba(11, 15, 23, 0.96);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(30, 41, 59, 0.6);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 20px;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: #7E8A98;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 0;
        }

        .nav-item.active {
            color: #22C55E;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* ========= LOGIN SCREEN ========= */
        .login-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }

        .login-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 32px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(34,197,94,0.3);
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .login-title .asisten { color: #000000; }
        .login-title .keuangan { color: #22C55E; }

        .login-sub {
            font-size: 14px;
            color: #94A3B8;
            margin-bottom: 32px;
        }

        .login-input {
            width: 100%;
            background: #111827;
            border: 1px solid #1E293B;
            border-radius: 60px;
            padding: 16px 20px;
            font-size: 16px;
            color: white;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 2px;
        }

        .login-input:focus {
            border-color: #22C55E;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #22C55E, #16A34A);
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            color: #052E16;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-error {
            color: #EF4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* ========= CHAT SCREEN ala WhatsApp ========= */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 8px;
        }

        .date-separator {
            text-align: center;
            font-size: 11px;
            color: #7E8A98;
            margin: 16px 0 8px;
            position: relative;
        }
        .date-separator span {
            background: #111827;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }

        .message-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
            max-width: 90%;
            clear: both;
        }
        .message-row.bot { align-self: flex-start; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: #1E293B;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message-avatar .default-avatar { font-size: 18px; }

        .message-bubble-wrapper {
            max-width: calc(100% - 48px);
        }
        .message-bubble {
            background: #111827;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.45;
            border: 1px solid #1E293B;
            white-space: pre-line;
            word-break: break-word;
        }
        .message-row.user .message-bubble {
            background: linear-gradient(135deg, #22C55E, #16A34A);
            color: #052E16;
            border: none;
            font-weight: 500;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        .message-row.user .message-time { text-align: left; }

        .quick-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0 12px;
        }
        .quick-chip {
            background: #111827;
            border: 1px solid #1E293B;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            color: #94A3B8;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-chip:active {
            background: #22C55E20;
            border-color: #22C55E;
            color: #22C55E;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            background: #111827;
            border-radius: 32px;
            padding: 5px 5px 5px 18px;
            border: 1px solid #1E293B;
            transition: border-color 0.2s;
        }
        .chat-input-wrapper:focus-within { border-color: #22C55E; }
        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            padding: 10px 0;
        }
        .chat-input::placeholder { color: #4B5563; }
        .chat-send {
            background: #22C55E;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .chat-send:active { transform: scale(0.92); }

        /* ========= DASHBOARD ========= */
        .card-balance {
            background: linear-gradient(145deg, #111827, #0F172A);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(34,197,94,0.15);
        }
        .balance-label { font-size: 12px; color: #94A3B8; margin-bottom: 6px; }
        .balance-amount { font-size: 34px; font-weight: 800; margin-bottom: 18px; letter-spacing: -1px; }
        .stats-row { display: flex; gap: 12px; }
        .stat-card { flex: 1; background: rgba(34,197,94,0.08); padding: 12px; border-radius: 20px; border: 1px solid rgba(34,197,94,0.2); }
        .stat-card.expense { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
        .stat-label { font-size: 11px; color: #94A3B8; }
        .stat-value { font-size: 18px; font-weight: 700; margin-top: 4px; color: #22C55E; }
        .stat-card.expense .stat-value { color: #EF4444; }
        .section-header { display: flex; justify-content: space-between; margin: 12px 0 12px; }
        .section-title { font-weight: 600; font-size: 16px; }
        .chart-card { background: #111827; border-radius: 24px; padding: 16px; margin-bottom: 20px; border: 1px solid #1E293B; }
        .chart-wrapper { position: relative; height: 180px; display: flex; justify-content: center; align-items: center; }
        canvas { max-height: 160px; }
        .legend-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; background: #0F172A; padding: 4px 12px; border-radius: 30px; }
        .summary-card { background: #111827; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #1E293B; }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1E293B; }
        .green { color: #22C55E; font-weight: 600; }
        .red { color: #EF4444; font-weight: 600; }
        .greeting-box { background: #111827; border-radius: 20px; padding: 12px 16px; margin-bottom: 16px; border-left: 4px solid #22C55E; }
        .greeting-text { font-size: 14px; color: #D8E0EC; }
        .user-name { font-weight: 700; color: #22C55E; }

        /* ========= RIWAYAT ========= */
        .transaction-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1E293B; }
        .transaction-icon { width: 42px; height: 42px; background: #1E293B; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .transaction-detail { flex: 1; }
        .transaction-name { font-weight: 600; margin-bottom: 2px; }
        .transaction-meta { font-size: 11px; color: #7E8A98; }
        .transaction-amount { font-weight: 700; font-size: 14px; }
        .income-text { color: #22C55E; }
        .expense-text { color: #EF4444; }

        /* ========= PROFIL ========= */
        .profile-card { background: #111827; border-radius: 24px; padding: 24px; text-align: center; margin-bottom: 20px; }
        .profile-avatar { width: 80px; height: 80px; margin: 0 auto 12px; border-radius: 50%; overflow: hidden; background: #1E293B; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .profile-name .asisten { color: #000000; }
        .profile-name .keuangan { color: #22C55E; }
        .profile-email { color: #7E8A98; font-size: 13px; margin-bottom: 16px; }
        .name-input-group { display: flex; gap: 8px; margin: 16px 0; }
        .name-input { flex: 1; background: #1E293B; border: 1px solid #2D3A4E; border-radius: 40px; padding: 10px 16px; color: white; font-size: 14px; outline: none; }
        .name-save-btn { background: #22C55E; border: none; border-radius: 40px; padding: 10px 20px; font-weight: 600; cursor: pointer; }
        .btn-danger { width: 100%; background: #EF4444; border: none; padding: 14px; border-radius: 40px; color: white; font-weight: 600; margin-top: 12px; cursor: pointer; }
        .btn-secondary { width: 100%; background: #1E293B; border: 1px solid #2D3A4E; padding: 14px; border-radius: 40px; color: #CBD5E1; margin-top: 12px; cursor: pointer; }
        .btn-logout { width: 100%; background: #3B4252; border: none; padding: 14px; border-radius: 40px; color: white; font-weight: 600; margin-top: 12px; cursor: pointer; }

        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #22C55E; color: #052E16; padding: 8px 20px; border-radius: 40px; font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="app">
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-logo"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Logo"></div>
        <div class="login-title"><span class="asisten">Asisten</span> <span class="keuangan">Keuangan</span></div>
        <div class="login-sub">Catat keuangan semudah chat</div>
        <input type="password" id="passwordInput" class="login-input" placeholder="Masukkan password" autocomplete="off">
        <button id="loginBtn" class="login-btn">MASUK</button>
        <div id="loginError" class="login-error">Password salah! Coba "abc123"</div>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display: none; flex: 1; display: flex; flex-direction: column; height: 100%;">
        <div class="main-content" id="mainContent"></div>
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-item" data-nav="chat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></button>
            <button class="nav-item" data-nav="dashboard"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard</span></button>
            <button class="nav-item" data-nav="riwayat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Riwayat</span></button>
            <button class="nav-item" data-nav="profil"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profil</span></button>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast">✓ Tersimpan</div>

<script>
    // ========== DATA STORE (OFFLINE) ==========
    let transactions = JSON.parse(localStorage.getItem('finansbot_clean_data')) || [
        { id: 1, type: 'income', amount: 5000000, category: 'gaji', desc: 'Gaji Pokok', date: new Date(Date.now() - 86400000).toISOString(), icon: '💼' },
        { id: 2, type: 'expense', amount: 25000, category: 'makanan', desc: 'Ayam Goreng', date: new Date(Date.now() - 7200000).toISOString(), icon: '🍗' },
        { id: 3, type: 'expense', amount: 15000, category: 'minuman', desc: 'Es Teh', date: new Date(Date.now() - 10800000).toISOString(), icon: '🧋' },
        { id: 4, type: 'expense', amount: 40000, category: 'transport', desc: 'Gojek', date: new Date(Date.now() - 14400000).toISOString(), icon: '🚗' }
    ];

    let userName = localStorage.getItem('finansbot_user_name') || 'Pengguna';

    const categoryMap = {
        income: [{ name: 'gaji', label: 'Gaji', icon: '💼' }, { name: 'bonus', label: 'Bonus', icon: '🎁' }, { name: 'jualan', label: 'Jualan', icon: '🛒' }, { name: 'lainnya', label: 'Lainnya', icon: '💰' }],
        expense: [{ name: 'makanan', label: 'Makanan', icon: '🍗' }, { name: 'minuman', label: 'Minuman', icon: '🧋' }, { name: 'transport', label: 'Transport', icon: '🚗' }, { name: 'belanja', label: 'Belanja', icon: '🛍️' }, { name: 'hiburan', label: 'Hiburan', icon: '🎬' }, { name: 'rokok', label: 'Rokok', icon: '🚬' }, { name: 'kopi', label: 'Kopi', icon: '☕' }, { name: 'lainnya', label: 'Lainnya', icon: '📦' }]
    };

    let currentScreen = 'chat';
    let chartInstance = null;
    let chatHistory = [];
    let isLoggedIn = false;

    // helpers
    function formatRupiah(amount) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount); }
    function formatShortRupiah(amount) { if (amount >= 1e6) return 'Rp' + (amount/1e6).toFixed(1)+'jt'; if (amount>=1e3) return 'Rp'+(amount/1e3).toFixed(0)+'rb'; return 'Rp'+amount; }
    function getRelativeTime(dateStr) { const diff = Date.now() - new Date(dateStr).getTime(); const mins = Math.floor(diff/60000); if(mins<1) return 'baru saja'; if(mins<60) return mins+' menit lalu'; const hrs = Math.floor(mins/60); if(hrs<24) return hrs+' jam lalu'; return new Date(dateStr).toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }
    function saveToLocal() { localStorage.setItem('finansbot_clean_data', JSON.stringify(transactions)); localStorage.setItem('finansbot_user_name', userName); }
    function getSummary() { let income=0,expense=0; transactions.forEach(t=>{ if(t.type==='income') income+=t.amount; else expense+=t.amount; }); return {income,expense,balance:income-expense}; }
    function showToast(msg,isError=false){ const toast=document.getElementById('toastMsg'); toast.textContent=msg; toast.style.background=isError?'#EF4444':'#22C55E'; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2000); }

    // Sapaan berdasarkan jam
    function getGreeting() {
        const hour = new Date().getHours();
        if (hour < 12) return 'Selamat pagi';
        if (hour < 15) return 'Selamat siang';
        if (hour < 19) return 'Selamat sore';
        return 'Selamat malam';
    }

    // ========== PARSING CHAT dengan keyword kustom ==========
    function parseTransactionFromText(text) {
        const lower = text.toLowerCase();

        if (lower.includes('saldo') || lower.includes('dashboard') || lower.includes('ringkasan')) return { command: 'summary' };
        if (lower.includes('riwayat') || lower.includes('transaksi terakhir') || lower.includes('history')) return { command: 'history' };

        const amountMatch = text.match(/(\d+(?:[.,]\d+)?)\s*(rb|ribu|k|jt|juta)?/i);
        if (!amountMatch) return null;

        let amount = parseFloat(amountMatch[1].replace(',', '.'));
        const unit = (amountMatch[2] || '').toLowerCase();
        if (unit === 'rb' || unit === 'ribu' || unit === 'k') amount *= 1000;
        if (unit === 'jt' || unit === 'juta') amount *= 1000000;
        if (isNaN(amount) || amount <= 0) return null;

        // PENENTUAN TYPE BERDASARKAN KEYWORD (prioritas dari prompt)
        let type = 'expense'; // default
        const expenseKeywords = ['beli', 'bayar', 'membayar', 'bayar', 'belanja', 'keluar', 'habis'];
        const incomeKeywords = ['dapat', 'mendapat', 'bonus', 'menerima', 'pembayaran', 'terima', 'gaji', 'masuk', 'pendapatan'];

        let isExpense = expenseKeywords.some(kw => lower.includes(kw));
        let isIncome = incomeKeywords.some(kw => lower.includes(kw));

        if (isIncome && !isExpense) type = 'income';
        else if (isExpense) type = 'expense';
        else {
            // fallback: jika tidak ada keyword, cek kata umum
            if (lower.includes('gaji') || lower.includes('bonus')) type = 'income';
            else type = 'expense';
        }

        let desc = text.replace(amountMatch[0], '').trim();
        desc = desc.replace(/^(beli|bayar|membayar|dapat|mendapat|menerima|pembayaran|terima)/i, '').trim();
        if (!desc) desc = type === 'income' ? 'Pemasukan' : 'Pengeluaran';
        desc = desc.slice(0, 40);

        let category = 'lainnya';
        if (type === 'expense') {
            if (lower.includes('makan')||lower.includes('ayam')||lower.includes('nasi')) category='makanan';
            else if (lower.includes('minum')||lower.includes('teh')||lower.includes('es')) category='minuman';
            else if (lower.includes('rokok')) category='rokok';
            else if (lower.includes('kopi')) category='kopi';
            else if (lower.includes('transport')||lower.includes('bensin')||lower.includes('gojek')) category='transport';
            else if (lower.includes('belanja')) category='belanja';
            else if (lower.includes('nonton')||lower.includes('film')) category='hiburan';
        } else {
            if (lower.includes('gaji')) category='gaji';
            else if (lower.includes('bonus')) category='bonus';
            else if (lower.includes('jual')) category='jualan';
        }

        const catList = categoryMap[type];
        const catObj = catList.find(c=>c.name===category) || catList[catList.length-1];
        return { command:'add', type, amount, category, desc, icon: catObj.icon };
    }

    function addTransactionFromChat(parsed) {
        const newTx = { id: Date.now(), type: parsed.type, amount: parsed.amount, category: parsed.category, desc: parsed.desc, date: new Date().toISOString(), icon: parsed.icon };
        transactions.push(newTx);
        saveToLocal();
        return newTx;
    }

    // ========== CHAT RENDER dengan grouping tanggal ==========
    function renderChat() {
        const groups = {};
        chatHistory.forEach(msg => {
            const dateObj = msg.timestamp;
            const today = new Date(); today.setHours(0,0,0,0);
            const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
            let key;
            if (dateObj.toDateString() === today.toDateString()) key = 'Hari ini';
            else if (dateObj.toDateString() === yesterday.toDateString()) key = 'Kemarin';
            else key = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            if (!groups[key]) groups[key] = [];
            groups[key].push(msg);
        });

        let messagesHtml = '';
        for (const [dateLabel, msgs] of Object.entries(groups)) {
            messagesHtml += `<div class="date-separator"><span>${dateLabel}</span></div>`;
            msgs.forEach(msg => {
                const isBot = msg.role === 'bot';
                const avatarHtml = isBot 
                    ? `<div class="message-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="logo"></div>`
                    : `<div class="message-avatar"><div class="default-avatar">👤</div></div>`;
                messagesHtml += `
                    <div class="message-row ${msg.role}">
                        ${avatarHtml}
                        <div class="message-bubble-wrapper">
                            <div class="message-bubble">${msg.text}</div>
                            <div class="message-time">${msg.timeStr}</div>
                        </div>
                    </div>
                `;
            });
        }

        const welcomeHtml = chatHistory.length === 0 ? `
            <div class="date-separator"><span>Hari ini</span></div>
            <div class="message-row bot">
                <div class="message-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="logo"></div>
                <div class="message-bubble-wrapper">
                    <div class="message-bubble">👋 ${getGreeting()}, ${userName}!<br><br>✍️ Aku <strong>Asisten Keuangan</strong>.<br>Cukup ketik transaksi seperti:<br>• "beli ayam 25rb" (otomatis pengeluaran)<br>• "dapat bonus 500rb" (otomatis pemasukan)<br>• "bayar listrik 150rb"<br><br>📊 Ketik "saldo" atau "riwayat"</div>
                    <div class="message-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
            </div>
        ` : '';

        const html = `
            <div class="chat-area">
                <div class="chat-messages" id="chatMessagesList">
                    ${welcomeHtml}
                    ${messagesHtml}
                </div>
                <div class="quick-chips">
                    <div class="quick-chip" data-msg="saldo saya">💰 Cek Saldo</div>
                    <div class="quick-chip" data-msg="riwayat transaksi">📋 Riwayat</div>
                    <div class="quick-chip" data-msg="beli ayam geprek 25rb">🍗 Ayam 25rb</div>
                    <div class="quick-chip" data-msg="dapat bonus 500rb">🎁 Bonus 500rb</div>
                    <div class="quick-chip" data-msg="bayar listrik 150rb">💡 Listrik 150rb</div>
                </div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chatInputField" class="chat-input" placeholder="Ketik transaksi di sini..." autocomplete="off">
                    <button id="chatSendBtn" class="chat-send"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
                </div>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;

        setTimeout(() => { const msgDiv = document.getElementById('chatMessagesList'); if (msgDiv) msgDiv.scrollTop = msgDiv.scrollHeight; }, 50);
        document.getElementById('chatSendBtn')?.addEventListener('click', () => sendChatMessage());
        document.getElementById('chatInputField')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
        document.querySelectorAll('.quick-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const input = document.getElementById('chatInputField');
                if (input) { input.value = chip.dataset.msg; sendChatMessage(); }
            });
        });
    }

    function addChatMessage(role, text) {
        const now = new Date();
        chatHistory.push({ role, text, timestamp: now, timeStr: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        if (chatHistory.length > 200) chatHistory = chatHistory.slice(-150);
    }

    async function sendChatMessage() {
        const input = document.getElementById('chatInputField');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        addChatMessage('user', msg);
        renderChat();

        setTimeout(() => {
            const parsed = parseTransactionFromText(msg);
            let botReply = '';
            if (!parsed) {
                botReply = '😅 Maaf, aku tidak menemukan nominal. Contoh: "beli nasi 15rb" atau "dapat bonus 500rb"';
                addChatMessage('bot', botReply);
                renderChat();
                return;
            }
            if (parsed.command === 'summary') {
                const s = getSummary();
                botReply = `📊 *Ringkasan Keuangan ${userName}*\n\n💵 Pemasukan: ${formatRupiah(s.income)}\n💸 Pengeluaran: ${formatRupiah(s.expense)}\n💰 Saldo: ${formatRupiah(s.balance)}`;
                addChatMessage('bot', botReply);
                renderChat();
                return;
            }
            if (parsed.command === 'history') {
                const last5 = [...transactions].reverse().slice(0, 5);
                if (last5.length === 0) botReply = 'Belum ada transaksi tercatat.';
                else botReply = '📋 *5 Transaksi Terakhir:*\n\n' + last5.map(t => `${t.icon} ${t.desc} : ${t.type === 'income' ? '+' : '-'} ${formatRupiah(t.amount)}`).join('\n');
                addChatMessage('bot', botReply);
                renderChat();
                return;
            }
            if (parsed.command === 'add') {
                addTransactionFromChat(parsed);
                const s = getSummary();
                botReply = `✅ *Tersimpan!*\n${parsed.type === 'income' ? '➕ Pemasukan' : '➖ Pengeluaran'} ${formatRupiah(parsed.amount)} untuk *${parsed.desc}*\n\n💳 Saldo terbaru: ${formatRupiah(s.balance)}`;
                addChatMessage('bot', botReply);
                renderChat();
                if (currentScreen === 'dashboard') renderDashboard();
                if (currentScreen === 'riwayat') renderRiwayat();
                return;
            }
            botReply = 'Aku belum paham. Coba format seperti "beli bakso 20rb" atau "dapat bonus 500rb"';
            addChatMessage('bot', botReply);
            renderChat();
        }, 300);
    }

    // ========== DASHBOARD dengan sapaan ==========
    function renderDashboard() {
        const s = getSummary();
        const greeting = getGreeting();
        const recent = transactions.slice(-3).reverse();
        let recentHtml = '';
        recent.forEach(t => {
            recentHtml += `<div class="transaction-item"><div class="transaction-icon">${t.icon}</div><div class="transaction-detail"><div class="transaction-name">${t.desc}</div><div class="transaction-meta">${getRelativeTime(t.date)}</div></div><div class="transaction-amount ${t.type === 'income' ? 'income-text' : 'expense-text'}">${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount)}</div></div>`;
        });

        const html = `
            <div class="greeting-box">
                <div class="greeting-text">${greeting}, <span class="user-name">${userName}</span> 👋</div>
            </div>
            <div class="card-balance">
                <div class="balance-label">Saldo Tersedia</div>
                <div class="balance-amount">${formatRupiah(s.balance)}</div>
                <div class="stats-row"><div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div><div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div></div>
            </div>
            <div class="section-header"><div class="section-title">📊 Grafik Pengeluaran</div></div>
            <div class="chart-card"><div class="chart-wrapper"><canvas id="expenseChartCanvas"></canvas></div><div id="legendContainer" class="legend-list"></div></div>
            <div class="summary-card"><div class="section-title">Ringkasan</div><div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div><div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div><div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div></div>
            <div class="section-header"><div class="section-title">🕒 Transaksi Terbaru</div></div>
            <div class="tx-list" style="background:#111827; border-radius:24px; padding:0 16px; border:1px solid #1E293B;">${recentHtml || '<div style="padding:24px;text-align:center;color:#6B7280;">Belum ada transaksi</div>'}</div>
            <div style="margin-top:20px;text-align:center;background:#0F172A;padding:12px;border-radius:24px;">🔒 100% Offline · Data hanya di perangkatmu</div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        setTimeout(() => {
            const ctx = document.getElementById('expenseChartCanvas')?.getContext('2d');
            if (!ctx) return;
            const expenses = transactions.filter(t => t.type === 'expense');
            const catTotals = {};
            expenses.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });
            const labels = Object.keys(catTotals);
            const data = Object.values(catTotals);
            const colors = ['#22C55E','#EF4444','#F59E0B','#8B5CF6','#3B82F6','#EC4899','#14B8A6','#F97316'];
            if (chartInstance) chartInstance.destroy();
            if (labels.length) {
                chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: true, cutout: '65%', plugins: { legend: { display: false } } } });
                const legendHtml = labels.map((l, i) => `<div class="legend-item"><div class="legend-dot" style="background:${colors[i % colors.length]}; width:10px; height:10px; border-radius:10px;"></div>${l} ${formatShortRupiah(data[i])}</div>`).join('');
                document.getElementById('legendContainer').innerHTML = legendHtml;
            } else {
                document.getElementById('legendContainer').innerHTML = '<div style="color:#6B7280;">Belum ada pengeluaran</div>';
            }
        }, 50);
    }

    // ========== RIWAYAT ==========
    function renderRiwayat() {
        const s = getSummary();
        const reversed = [...transactions].reverse();
        let itemsHtml = '';
        reversed.forEach(t => {
            itemsHtml += `<div class="transaction-item"><div class="transaction-icon">${t.icon}</div><div class="transaction-detail"><div class="transaction-name">${t.desc}</div><div class="transaction-meta">${getRelativeTime(t.date)} · ${t.category}</div></div><div class="transaction-amount ${t.type === 'income' ? 'income-text' : 'expense-text'}">${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount)}</div></div>`;
        });
        if (!transactions.length) itemsHtml = '<div style="padding:32px;text-align:center;color:#6B7280;">Belum ada transaksi. Coba chat untuk mencatat!</div>';
        const html = `<div class="stats-row" style="margin-bottom:16px"><div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div><div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div></div><div class="tx-list" style="background:#111827; border-radius:24px; padding:0 16px; border:1px solid #1E293B;">${itemsHtml}</div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    // ========== PROFIL dengan edit nama ==========
    function renderProfil() {
        const s = getSummary();
        const totalTx = transactions.length;
        const incomeCount = transactions.filter(t => t.type === 'income').length;
        const expenseCount = totalTx - incomeCount;
        const html = `
            <div class="profile-card">
                <div class="profile-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Avatar"></div>
                <div class="profile-name"><span class="asisten">Asisten</span> <span class="keuangan">Keuangan</span></div>
                <div class="profile-email">pengguna@finansbot.id</div>
                <div class="name-input-group">
                    <input type="text" id="editNameInput" class="name-input" placeholder="Nama panggilan" value="${userName}">
                    <button id="saveNameBtn" class="name-save-btn">Simpan</button>
                </div>
                <div class="stats-row" style="margin-top: 8px;">
                    <div class="stat-card"><div class="stat-label">Transaksi</div><div class="stat-value">${totalTx}</div></div>
                    <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value" style="color:#22C55E">${incomeCount}</div></div>
                    <div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value" style="color:#EF4444">${expenseCount}</div></div>
                </div>
            </div>
            <div class="summary-card"><div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div><div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div><div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div></div>
            <button id="resetDataBtn" class="btn-danger">Hapus Semua Data</button>
            <button id="exportBtn" class="btn-secondary">Ekspor ke JSON</button>
            <button id="logoutBtn" class="btn-logout">🚪 Logout</button>
        `;
        document.getElementById('mainContent').innerHTML = html;

        document.getElementById('saveNameBtn')?.addEventListener('click', () => {
            const newName = document.getElementById('editNameInput').value.trim();
            if (newName) {
                userName = newName;
                saveToLocal();
                showToast('Nama berhasil diubah');
                if (currentScreen === 'dashboard') renderDashboard();
                else renderProfil();
            } else {
                showToast('Nama tidak boleh kosong', true);
            }
        });
        document.getElementById('resetDataBtn')?.addEventListener('click', () => {
            if (confirm('Hapus semua transaksi? Data akan hilang permanen.')) {
                transactions = [];
                chatHistory = [];
                saveToLocal();
                showToast('Semua data dihapus');
                if (currentScreen === 'dashboard') renderDashboard();
                else if (currentScreen === 'riwayat') renderRiwayat();
                else renderProfil();
            }
        });
        document.getElementById('exportBtn')?.addEventListener('click', () => {
            const blob = new Blob([JSON.stringify(transactions, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `finansbot_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data diekspor');
        });
        document.getElementById('logoutBtn')?.addEventListener('click', () => { logout(); });
    }

    // ========== NAVIGASI ==========
    function switchScreen(screen) {
        currentScreen = screen;
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-nav="${screen}"]`);
        if (activeNav) activeNav.classList.add('active');
        if (screen === 'chat') renderChat();
        else if (screen === 'dashboard') renderDashboard();
        else if (screen === 'riwayat') renderRiwayat();
        else if (screen === 'profil') renderProfil();
    }

    // ========== LOGIN / LOGOUT ==========
    function login(password) {
        if (password === 'abc123') {
            isLoggedIn = true;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            currentScreen = 'chat';
            switchScreen('chat');
            showToast(`Login berhasil! ${getGreeting()}, ${userName}`);
        } else {
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 2000);
        }
    }
    function logout() {
        isLoggedIn = false;
        chatHistory = [];
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        showToast('Anda telah logout', true);
    }

    document.getElementById('loginBtn').addEventListener('click', () => { login(document.getElementById('passwordInput').value); });
    document.getElementById('passwordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(e.target.value); });
    document.querySelectorAll('.nav-item').forEach(nav => { nav.addEventListener('click', () => { if (isLoggedIn) switchScreen(nav.dataset.nav); }); });

    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
</script>
</body>
  </html>
