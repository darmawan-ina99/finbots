<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#03060c" id="themeColorMeta">
    <title>Asisten Finance Pro · Ekstrak Total Struk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* ========== CSS SAMA SEPERTI SEBELUMNYA (tidak diubah agar tidak terlalu panjang) ========== */
        :root { --bg:#03060c; --bg-app:rgba(8,12,20,.78); --fg:#f1f5f9; --muted:#64748b; --accent:#00dc82; --accent-dim:rgba(0,220,130,.15); --accent-glow:rgba(0,220,130,.35); --card:rgba(15,20,32,.75); --card-solid:#111827; --border:rgba(0,220,130,.18); --danger:#f43f5e; --danger-dim:rgba(244,63,94,.15); --info:#38bdf8; --warning:#f59e0b; --header-bg:rgba(12,16,28,.7); --input-bg:rgba(17,24,39,.7); --toast-bg:rgba(0,220,130,.9); --toast-error:rgba(244,63,94,.9); --modal-bg:#111827; --chart-text:#cbd5e1; --insight-bg:rgba(56,189,248,.1); }
        body.light { --bg:#f0f4f8; --bg-app:rgba(245,248,250,.85); --fg:#1e293b; --muted:#5b6e8c; --accent:#059669; --accent-dim:rgba(5,150,105,.12); --accent-glow:rgba(5,150,105,.25); --card:rgba(255,255,255,.75); --card-solid:#fff; --border:rgba(5,150,105,.2); --danger:#dc2626; --danger-dim:rgba(220,38,38,.1); --info:#0284c7; --warning:#d97706; --header-bg:rgba(255,255,255,.85); --input-bg:rgba(255,255,255,.9); --toast-bg:rgba(5,150,105,.9); --toast-error:rgba(220,38,38,.9); --modal-bg:#fff; --chart-text:#334155; --insight-bg:rgba(2,132,199,.08); }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:var(--fg);overflow:hidden}
        .app{max-width:450px;width:100%;height:100vh;height:100dvh;background:var(--bg-app);backdrop-filter:blur(2px);position:relative;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 45px rgba(0,0,0,.5),0 0 0 1px var(--border);z-index:1}
        .app-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--header-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:15}
        .header-left{display:flex;align-items:center;gap:12px}
        .logo{width:36px;height:36px;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px var(--accent-glow)}
        .logo img{width:100%;height:100%;object-fit:cover}
        .app-name{font-size:18px;font-weight:700}
        .app-name span:last-child{color:var(--accent);text-shadow:0 0 8px var(--accent-glow)}
        .theme-toggle{background:var(--card);border:1px solid var(--border);border-radius:40px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .theme-toggle svg{width:18px;height:18px;stroke:var(--fg);fill:none;stroke-width:2}
        .main-content{flex:1;overflow-y:auto;padding:16px 14px 100px;scroll-behavior:smooth}
        .main-content::-webkit-scrollbar{width:3px}
        .main-content::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:450px;margin:0 auto;background:rgba(12,16,28,.94);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:12px 12px calc(20px + env(safe-area-inset-bottom));z-index:20}
        body.light .bottom-nav{background:rgba(255,255,255,.94)}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:0 0;border:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:16px;position:relative}
        .nav-item.active{color:var(--accent);filter:drop-shadow(0 0 6px var(--accent-glow))}
        .nav-item.active::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--accent);border-radius:4px}
        .nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
        .login-container{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,var(--accent-dim),transparent)}
        .login-logo{width:100px;height:100px;margin-bottom:28px;border-radius:30px;overflow:hidden;box-shadow:0 16px 40px -8px var(--accent-glow),0 0 0 2px var(--border);animation:logoPulse 3s ease-in-out infinite}
        @keyframes logoPulse{0%,100%{box-shadow:0 16px 40px -8px var(--accent-glow),0 0 0 2px var(--border)}50%{box-shadow:0 16px 50px -4px var(--accent-glow),0 0 0 3px var(--border)}}
        .login-logo img{width:100%;height:100%;object-fit:cover}
        .login-title{font-size:28px;font-weight:800;margin-bottom:6px}.login-title .asisten{color:var(--fg)}.login-title .keuangan{color:var(--accent);text-shadow:0 0 10px var(--accent-glow)}
        .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
        .login-input,.reg-input{width:100%;background:var(--input-bg);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:60px;padding:14px 18px;font-size:15px;color:var(--fg);margin-bottom:16px;outline:none;text-align:center;letter-spacing:2px}
        .login-input:focus,.reg-input:focus{border-color:var(--accent);box-shadow:0 0 20px var(--accent-dim)}
        .login-btn,.reg-btn{width:100%;background:linear-gradient(135deg,var(--accent),#059669);border:none;border-radius:60px;padding:14px;font-weight:800;font-size:15px;color:#fff;cursor:pointer;transition:.2s;box-shadow:0 8px 24px -4px var(--accent-glow)}
        .login-btn:active,.reg-btn:active{transform:scale(.97)}.login-error{color:#fca5a5;font-size:12px;margin-top:10px;display:none}
        .reg-container{margin-top:20px;font-size:12px;color:var(--muted)}.reg-container a{color:var(--accent);text-decoration:none;cursor:pointer}
        .chat-area{display:flex;flex-direction:column;height:100%}
        .chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:6px}
        .date-separator{text-align:center;font-size:10px;font-weight:500;color:var(--muted);margin:14px 0 8px}.date-separator span{background:var(--card);padding:3px 14px;border-radius:30px;display:inline-block;border:.5px solid var(--border)}
        .message-row{display:flex;gap:7px;margin-bottom:3px;max-width:88%;clear:both;animation:msgIn .35s ease-out both}
        @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message-row.bot{align-self:flex-start}.message-row.user{align-self:flex-end;flex-direction:row-reverse}
        .message-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card-solid);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3);border:1px solid var(--border)}
        .message-avatar img{width:100%;height:100%;object-fit:cover}
        .message-bubble-wrapper{max-width:calc(100% - 42px)}
        .message-bubble{background:var(--card);padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;border:1px solid var(--border);white-space:pre-line;word-break:break-word;box-shadow:0 3px 12px rgba(0,0,0,.15)}
        .message-bubble strong{color:var(--accent)}
        .message-row.user .message-bubble{background:linear-gradient(135deg,var(--accent),#059669);color:#fff;border:none}
        .message-time{font-size:10px;opacity:.55;margin-top:3px;text-align:right}.message-row.user .message-time{text-align:left}
        .typing-indicator{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}.typing-indicator .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.5;animation:tbounce 1.2s infinite}.typing-indicator .dot:nth-child(2){animation-delay:.15s}.typing-indicator .dot:nth-child(3){animation-delay:.3s}
        @keyframes tbounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
        .chat-input-wrapper{display:flex;align-items:center;gap:8px;background:var(--input-bg);backdrop-filter:blur(16px);border-radius:40px;padding:4px 4px 4px 8px;border:1px solid var(--border);transition:.25s;margin-top:10px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
        .chat-input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 16px var(--accent-dim),0 4px 16px rgba(0,0,0,.2)}
        .chat-input{flex:1;background:none;border:none;color:var(--fg);font-size:14px;outline:none;padding:10px 0}.chat-input::placeholder{color:var(--muted)}
        .plus-btn,.chat-send{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;border:none}
        .plus-btn{background:var(--card);border:1px solid var(--border)!important;color:var(--fg);font-size:16px}
        .plus-btn:active{transform:scale(.88);background:var(--accent-dim)}
        .chat-send{background:var(--accent);color:#fff;flex-shrink:0;box-shadow:0 2px 8px var(--accent-glow);padding:0}
        .chat-send:active{transform:scale(.88)}.chat-send svg{width:16px;height:16px;fill:white;stroke:none}
        .action-menu{position:absolute;bottom:70px;left:16px;background:var(--card-solid);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:24px;padding:8px 0;min-width:160px;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none;flex-direction:column;animation:menuFadeIn .2s ease}
        .action-menu.show{display:flex}.action-menu-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:.2s;color:var(--fg);font-size:13px;font-weight:500}.action-menu-item:hover,.action-menu-item:active{background:var(--accent-dim)}
        @keyframes menuFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .greeting-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:14px 18px;margin-bottom:14px;border-left:4px solid var(--accent)}.greeting-text{font-size:14px;font-weight:500;color:var(--fg)}.user-name{font-weight:700;color:var(--accent)}
        .card-balance{background:linear-gradient(145deg,var(--card),rgba(0,0,0,.1));border:1px solid var(--border);border-radius:24px;padding:20px 18px;margin-bottom:14px}.balance-label{font-size:10px;color:var(--muted);text-transform:uppercase}.balance-amount{font-size:28px;font-weight:800;margin:6px 0 14px}
        .stats-row{display:flex;gap:8px}.stat-card{background:rgba(0,0,0,.15);border-radius:16px;padding:10px 12px;flex:1}.stat-label{font-size:10px;color:var(--muted)}.stat-value{font-size:14px;font-weight:700;color:var(--accent)}.stat-card.expense .stat-value{color:var(--danger)}
        .section-header{display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px}.section-title{font-size:13px;font-weight:700;color:var(--fg)}
        .chart-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px}.chart-wrapper{max-width:180px;margin:0 auto}.legend-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;justify-content:center}.legend-item{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--chart-text)}.legend-dot{width:8px;height:8px;border-radius:8px}
        .summary-card{background:var(--card);border-radius:20px;padding:14px 18px;margin-top:12px;border:1px solid var(--border)}.summary-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}.summary-row:last-child{border-bottom:none}
        .green{color:var(--accent)}.red{color:var(--danger)}
        .insight-card{background:var(--insight-bg);border:1px solid var(--border);border-radius:20px;padding:16px;margin:12px 0 14px;border-left:4px solid var(--info)}.insight-title{font-size:12px;font-weight:700;display:flex;justify-content:space-between;margin-bottom:6px}.insight-text{font-size:12px;line-height:1.5}
        .speak-btn{background:rgba(56,189,248,.15);border:none;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;color:var(--info);cursor:pointer}
        .tx-list{background:rgba(0,0,0,.2);border-radius:20px;padding:2px 12px;border:1px solid var(--border)}
        .transaction-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,.04)}.transaction-item:last-child{border-bottom:none}
        .transaction-icon{width:34px;height:34px;border-radius:12px;background:var(--card-solid);display:flex;align-items:center;justify-content:center;font-size:15px}
        .transaction-detail{flex:1}.transaction-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.transaction-meta{font-size:10px;color:var(--muted)}
        .transaction-amount{font-size:12px;font-weight:700;flex-shrink:0}.income-text{color:var(--accent)}.expense-text{color:var(--danger)}
        .action-buttons{display:flex;gap:5px}.act-btn{background:rgba(255,255,255,.06);border:none;border-radius:10px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--info)}.act-btn.del-btn{color:var(--danger)}.act-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
        .group-header{font-size:10px;font-weight:700;color:var(--muted);margin:14px 0 6px;border-bottom:1px dashed var(--border)}.group-summary{font-size:10px;color:var(--muted);text-align:right}
        .filter-row,.report-toggle{display:flex;gap:6px;margin-bottom:10px}.filter-btn,.report-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:10px;color:var(--muted);font-weight:600;cursor:pointer}.filter-btn.active,.report-btn.active{background:var(--accent);color:#fff}
        .search-input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;padding:9px 16px;font-size:12px;color:var(--fg);outline:none;margin-bottom:8px}.search-input:focus{border-color:var(--accent)}
        .btn-pdf{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:6px 14px;font-size:10px;cursor:pointer;font-weight:600}
        .warning-banner{background:var(--danger-dim);border-left:3px solid var(--danger);padding:10px 14px;border-radius:12px;margin-bottom:12px;font-size:11px;color:#fca5a5}
        .profile-card{background:var(--card);border-radius:28px;padding:28px 20px;text-align:center;border:1px solid var(--border)}.profile-avatar{width:76px;height:76px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:2px solid var(--accent);cursor:pointer}.profile-avatar img{width:100%;height:100%;object-fit:cover}.profile-avatar .avatar-placeholder{font-size:42px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:var(--card-solid)}
        .profile-name{font-size:18px;font-weight:700;margin-bottom:12px}.profile-name .keuangan{color:var(--accent)}
        .name-input-group{display:flex;gap:8px;margin-bottom:12px}.name-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:60px;padding:9px 14px;font-size:12px;color:var(--fg);outline:none}.name-input:focus{border-color:var(--accent)}.name-save-btn{background:var(--accent);border:none;border-radius:60px;padding:9px 18px;font-size:11px;font-weight:700;color:#fff;cursor:pointer}
        .recurring-group{display:flex;flex-direction:column;gap:8px;margin-top:16px;padding:12px;background:var(--input-bg);border-radius:20px;border:1px solid var(--border)}.recurring-group label{font-size:12px;font-weight:600;color:var(--fg)}.recurring-group input{background:var(--card-solid);border:1px solid var(--border);border-radius:60px;padding:10px 16px;color:var(--fg);font-size:14px;outline:none}.recurring-group small{font-size:10px;color:var(--muted)}
        .btn-danger,.btn-secondary,.btn-logout{display:block;width:100%;border:none;border-radius:60px;padding:12px;font-weight:700;font-size:12px;color:#fff;cursor:pointer;margin-top:10px}.btn-danger{background:var(--danger)}.btn-secondary{background:var(--card-solid);border:1px solid var(--border);color:var(--fg)}.btn-logout{background:var(--card-solid);color:var(--muted)}
        .footer-badge{text-align:center;background:rgba(0,0,0,.2);padding:10px;border-radius:20px;margin:16px 0 4px;font-size:10px;color:var(--muted)}
        .empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:12px}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 24px;border-radius:40px;font-size:12px;font-weight:700;z-index:999;transition:transform .35s;background:var(--toast-bg);color:#fff}.toast.show{transform:translateX(-50%) translateY(0)}.toast.error{background:var(--toast-error)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}.modal-overlay.show{display:flex}
        .modal-box{background:var(--modal-bg);border:1px solid var(--border);border-radius:24px;padding:24px 20px;max-width:320px;width:100%;text-align:center}.modal-title{font-size:15px;font-weight:700;margin-bottom:8px}.modal-desc{font-size:12px;color:var(--muted);margin-bottom:18px;text-align:left}.modal-actions{display:flex;gap:10px}.modal-actions button{flex:1;border:none;border-radius:60px;padding:11px;font-size:12px;font-weight:700;cursor:pointer}.modal-cancel{background:#374151;color:#9ca3af}.modal-confirm{background:var(--danger);color:#fff}.modal-confirm.green{background:var(--accent)}
        .camera-modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;flex-direction:column;justify-content:center;align-items:center}.camera-modal.show{display:flex}.camera-video{width:90%;max-width:400px;border-radius:20px;border:2px solid var(--accent);background:#000}.camera-controls{display:flex;gap:20px;margin-top:20px}.capture-btn,.close-camera{border:none;border-radius:50px;padding:12px 24px;font-weight:700;cursor:pointer}.capture-btn{background:var(--accent);color:#000}.close-camera{background:var(--danger);color:#fff}
        select{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:9px 14px;font-size:12px;color:var(--fg);outline:none;margin-bottom:8px}
        :focus-visible{outline:2px solid var(--accent)}
    </style>
</head>
<body>
<div class="app" id="appRoot">
    <div id="loginScreen" class="login-container">
        <div class="login-logo"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Logo"></div>
        <div class="login-title"><span class="asisten">Asisten</span> <span class="keuangan">Keuangan</span></div>
        <div class="login-sub">Buat password untuk memulai</div>
        <div id="loginForm"><input type="password" id="passwordInput" class="login-input" placeholder="Password" autocomplete="off"><button id="loginBtn" class="login-btn">MASUK</button><div id="loginError" class="login-error">Password salah!</div></div>
        <div id="registerForm" style="display:none"><input type="password" id="newPasswordInput" class="reg-input" placeholder="Password baru (min 4)" autocomplete="off"><input type="password" id="confirmPasswordInput" class="reg-input" placeholder="Konfirmasi password" autocomplete="off"><button id="registerBtn" class="reg-btn">BUAT PASSWORD</button><div id="regError" class="login-error"></div></div>
        <div class="reg-container" id="toggleAuthBtn"><a id="toggleAuthLink">Belum punya password? Buat sekarang</a></div>
    </div>

    <div id="mainApp" style="display:none; flex:1; flex-direction:column; height:100%">
        <div class="app-header">
            <div class="header-left"><div class="logo"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Logo"></div><div class="app-name"><span>Asisten</span><span> Finance</span></div></div>
            <button class="theme-toggle" id="themeToggleBtn" aria-label="Ganti tema"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
        </div>
        <div class="main-content" id="mainContent" role="main"></div>
        <nav class="bottom-nav" id="bottomNav" role="navigation">
            <button class="nav-item" data-nav="chat" aria-label="Chat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></button>

<script>
(function() {
    "use strict";

    const KEYS = { DATA:'finbot_data_v23', USER:'finbot_user_v23', PASS:'finbot_pass_v23', AVATAR:'finbot_avatar_v23', THEME:'finbot_theme_v23', CHAT:'finbot_chat_v23', RECURRING:'finbot_recurring', LAST_MONTH:'finbot_last_month' };
    const chartColors=['#00dc82','#f43f5e','#f59e0b','#8b5cf6','#38bdf8','#ec4899','#14b8a6','#f97316','#a855f7','#06b6d4'];
    const categoryMap={income:[{name:'gaji',label:'Gaji',icon:'💼'},{name:'bonus',label:'Bonus',icon:'🎁'},{name:'jualan',label:'Jualan',icon:'🛒'},{name:'investasi',label:'Investasi',icon:'📈'},{name:'lainnya',label:'Lainnya',icon:'💰'}],expense:[{name:'makanan',label:'Makanan',icon:'🍗'},{name:'minuman',label:'Minuman',icon:'🧋'},{name:'transport',label:'Transport',icon:'🚗'},{name:'belanja',label:'Belanja',icon:'🛍️'},{name:'hiburan',label:'Hiburan',icon:'🎬'},{name:'rokok',label:'Rokok',icon:'🚬'},{name:'kopi',label:'Kopi',icon:'☕'},{name:'pulsa',label:'Pulsa/Internet',icon:'📱'},{name:'tagihan',label:'Tagihan',icon:'⚡'},{name:'kesehatan',label:'Kesehatan',icon:'💊'},{name:'pendidikan',label:'Pendidikan',icon:'📚'},{name:'lainnya',label:'Lainnya',icon:'📦'}]};
    const catLabels={makanan:'Makanan',minuman:'Minuman',transport:'Transport',belanja:'Belanja',hiburan:'Hiburan',rokok:'Rokok',kopi:'Kopi',lainnya:'Lainnya',pulsa:'Pulsa/Internet',tagihan:'Tagihan',kesehatan:'Kesehatan',pendidikan:'Pendidikan',gaji:'Gaji',bonus:'Bonus',jualan:'Jualan',investasi:'Investasi'};
    const incomeKeywords=['dapat','mendapat','bonus','menerima','pembayaran','terima','gaji','gajian','masuk','pendapatan','transfer','jual','jualan','cashback','refund','hadiah','rejeki','thr','lembur','honor','fee','komisi','dividen','bunga','profit','laba','pemasukan','tambah','dikirim','dibayar','lunas','tunai','deposit','topup','dana masuk','kiriman','orderan','jasa','proyek','bayaran','upah','gratis','berkah','cuan','untung','keuntungan','sale','order','langganan','royalti','uang kas','cash','uang tunai'];
    const expenseKeywords=['beli','bayar','membayar','belanja','keluar','habis','spending','pulsa','listrik','air','internet','cicil','hutang','utang','makan','minum','kopi','roti','snack','camilan','jajan','makanan','minuman','transport','bensin','gojek','grab','ojol','taksi','parkir','tol','service','servis','bengkel','kuota','token','pln','bpjs','iuran','subscription','netflix','spotify','game','voucher','donasi','sumbangan','pajak','denda','perbaikan','obat','dokter','apotek','klinik','sakit','sekolah','kursus','buku','alat tulis','seragam','mainan','pakaian','baju','sepatu','tas','kosmetik','skincare','perawatan','potong rambut','salon','cuci mobil','laundry','kebutuhan','dapur','sayur','buah','beras','telur','sembako','indomaret','alfamart','warkop','resto','cafe','fast food','online shop','tokopedia','shopee','lazada','blibli','total','tagihan','memberi','memberikan','ngasih','kasih'];

    let transactions = [], userName = 'Pengguna', userAvatar = '', chatHistory = [];
    let riwayatFilter='semua', reportView='harian', searchQuery='', currentScreen='chat', chartInstance=null, isLoggedIn=false, editingId=null;
    let recognition=null, isListening=false, speechUtterance=null, tesseractWorker=null, cameraStream=null;
    let recurringIncomeAmount = 0, lastAddedMonth = '';

    async function hashPassword(pwd) {
        try { const encoder = new TextEncoder(); const data = encoder.encode(pwd); const hashBuffer = await crypto.subtle.digest('SHA-256', data); return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join(''); }
        catch(e) { let hash = 0; for (let i = 0; i < pwd.length; i++) { hash = ((hash << 5) - hash) + pwd.charCodeAt(i); hash |= 0; } return 'fb_' + Math.abs(hash).toString(16); }
    }

    function escapeHtml(text) { const d=document.createElement('div'); d.textContent=text; return d.innerHTML; }
    function formatBotText(text) { return escapeHtml(text).replace(/\*(.*?)\*/g, '<strong>$1</strong>'); }
    function formatRupiah(n){return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n)}
    function formatShortRupiah(n){if(n>=1e6)return'Rp'+(n/1e6).toFixed(1)+'jt';if(n>=1e3)return'Rp'+(n/1e3).toFixed(0)+'rb';return'Rp'+n}
    function getRelativeTime(d){const df=Date.now()-new Date(d).getTime(),m=Math.floor(df/60000);if(m<1)return'baru saja';if(m<60)return m+' menit lalu';const h=Math.floor(m/60);if(h<24)return h+' jam lalu';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}
    function getGreeting(){const h=new Date().getHours();if(h<12)return'Selamat pagi';if(h<15)return'Selamat siang';if(h<19)return'Selamat sore';return'Selamat malam'}
    function getSummary(){let i=0,e=0;transactions.forEach(t=>{if(t.type==='income')i+=t.amount;else e+=t.amount});return{income:i,expense:e,balance:i-e}}
    function getExpenseToIncomeRatio(){const{income,expense}=getSummary();return income===0?0:expense/income}
    function getWarningMessage(){const r=getExpenseToIncomeRatio();if(r>0.7){return`\n\n⚠️ PERINGATAN! Pengeluaran sudah ${Math.round(r*100)}% dari pemasukan.\n💡 Sisihkan minimal 20% untuk tabungan.`;}return''}
    
    // ========== EKSTRAKSI NOMINAL DARI TEKS (PRIORITAS "TOTAL") ==========
    function extractTotalFromReceipt(text) {
        // Cari pola "Total" atau "Grand Total" diikuti angka (bisa dengan titik/koma sebagai pemisah ribuan)
        const patterns = [
            /total\s*[:]?\s*([\d.,]+)/i,
            /grand\s*total\s*[:]?\s*([\d.,]+)/i,
            /jumlah\s*total\s*[:]?\s*([\d.,]+)/i,
            /total\s+akhir\s*[:]?\s*([\d.,]+)/i
        ];
        for (let pattern of patterns) {
            const match = text.match(pattern);
            if (match) {
                let raw = match[1];
                // Bersihkan: hapus titik pemisah ribuan (misal "14,000" -> 14000, "14.000" -> 14000)
                if (raw.includes('.') || raw.includes(',')) {
                    // Jika format Indonesia: 14,000 (koma sebagai ribuan) atau 14.000 (titik sebagai ribuan)
                    raw = raw.replace(/\./g, '').replace(',', '.'); // ubah koma menjadi titik desimal jika ada
                    let num = parseFloat(raw);
                    if (!isNaN(num) && num > 0) return Math.round(num);
                } else {
                    let num = parseFloat(raw);
                    if (!isNaN(num) && num > 0) return num;
                }
            }
        }
        // Jika tidak ditemukan total, coba cari SubTotal
        const subMatch = text.match(/subtotal\s*[:]?\s*([\d.,]+)/i);
        if (subMatch) {
            let raw = subMatch[1];
            if (raw.includes('.') || raw.includes(',')) raw = raw.replace(/\./g, '').replace(',', '.');
            let num = parseFloat(raw);
            if (!isNaN(num) && num > 0) return Math.round(num);
        }
        return null;
    }

    function extractNominalFromText(text) {
        // PRIORITAS 1: Cari Total dari struk
        let totalAmount = extractTotalFromReceipt(text);
        if (totalAmount && totalAmount > 0) return totalAmount;
        
        // PRIORITAS 2: Format angka + satuan biasa (200rb, 500k, 2jt)
        let match = text.match(/(\d+(?:[.,]\d+)*)\s*(rb|ribu|k|jt|juta|juta'an)?/i);
        if (match) {
            let amt = parseFloat(match[1].replace(',', '.'));
            let u = (match[2] || '').toLowerCase();
            if (u === 'rb' || u === 'ribu' || u === 'k') amt *= 1000;
            if (u === 'jt' || u === 'juta' || u === 'juta\'an') amt *= 1000000;
            if (!isNaN(amt) && amt > 0 && amt < 1e12) return amt;
        }
        
        // PRIORITAS 3: Format kata angka (tiga ratus ribu)
        let clean = text.toLowerCase().replace(/[^a-z ]/g, '');
        let words = clean.split(/\s+/);
        let numPhrase = [];
        let numSet = new Set(['nol','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas','belas','puluh','ratus','ribu','juta','miliar','seratus','seribu','sejuta']);
        for (let w of words) if (numSet.has(w)) numPhrase.push(w);
        if (numPhrase.length === 0) return null;
        let numberText = numPhrase.join(' ');
        // Panggil fungsi parseNumberWords yang sama seperti sebelumnya
        function wordToNumber(w){
            const m={'nol':0,'satu':1,'dua':2,'tiga':3,'empat':4,'lima':5,'enam':6,'tujuh':7,'delapan':8,'sembilan':9,'sepuluh':10,'sebelas':11,'dua belas':12,'tiga belas':13,'empat belas':14,'lima belas':15,'enam belas':16,'tujuh belas':17,'delapan belas':18,'sembilan belas':19,'dua puluh':20,'tiga puluh':30,'empat puluh':40,'lima puluh':50,'enam puluh':60,'tujuh puluh':70,'delapan puluh':80,'sembilan puluh':90,'seratus':100,'dua ratus':200,'tiga ratus':300,'empat ratus':400,'lima ratus':500,'enam ratus':600,'tujuh ratus':700,'delapan ratus':800,'sembilan ratus':900,'seribu':1000};
            return m[w.toLowerCase()]!==undefined?m[w.toLowerCase()]:null;
        }
        function parseNumberWords(phrase){
            let norm = phrase.toLowerCase().replace(/[^a-z ]/g,'').trim();
            norm = norm.replace(/seratus/g,'satu ratus').replace(/seribu/g,'satu ribu').replace(/sejuta/g,'satu juta');
            let tokens = norm.split(/\s+/);
            let total = 0, curr = 0, i = 0;
            while(i < tokens.length){
                let tok = tokens[i];
                if(tok === 'belas' && i > 0){
                    let prev = wordToNumber(tokens[i-1]);
                    if(prev !== null && prev >= 1 && prev <= 9){
                        total -= curr;
                        curr = 10 + prev;
                        total += curr;
                        i++;
                        continue;
                    }
                }
                let val = wordToNumber(tok);
                if(val !== null){
                    if(val >= 100){
                        if(curr === 0) curr = val;
                        else { curr = curr * 100; total += curr; curr = 0; }
                    } else if(val >= 10) curr = val;
                    else curr += val;
                    i++;
                } else if(tok === 'ratus'){
                    if(curr !== 0){ curr = curr * 100; total += curr; curr = 0; }
                    i++;
                } else if(tok === 'ribu'){ total += (curr === 0 ? 1000 : curr * 1000); curr = 0; i++;
                } else if(tok === 'juta'){ total += (curr === 0 ? 1000000 : curr * 1000000); curr = 0; i++;
                } else if(tok === 'miliar'){ total += (curr === 0 ? 1000000000 : curr * 1000000000); curr = 0; i++;
                } else i++;
            }
            total += curr;
            return total;
        }
        let res = parseNumberWords(numberText);
        return (res > 0 && res < 1e12) ? res : null;
    }

    function isGreeting(text){const l=text.toLowerCase();return['selamat pagi','selamat siang','selamat sore','selamat malam','pagi','siang','sore','malam','halo','hai','hi','hello'].some(g=>l===g||l.startsWith(g+' '))}
    
    function parseTransactionFromText(text){
        const lower = text.toLowerCase();
        if(isGreeting(text)) return {command:'greeting'};
        if(lower.includes('saldo')||lower.includes('dashboard')) return {command:'summary'};
        if(lower.includes('riwayat')) return {command:'history'};
        if(lower.includes('laporan harian')) return {command:'laporan_harian'};
        if(lower.includes('laporan bulanan')) return {command:'laporan_bulanan'};
        if(lower.includes('bantuan')||lower.includes('help')) return {command:'help'};
        if(lower.includes('insight')||lower.includes('wawasan')) return {command:'insight'};
        
        let amount = extractNominalFromText(text);
        if(!amount || amount <= 0) return null;
        
        // Deteksi jenis transaksi: jika teks mengandung kata "Total" dan tidak ada kata pemasukan, anggap pengeluaran
        let type = 'expense';
        let isIncome = incomeKeywords.some(k=>lower.includes(k));
        let isExpense = expenseKeywords.some(k=>lower.includes(k));
        // Jika ada kata "Total" atau "Bayar" atau "Cash" dan tidak ada indikasi pemasukan, maka pengeluaran
        if(!isIncome && (lower.includes('total') || lower.includes('bayar') || lower.includes('cash') || lower.includes('kembalian'))) {
            type = 'expense';
        } else if(isIncome && !isExpense) {
            type = 'income';
        } else if(isExpense) {
            type = 'expense';
        }
        
        // Deskripsi: ambil nama toko atau barang pertama
        let desc = text.replace(/\d+(?:[.,]\d+)*\s*(rb|ribu|k|jt|juta|juta'an)?/gi,'').trim();
        desc = desc.replace(/^(beli|bayar|membayar|dapat|mendapat|menerima|terima|jual|jualan|uang kas|cash|memberi|kasih)\s*/i,'').trim();
        if(!desc) desc = type==='income'?'Pemasukan':'Pengeluaran';
        desc = desc.slice(0,40);
        
        let category = 'lainnya';
        if(type === 'expense'){
            if(lower.match(/makan|ayam|nasi/)) category='makanan';
            else if(lower.match(/minum|teh|es/)) category='minuman';
            else if(lower.includes('rokok')) category='rokok';
            else if(lower.includes('kopi')) category='kopi';
            else if(lower.match(/transport|bensin|gojek/)) category='transport';
            else if(lower.match(/belanja|pasar/)) category='belanja';
            else if(lower.match(/nonton|film/)) category='hiburan';
            else if(lower.match(/pulsa|kuota/)) category='pulsa';
            else if(lower.match(/listrik|air|tagihan/)) category='tagihan';
            else if(lower.match(/obat|dokter/)) category='kesehatan';
            else if(lower.match(/sekolah|buku/)) category='pendidikan';
        } else {
            if(lower.includes('gaji')) category='gaji';
            else if(lower.includes('bonus')) category='bonus';
            else if(lower.includes('jual')) category='jualan';
            else if(lower.includes('investasi')) category='investasi';
        }
        const cl = categoryMap[type];
        const co = cl.find(c=>c.name===category) || cl[cl.length-1];
        return {command:'add', type, amount, category, desc, icon: co.icon};
    }

    function addTransactionFromChat(p){const tx={id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),type:p.type,amount:p.amount,category:p.category,desc:p.desc,date:new Date().toISOString(),icon:p.icon};transactions.push(tx);saveToLocal();return tx}
    function deleteTransaction(id){showConfirm('Hapus Transaksi','Yakin ingin menghapus transaksi ini?',()=>{transactions=transactions.filter(t=>t.id!==id);saveToLocal();showToast('Transaksi dihapus');refreshCurrentScreen()})}
    function openEditById(id){const tx=transactions.find(t=>t.id===id);if(!tx)return;editingId=id;document.getElementById('editAmount').value=tx.amount;document.getElementById('editDesc').value=tx.desc;const sel=document.getElementById('editCategory');sel.innerHTML=categoryMap[tx.type].map(c=>`<option value="${c.name}"${c.name===tx.category?' selected':''}>${c.icon} ${c.label}</option>`).join('');document.getElementById('editModal').classList.add('show')}
    function saveEdit(){const amt=parseFloat(document.getElementById('editAmount').value);if(isNaN(amt)||amt<=0){showToast('Jumlah tidak valid',true);return}const ndesc=document.getElementById('editDesc').value.trim()||'Transaksi';const ncat=document.getElementById('editCategory').value;const idx=transactions.findIndex(t=>t.id===editingId);if(idx===-1)return;const old=transactions[idx];const newIcon=categoryMap[old.type].find(c=>c.name===ncat)?.icon||'📦';transactions[idx]={...old,amount:amt,desc:ndesc,category:ncat,icon:newIcon};saveToLocal();showToast('Diperbarui');document.getElementById('editModal').classList.remove('show');refreshCurrentScreen()}
    function refreshCurrentScreen(){if(currentScreen==='riwayat')renderRiwayat();else if(currentScreen==='dashboard')renderDashboard();else if(currentScreen==='chat')renderChat()}
    
    function getLaporanHarian(){const today=new Date();today.setHours(0,0,0,0);const end=new Date(today);end.setHours(23,59,59,999);const hariIni=transactions.filter(t=>{const d=new Date(t.date);return d>=today&&d<=end});let ti=0,te=0;hariIni.forEach(t=>{if(t.type==='income')ti+=t.amount;else te+=t.amount});return`📅 Laporan Harian (${today.toLocaleDateString('id-ID')})\n💵 Pemasukan: ${formatRupiah(ti)}\n💸 Pengeluaran: ${formatRupiah(te)}\n💰 Saldo: ${formatRupiah(ti-te)}${getWarningMessage()}`}
    function getLaporanBulanan(){const now=new Date();const start=new Date(now.getFullYear(),now.getMonth(),1);const end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);const bulanIni=transactions.filter(t=>{const d=new Date(t.date);return d>=start&&d<=end});let ti=0,te=0;bulanIni.forEach(t=>{if(t.type==='income')ti+=t.amount;else te+=t.amount});return`📆 Laporan Bulanan (${now.toLocaleDateString('id-ID',{month:'long',year:'numeric'})})\n💵 Pemasukan: ${formatRupiah(ti)}\n💸 Pengeluaran: ${formatRupiah(te)}\n💰 Saldo: ${formatRupiah(ti-te)}${getWarningMessage()}`}
    
    async function exportToPDF(){try{await loadPdf();const{jsPDF}=window.jspdf;const doc=new jsPDF();const s=getSummary();const d=new Date().toLocaleDateString('id-ID');doc.setFontSize(16);doc.text('Laporan Keuangan - '+userName,20,20);doc.setFontSize(10);doc.text('Tanggal: '+d,20,30);doc.text('Pemasukan: '+formatRupiah(s.income),20,42);doc.text('Pengeluaran: '+formatRupiah(s.expense),20,50);doc.text('Saldo Akhir: '+formatRupiah(s.balance),20,58);let y=72;doc.setFontSize(11);doc.text('Daftar Transaksi:',20,y);y+=10;doc.setFontSize(9);const sorted=[...transactions].reverse();for(let tx of sorted){const line=tx.icon+' '+tx.desc+' ('+tx.category+') : '+(tx.type==='income'?'+':'-')+formatRupiah(tx.amount)+' - '+new Date(tx.date).toLocaleDateString('id-ID');if(y>275){doc.addPage();y=20}doc.text(line,20,y);y+=8}doc.save('laporan_keuangan_'+userName+'_'+d.replace(/\//g,'-')+'.pdf');showToast('PDF berhasil diekspor')}catch(e){showToast('Gagal memuat PDF lib',true)}}
    
    function loadRecurringSetting(){try{const stored=localStorage.getItem(KEYS.RECURRING);recurringIncomeAmount=stored?parseInt(stored):0;lastAddedMonth=localStorage.getItem(KEYS.LAST_MONTH)||'';}catch(e){}}
    function saveRecurringSetting(){localStorage.setItem(KEYS.RECURRING,recurringIncomeAmount);localStorage.setItem(KEYS.LAST_MONTH,lastAddedMonth);}
    function setRecurringIncome(amount){recurringIncomeAmount=amount;saveRecurringSetting();}
    function checkAndAddRecurringIncome(){if(!recurringIncomeAmount||recurringIncomeAmount<=0)return false;const now=new Date();const currentYearMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;if(lastAddedMonth===currentYearMonth)return false;const tx={id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),type:'income',amount:recurringIncomeAmount,category:'gaji',desc:`Pemasukan tetap bulan ${now.toLocaleDateString('id-ID',{month:'long',year:'numeric'})}`,date:new Date().toISOString(),icon:'💼'};transactions.push(tx);lastAddedMonth=currentYearMonth;saveRecurringSetting();saveToLocal();if(isLoggedIn){const msg=`💰 *Pemasukan tetap bulan ini* (${formatRupiah(recurringIncomeAmount)}) otomatis ditambahkan.`;addChatMessage('bot',msg);if(currentScreen==='chat')renderChat();else if(currentScreen==='dashboard')renderDashboard();else if(currentScreen==='riwayat')renderRiwayat();showToast('Pemasukan tetap otomatis ditambahkan',false);}return true;}
    
    let saveTimer=null;
    function saveToLocal(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(()=>{try{localStorage.setItem(KEYS.DATA,JSON.stringify(transactions));localStorage.setItem(KEYS.USER,userName);localStorage.setItem(KEYS.AVATAR,userAvatar);localStorage.setItem(KEYS.CHAT,JSON.stringify(chatHistory.slice(-100)));}catch(e){}},100);}
    function loadData(){try{const d=localStorage.getItem(KEYS.DATA);transactions=d?JSON.parse(d):[];if(!Array.isArray(transactions))transactions=[];}catch(e){transactions=[];}userName=localStorage.getItem(KEYS.USER)||'Pengguna';userAvatar=localStorage.getItem(KEYS.AVATAR)||'';try{const c=localStorage.getItem(KEYS.CHAT);chatHistory=c?JSON.parse(c):[];if(!Array.isArray(chatHistory))chatHistory=[];}catch(e){chatHistory=[];}loadRecurringSetting();}
    
    function loadScript(src,globalVar){if(window[globalVar])return Promise.resolve();return new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src;s.onload=()=>resolve();s.onerror=()=>reject(new Error(`Failed to load ${src}`));document.head.appendChild(s);});}
    async function loadChart(){await loadScript('https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js','Chart');}
    async function loadPdf(){await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js','jspdf');}
    async function loadTesseract(){if(tesseractWorker)return tesseractWorker;showToast('🔄 Memuat mesin OCR...',false);await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js','Tesseract');try{tesseractWorker=await Tesseract.createWorker('ind',1,{corePath:'https://cdn.jsdelivr.net/npm/tesseract.js-core@v5.1.0/tesseract-core.wasm.js'});showToast('✅ OCR siap',false);return tesseractWorker;}catch(e){showToast('Gagal memuat OCR',true);return null;}}
    
    function generateAIInsight(){const s=getSummary();const exp=transactions.filter(t=>t.type==='expense');if(!exp.length)return"Belum ada pengeluaran tercatat.";let ct={};exp.forEach(e=>{ct[e.category]=(ct[e.category]||0)+e.amount});let maxCat='',maxAmt=0;for(let[c,a]of Object.entries(ct))if(a>maxAmt){maxAmt=a;maxCat=c}let insight=`📊 Kategori terbesar: ${catLabels[maxCat]||maxCat} (${formatRupiah(maxAmt)}). `;const ratio=getExpenseToIncomeRatio();if(ratio>0.7)insight+="⚠️ Rasio boros, kendalikan budget!";else if(ratio>0.5)insight+="✅ Rasio cukup sehat.";else insight+="🌟 Kerja bagus, hemat sekali!";if(s.income>0){let idealSave=s.income*0.2;insight+=`\n🎯 Target tabungan: ${formatRupiah(idealSave)} (20%).`;if(s.balance<idealSave)insight+=" Coba evaluasi pengeluaran.";else insight+=" Kamu sudah melebihi target!";}return insight;}
    
    async function openCamera(){try{if(cameraStream)cameraStream.getTracks().forEach(t=>t.stop());const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});cameraStream=stream;document.getElementById('cameraVideo').srcObject=stream;document.getElementById('cameraModal').classList.add('show');}catch(e){showToast('Tidak dapat mengakses kamera.',true);}}
    function closeCamera(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}document.getElementById('cameraModal').classList.remove('show');}
    function preprocessImage(canvas){const ctx=canvas.getContext('2d');const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);const data=imgData.data;for(let i=0;i<data.length;i+=4){let brightness=0.34*data[i]+0.5*data[i+1]+0.16*data[i+2];let v=brightness>=128?255:0;data[i]=v;data[i+1]=v;data[i+2]=v;}ctx.putImageData(imgData,0,0);return canvas;}
    async function captureAndProcess(){
        const video=document.getElementById('cameraVideo');if(!video||!video.videoWidth){showToast('Kamera belum siap',true);return;}
        const canvas=document.createElement('canvas');canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);preprocessImage(canvas);
        closeCamera();showToast('🔍 Memproses struk...',false);
        try{
            const worker=await loadTesseract();if(!worker)return;
            const{data:{text}}=await worker.recognize(canvas);
            if(!text||text.trim().length<5){showToast('Tidak dapat membaca teks dari foto.',true);return;}
            const parsed=parseTransactionFromText(text);
            if(!parsed||parsed.command!=='add'){showToast('Tidak ditemukan nominal valid.',true);return;}
            addTransactionFromChat(parsed);const s=getSummary();
            const msg=`📸 *Scan struk berhasil!* (Total: ${formatRupiah(parsed.amount)})\n${parsed.type==='income'?'➕ Pemasukan':'➖ Pengeluaran'} untuk ${parsed.desc}\n💳 Saldo: ${formatRupiah(s.balance)}`;
            addChatMessage('bot',msg);renderChat();if(currentScreen==='dashboard')renderDashboard();if(currentScreen==='riwayat')renderRiwayat();showToast('Tercatat!',false);
        } catch(e){showToast('Gagal memproses foto', true);}
    }
    
    function speakText(text){if(!text||!window.speechSynthesis)return;if(speechUtterance)window.speechSynthesis.cancel();speechUtterance=new SpeechSynthesisUtterance(text.replace(/[📅📆💵💸💰⚠️🌟✅🎯🧠📸➕➖💳]/g,''));speechUtterance.lang='id-ID';speechUtterance.rate=0.95;window.speechSynthesis.speak(speechUtterance);}
    function initSpeechRecognition(){if(!('webkitSpeechRecognition' in window)){showToast('Voice tidak didukung browser ini',true);return null;}const r=new (window.SpeechRecognition||window.webkitSpeechRecognition)();r.lang='id-ID';r.continuous=false;r.interimResults=false;return r;}
    function toggleVoiceInput(){if(!recognition){recognition=initSpeechRecognition();if(!recognition)return;recognition.onresult=e=>{document.getElementById('chatInputField').value=e.results[0][0].transcript;sendChatMessage();stopVoice();};recognition.onerror=stopVoice;recognition.onend=stopVoice;}if(isListening){recognition.stop();}else{recognition.start();isListening=true;showToast('🎤 Bicara...');}}
    function stopVoiceListening(){isListening=false;}
    const stopVoice=stopVoiceListening;
    
    let menuVisible=false;
    function toggleActionMenu(){const m=document.getElementById('actionMenu');if(m){m.classList.toggle('show');menuVisible=m.classList.contains('show');}}
    function addChatMessage(role,text){const n=new Date();chatHistory.push({role,text,timestamp:n.toISOString(),timeStr:n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});saveToLocal();}
    function renderChat(){
        const groups={};
        chatHistory.forEach(msg=>{const d=new Date(msg.timestamp);const today=new Date();today.setHours(0,0,0,0);const yest=new Date(today);yest.setDate(yest.getDate()-1);let key;if(d.toDateString()===today.toDateString())key='Hari ini';else if(d.toDateString()===yest.toDateString())key='Kemarin';else key=d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});if(!groups[key])groups[key]=[];groups[key].push(msg);});
        let mh='';
        for(const[dl,msgs]of Object.entries(groups)){mh+=`<div class="date-separator"><span>${escapeHtml(dl)}</span></div>`;msgs.forEach(msg=>{const isBot=msg.role==='bot';const avSrc=isBot?'https://i.imgur.com/cbPGl9R.jpeg':(userAvatar||'https://i.imgur.com/cbPGl9R.jpeg');mh+=`<div class="message-row ${msg.role}"><div class="message-avatar"><img src="${avSrc}" alt="Avatar"></div><div class="message-bubble-wrapper"><div class="message-bubble">${isBot?formatBotText(msg.text):escapeHtml(msg.text)}</div><div class="message-time">${escapeHtml(msg.timeStr)}</div></div></div>`;});}
        const welcomeHtml=chatHistory.length===0?`<div class="date-separator"><span>Hari ini</span></div><div class="message-row bot"><div class="message-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Bot"></div><div class="message-bubble-wrapper"><div class="message-bubble">${getGreeting()}, <strong>${escapeHtml(userName)}</strong>!\n\n📸 Scan struk otomatis mengambil nilai Total.\n➕ Tekan tombol plus untuk Voice/Scan.\nKetik "bantuan" untuk panduan.\n💰 Atur pemasukan tetap bulanan di menu Profil.</div><div class="message-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div></div>`:'';
        const html=`<div class="chat-area"><div class="chat-messages" id="chatMsgList" aria-live="polite">${welcomeHtml}${mh}</div><div class="chat-input-wrapper"><button id="plusBtn" class="plus-btn" aria-label="Menu tambahan">+</button><input type="text" id="chatInputField" class="chat-input" placeholder="Ketik pesan..." autocomplete="off"><button id="chatSendBtn" class="chat-send" aria-label="Kirim"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button></div><div id="actionMenu" class="action-menu"><div class="action-menu-item" id="menuVoice">🎤 Voice Input</div><div class="action-menu-item" id="menuScan">📸 Scan Struk</div></div></div>`;
        document.getElementById('mainContent').innerHTML=html;
        requestAnimationFrame(()=>{const md=document.getElementById('chatMsgList');if(md)md.scrollTop=md.scrollHeight});
        document.getElementById('chatSendBtn').onclick=sendChatMessage;
        document.getElementById('chatInputField').onkeypress=e=>{if(e.key==='Enter')sendChatMessage();};
        document.getElementById('plusBtn').onclick=toggleActionMenu;
        document.getElementById('menuVoice').onclick=()=>{toggleActionMenu();toggleVoiceInput();};
        document.getElementById('menuScan').onclick=()=>{toggleActionMenu();openCamera();};
    }
    function showTypingIndicator(){const list=document.getElementById('chatMsgList');if(!list)return;const ind=document.createElement('div');ind.className='typing-indicator';ind.id='typingIndicator';ind.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';list.appendChild(ind);list.scrollTop=list.scrollHeight}
    function removeTypingIndicator(){const el=document.getElementById('typingIndicator');if(el)el.remove()}
    function sendChatMessage(){
        const inp=document.getElementById('chatInputField');const msg=inp.value.trim();if(!msg)return;inp.value='';
        addChatMessage('user',msg);renderChat();showTypingIndicator();
        setTimeout(()=>{removeTypingIndicator();const p=parseTransactionFromText(msg);let r='';
        if(!p){r='Maaf, tidak mengerti. Coba "beli nasi 15rb" atau "insight".';}
        else if(p.command==='greeting'){r=`${getGreeting()}, ${userName}! Semoga harimu menyenangkan ✨`;}
        else if(p.command==='help'){r='📖 Panduan:\n📸 Scan struk → ambil nilai Total otomatis\n➕ Tombol plus → Voice/Scan\n✍️ "beli ayam 25rb", "uang kas 200rb"\n📊 "saldo", "insight", "laporan harian"\n💰 Atur pemasukan tetap di Profil';}
        else if(p.command==='insight'){r=`🧠 *AI Insight*\n${generateAIInsight()}`;}
        else if(p.command==='summary'){const s=getSummary();r=`📊 Ringkasan ${userName}\n💵 Pemasukan: ${formatRupiah(s.income)}\n💸 Pengeluaran: ${formatRupiah(s.expense)}\n💰 Saldo: ${formatRupiah(s.balance)}${getWarningMessage()}`;}
        else if(p.command==='history'){const l5=[...transactions].reverse().slice(0,5);r=!l5.length?'Belum ada transaksi.':'📋 5 Transaksi Terakhir:\n'+l5.map(t=>`${t.icon} ${t.desc}: ${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}`).join('\n');}
        else if(p.command==='laporan_harian'){r=getLaporanHarian();}
        else if(p.command==='laporan_bulanan'){r=getLaporanBulanan();}
        else if(p.command==='add'){addTransactionFromChat(p);const s=getSummary();const w=(p.type==='expense')?getWarningMessage():'';r=`✅ Tersimpan!\n${p.type==='income'?'➕':'➖'} ${formatRupiah(p.amount)} untuk ${p.desc}\n💳 Saldo: ${formatRupiah(s.balance)}${w}`;if(currentScreen==='dashboard')renderDashboard();if(currentScreen==='riwayat')renderRiwayat();}
        else {r='Format tidak dikenali.';}
        addChatMessage('bot',r);renderChat();},400+Math.random()*300);
    }
    
    const svgEdit='<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    const svgDel='<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    function debounce(fn,delay){let t;return function(...args){clearTimeout(t);t=setTimeout(()=>fn.apply(this,args),delay);};}
    
    function renderRiwayat(){
        const s=getSummary();let filtered=[...transactions].reverse();
        if(riwayatFilter!=='semua')filtered=filtered.filter(t=>t.type===riwayatFilter);
        if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(t=>t.desc.toLowerCase().includes(q)||t.category.toLowerCase().includes(q));}
        let grouped={};filtered.forEach(t=>{const d=new Date(t.date);const key=reportView==='harian'?d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}):d.toLocaleDateString('id-ID',{month:'long',year:'numeric'});if(!grouped[key])grouped[key]={items:[],income:0,expense:0};grouped[key].items.push(t);if(t.type==='income')grouped[key].income+=t.amount;else grouped[key].expense+=t.amount;});
        let itemsHtml='';for(const[label,data]of Object.entries(grouped)){itemsHtml+=`<div class="group-header">${escapeHtml(label)}</div><div class="group-summary">+${formatRupiah(data.income)} / -${formatRupiah(data.expense)}</div>`;data.items.forEach(t=>{itemsHtml+=`<div class="transaction-item" data-id="${t.id}"><div class="transaction-icon">${t.icon}</div><div class="transaction-detail"><div class="transaction-name">${escapeHtml(t.desc)}</div><div class="transaction-meta">${getRelativeTime(t.date)} · ${catLabels[t.category]||t.category}</div></div><div class="transaction-amount ${t.type==='income'?'income-text':'expense-text'}">${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}</div><div class="action-buttons"><button class="act-btn edit-btn" data-action="edit" data-id="${t.id}">${svgEdit}</button><button class="act-btn del-btn" data-action="delete" data-id="${t.id}">${svgDel}</button></div></div>`;});}
        if(!Object.keys(grouped).length)itemsHtml='<div class="empty-state">Belum ada transaksi</div>';
        const warning=getWarningMessage();
        document.getElementById('mainContent').innerHTML=`
            <div class="stats-row" style="margin-bottom:12px"><div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div><div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div></div>
            ${warning?`<div class="warning-banner">${formatBotText(warning)}</div>`:''}
            <div class="section-header"><div class="section-title">Laporan</div><div><button class="btn-pdf" id="btnExportPdf">Ekspor PDF</button> <button id="speakReportBtn" class="speak-btn">🔊</button></div></div>
            <div class="report-toggle"><button class="report-btn${reportView==='harian'?' active':''}" data-view="harian">Harian</button><button class="report-btn${reportView==='bulanan'?' active':''}" data-view="bulanan">Bulanan</button></div>
            <input type="text" class="search-input" id="searchInputField" placeholder="Cari transaksi..." value="${escapeHtml(searchQuery)}">
            <div class="filter-row"><button class="filter-btn${riwayatFilter==='semua'?' active':''}" data-filter="semua">Semua</button><button class="filter-btn${riwayatFilter==='income'?' active':''}" data-filter="income">Pemasukan</button><button class="filter-btn${riwayatFilter==='expense'?' active':''}" data-filter="expense">Pengeluaran</button></div>
            <div class="tx-list" id="txListContainer">${itemsHtml}</div>`;
        const handleSearch=debounce(()=>{searchQuery=document.getElementById('searchInputField').value.trim().toLowerCase();renderRiwayat();},400);
        document.getElementById('searchInputField').addEventListener('input',handleSearch);
        document.getElementById('btnExportPdf').onclick=exportToPDF;
        document.getElementById('speakReportBtn').onclick=()=>{speakText(reportView==='harian'?getLaporanHarian():getLaporanBulanan());};
        document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{riwayatFilter=b.dataset.filter;renderRiwayat();});
        document.querySelectorAll('.report-btn').forEach(b=>b.onclick=()=>{reportView=b.dataset.view;renderRiwayat();});
        document.getElementById('txListContainer').onclick=e=>{const btn=e.target.closest('[data-action]');if(!btn)return;const id=btn.dataset.id;if(btn.dataset.action==='edit')openEditById(id);else if(btn.dataset.action==='delete')deleteTransaction(id);};
    }
    
    function renderDashboard(){
        const s=getSummary();const recent=transactions.slice(-3).reverse();
        let rh=recent.map(t=>`<div class="transaction-item"><div class="transaction-icon">${t.icon}</div><div class="transaction-detail"><div class="transaction-name">${escapeHtml(t.desc)}</div><div class="transaction-meta">${getRelativeTime(t.date)}</div></div><div class="transaction-amount ${t.type==='income'?'income-text':'expense-text'}">${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}</div><div class="action-buttons"><button class="act-btn edit-btn" data-action="edit" data-id="${t.id}">${svgEdit}</button><button class="act-btn del-btn" data-action="delete" data-id="${t.id}">${svgDel}</button></div></div>`).join('');
        const warning=getWarningMessage();const insight=generateAIInsight();
        document.getElementById('mainContent').innerHTML=`
            <div class="greeting-box"><div class="greeting-text">${getGreeting()}, <span class="user-name">${escapeHtml(userName)}</span></div></div>
            ${warning?`<div class="warning-banner">${formatBotText(warning)}</div>`:''}
            <div class="card-balance"><div class="balance-label">Saldo Tersedia</div><div class="balance-amount">${formatRupiah(s.balance)}</div><div class="stats-row"><div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div><div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div></div></div>
            <div class="insight-card"><div class="insight-title"><span>🧠 AI Insight</span><button id="speakInsightBtn" class="speak-btn">🔊</button></div><div class="insight-text">${formatBotText(insight)}</div></div>
            <div class="section-header"><div class="section-title">Grafik Pengeluaran</div></div><div class="chart-card"><div class="chart-wrapper"><canvas id="expenseChartCanvas"></canvas></div><div id="legendContainer" class="legend-list"></div></div>
            <div class="summary-card"><div class="section-title">Ringkasan</div><div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div><div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div><div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div></div>
            <div class="section-header"><div class="section-title">Transaksi Terbaru</div></div><div class="tx-list" id="dashTxList">${rh||'<div class="empty-state">Belum ada transaksi</div>'}</div>
            <div class="footer-badge">🛡️ Secure · 📸 OCR Ekstrak Total · 💰 Auto Income</div>`;
        document.getElementById('speakInsightBtn')?.addEventListener('click',()=>{speakText(insight);});
        document.getElementById('dashTxList').onclick=e=>{const btn=e.target.closest('[data-action]');if(!btn)return;const id=btn.dataset.id;if(btn.dataset.action==='edit')openEditById(id);else if(btn.dataset.action==='delete')deleteTransaction(id);};
        setTimeout(async()=>{const ctx=document.getElementById('expenseChartCanvas')?.getContext('2d');if(!ctx)return;await loadChart();const exp=transactions.filter(t=>t.type==='expense');const ct={};exp.forEach(e=>{ct[e.category]=(ct[e.category]||0)+e.amount});const labels=Object.keys(ct),data=Object.values(ct);if(chartInstance)chartInstance.destroy();if(labels.length){chartInstance=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:chartColors.slice(0,labels.length),borderWidth:0}]},options:{responsive:true,cutout:'70%',plugins:{legend:{display:false}}}});document.getElementById('legendContainer').innerHTML=labels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${chartColors[i%chartColors.length]}"></div>${catLabels[l]||l} ${formatShortRupiah(data[i])}</div>`).join('');}else document.getElementById('legendContainer').innerHTML='<div style="color:var(--muted);font-size:11px">Belum ada data</div>';},50);
    }

        document.getElementById('changePasswordBtn').onclick=async()=>{const newPwd=document.getElementById('changePasswordInput').value;if(!newPwd||newPwd.length<4){showToast('Min 4 karakter',true);return;}const hash=await hashPassword(newPwd);localStorage.setItem(KEYS.PASS,hash);showToast('Password diubah');document.getElementById('changePasswordInput').value='';};
        document.getElementById('resetDataBtn').onclick=()=>{showConfirm('Hapus Semua Data?','Semua transaksi akan dihapus permanen.',()=>{transactions=[];chatHistory=[];saveToLocal();renderProfil();});};
        document.getElementById('exportJsonBtn').onclick=()=>{try{const b=new Blob([JSON.stringify(transactions,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`finansbot_${new Date().toISOString().slice(0,10)}.json`;a.click();showToast('Diekspor');}catch(e){showToast('Gagal',true);}};
        document.getElementById('logoutBtn').onclick=logout;
        document.getElementById('saveRecurringBtn').onclick=()=>{const amt=parseInt(document.getElementById('recurringAmountInput').value);if(isNaN(amt)||amt<=0){showToast('Masukkan nominal valid',true);return;}setRecurringIncome(amt);showToast('Pemasukan tetap disimpan',false);const now=new Date();const currentYM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;if(lastAddedMonth!==currentYM){const tx={id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),type:'income',amount:amt,category:'gaji',desc:`Pemasukan tetap bulan ${now.toLocaleDateString('id-ID',{month:'long',year:'numeric'})}`,date:new Date().toISOString(),icon:'💼'};transactions.push(tx);lastAddedMonth=currentYM;saveRecurringSetting();saveToLocal();showToast('Pemasukan bulan ini langsung ditambahkan',false);if(currentScreen==='dashboard')renderDashboard();else if(currentScreen==='riwayat')renderRiwayat();else if(currentScreen==='chat')renderChat();}renderProfil();};
        const uploadAvatar=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='image/jpeg,image/png';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userAvatar=ev.target.result;saveToLocal();renderProfil();if(currentScreen==='chat')renderChat();};r.readAsDataURL(f);};inp.click();};
        document.getElementById('avatarClickable').onclick=uploadAvatar;
    }
    
    function switchScreen(screen){currentScreen=screen;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelector(`.nav-item[data-nav="${screen}"]`)?.classList.add('active');if(screen==='chat')renderChat();else if(screen==='dashboard')renderDashboard();else if(screen==='riwayat')renderRiwayat();else if(screen==='profil')renderProfil();}
    function initTheme(){const s=localStorage.getItem(KEYS.THEME);if(s==='light'){document.body.classList.add('light');document.getElementById('themeColorMeta')?.setAttribute('content','#f0f4f8');}else{document.body.classList.remove('light');document.getElementById('themeColorMeta')?.setAttribute('content','#03060c');}}
    function toggleTheme(){document.body.classList.toggle('light');const isLight=document.body.classList.contains('light');localStorage.setItem(KEYS.THEME,isLight?'light':'dark');document.getElementById('themeColorMeta')?.setAttribute('content',isLight?'#f0f4f8':'#03060c');if(currentScreen==='dashboard')renderDashboard();}
    
    async function handleLogin(){const pwd=document.getElementById('passwordInput').value;if(!pwd){showToast('Masukkan password',true);return;}const hash=await hashPassword(pwd);const storedHash=localStorage.getItem(KEYS.PASS);if(hash===storedHash){isLoggedIn=true;document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='flex';switchScreen('chat');showToast(`${getGreeting()}, ${userName}!`);checkAndAddRecurringIncome();}else{document.getElementById('loginError').style.display='block';setTimeout(()=>document.getElementById('loginError').style.display='none',2500);}}
    async function handleRegister(){const newPwd=document.getElementById('newPasswordInput').value;const confirmPwd=document.getElementById('confirmPasswordInput').value;if(!newPwd||newPwd.length<4){showToast('Min 4 karakter',true);return;}if(newPwd!==confirmPwd){showToast('Password tidak sama',true);return;}const hash=await hashPassword(newPwd);localStorage.setItem(KEYS.PASS,hash);document.getElementById('newPasswordInput').value='';document.getElementById('confirmPasswordInput').value='';showAuthMode(true);showToast('Password dibuat! Silakan login.');}
    function showAuthMode(hasPass){document.getElementById('loginForm').style.display=hasPass?'block':'none';document.getElementById('registerForm').style.display=hasPass?'none':'block';document.getElementById('toggleAuthLink').innerText=hasPass?'Lupa password? (Reset data)':'Sudah punya password? Masuk';}
    function logout(){isLoggedIn=false;document.getElementById('mainApp').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('passwordInput').value='';showAuthMode(true);}
    
    function init(){loadData();initTheme();const hasPass=!!localStorage.getItem(KEYS.PASS);showAuthMode(hasPass);
        document.getElementById('themeToggleBtn').onclick=toggleTheme;
        document.getElementById('loginBtn').onclick=handleLogin;
        document.getElementById('registerBtn').onclick=handleRegister;
        document.getElementById('toggleAuthLink').onclick=()=>{if(localStorage.getItem(KEYS.PASS)){if(confirm('Reset password akan menghapus akun. Lanjutkan?')){localStorage.removeItem(KEYS.PASS);location.reload();}}else showAuthMode(true);};
        document.getElementById('passwordInput').addEventListener('keypress',e=>{if(e.key==='Enter')handleLogin();});
        document.getElementById('newPasswordInput').addEventListener('keypress',e=>{if(e.key==='Enter')handleRegister();});
        document.getElementById('confirmPasswordInput').addEventListener('keypress',e=>{if(e.key==='Enter')handleRegister();});
        document.querySelectorAll('.nav-item').forEach(nav=>nav.addEventListener('click',()=>{if(isLoggedIn)switchScreen(nav.dataset.nav)}));
        document.querySelectorAll('.modal-overlay').forEach(overlay=>{overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('show')})});
        document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));});
        document.getElementById('editCancelBtn').addEventListener('click',()=>document.getElementById('editModal').classList.remove('show'));
        document.getElementById('editSaveBtn').addEventListener('click',saveEdit);
        document.getElementById('capturePhotoBtn').addEventListener('click',captureAndProcess);
        document.getElementById('closeCameraBtn').addEventListener('click',closeCamera);
        document.addEventListener('click',function(e){if(!e.target.closest('.action-menu')&&!e.target.closest('#plusBtn')){const m=document.getElementById('actionMenu');if(m)m.classList.remove('show');}});
    }
    function showToast(msg,isError=false){const t=document.getElementById('toastMsg');t.textContent=msg;t.className='toast '+(isError?'error':'success');requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>t.classList.remove('show'),2400);}
    function showConfirm(title,desc,onConfirm){const m=document.getElementById('confirmModal');document.getElementById('modalTitle').textContent=title;document.getElementById('modalDesc').textContent=desc;m.classList.add('show');const close=()=>m.classList.remove('show');document.getElementById('modalCancel').onclick=close;document.getElementById('modalConfirm').onclick=()=>{close();onConfirm()};}
    
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>
</body>
  </html>
