<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinansBot · Catat Keuangan Semudah Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        body{
            background:#060A10;
            font-family:'Inter',sans-serif;
            display:flex;justify-content:center;align-items:center;
            min-height:100vh;color:#FFF;overflow:hidden;
        }

        .app{
            max-width:420px;width:100%;height:100vh;
            background:#0B0F17;
            position:relative;overflow:hidden;
            display:flex;flex-direction:column;
        }

        .main-content{
            flex:1;overflow-y:auto;
            padding:20px 16px 100px;
            scrollbar-width:none;
        }
        .main-content::-webkit-scrollbar{display:none}

        /* ===== BOTTOM NAV ===== */
        .bottom-nav{
            position:absolute;bottom:0;left:0;right:0;
            background:rgba(11,15,23,0.94);
            backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
            border-top:1px solid rgba(30,41,59,0.5);
            display:flex;justify-content:space-around;align-items:center;
            padding:6px 10px calc(14px + env(safe-area-inset-bottom));
            z-index:20;
        }
        .nav-item{
            display:flex;flex-direction:column;align-items:center;gap:3px;
            background:transparent;border:none;
            color:#3E4A5C;font-size:10px;font-weight:600;
            cursor:pointer;transition:color 0.25s;padding:4px 8px;
            letter-spacing:0.3px;
        }
        .nav-item.active{color:#22C55E}
        .nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.25s}

        .nav-add{
            background:linear-gradient(135deg,#22C55E,#16A34A);
            width:52px;height:52px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            margin-top:-24px;cursor:pointer;
            box-shadow:0 4px 20px rgba(34,197,94,0.35);
            border:3px solid #0B0F17;
            transition:transform 0.2s,box-shadow 0.2s;
        }
        .nav-add:active{transform:scale(0.92)}
        .nav-add svg{width:24px;height:24px;fill:#fff;stroke:none}

        /* ===== ANIMATIONS ===== */
        @keyframes screenIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
        @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.3)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}

        /* ===== BALANCE CARD ===== */
        .card-balance{
            background:linear-gradient(145deg,#111827,#0F172A);
            border-radius:24px;padding:22px 20px 20px;margin-bottom:22px;
            border:1px solid rgba(34,197,94,0.1);
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
            position:relative;overflow:hidden;
        }
        .card-balance::before{
            content:'';position:absolute;top:-50px;right:-50px;
            width:140px;height:140px;
            background:radial-gradient(circle,rgba(34,197,94,0.08),transparent 70%);
            border-radius:50%;pointer-events:none;
        }
        .card-balance::after{
            content:'';position:absolute;bottom:-30px;left:-30px;
            width:100px;height:100px;
            background:radial-gradient(circle,rgba(34,197,94,0.04),transparent 70%);
            border-radius:50%;pointer-events:none;
        }
        .balance-label{font-size:12px;color:#5A6A80;margin-bottom:6px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
        .balance-amount{font-size:34px;font-weight:800;margin-bottom:20px;letter-spacing:-1px;line-height:1.1;position:relative;z-index:1}
        .balance-amount.negative{color:#EF4444}

        .stats-row{display:flex;gap:10px;position:relative;z-index:1}
        .stat-card{
            flex:1;padding:14px 12px;border-radius:16px;
            background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.12);
            transition:transform 0.15s;
        }
        .stat-card:active{transform:scale(0.97)}
        .stat-card.expense{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.12)}
        .stat-label{font-size:11px;color:#5A6A80;font-weight:500}
        .stat-value{font-size:16px;font-weight:700;margin-top:4px;color:#22C55E}
        .stat-card.expense .stat-value{color:#EF4444}

        /* ===== SECTION HEADERS ===== */
        .section-header{display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px}
        .section-title{font-weight:700;font-size:15px;color:#D8E0EC}

        /* ===== CHART CARD ===== */
        .chart-card{
            background:#111827;border-radius:22px;padding:18px;margin-bottom:22px;
            border:1px solid #1E293B;
        }
        .chart-wrapper{position:relative;height:180px;display:flex;justify-content:center;align-items:center}
        canvas{max-height:160px}
        .legend-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center}
        .legend-item{
            display:flex;align-items:center;gap:5px;font-size:11px;
            background:#0F172A;padding:5px 12px;border-radius:30px;
            color:#8A96A8;font-weight:500;
        }
        .legend-dot{width:8px;height:8px;border-radius:10px;flex-shrink:0}
        .legend-amount{color:#D8E0EC;font-weight:600}

        /* ===== SUMMARY CARD ===== */
        .summary-card{background:#111827;border-radius:22px;padding:20px;margin-bottom:22px;border:1px solid #1E293B}
        .summary-row{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid rgba(30,41,59,0.4);font-size:14px;color:#94A3B8}
        .summary-row:last-child{border-bottom:none}
        .green{color:#22C55E;font-weight:600}
        .red{color:#EF4444;font-weight:600}

        /* ===== QUICK ACTIONS ===== */
        .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
        .quick-action{
            background:#111827;border-radius:18px;padding:16px;
            border:1px solid #1E293B;cursor:pointer;
            transition:all 0.2s;text-align:left;
        }
        .quick-action:active{transform:scale(0.97);background:#1A2030}
        .quick-action-icon{font-size:24px;margin-bottom:8px}
        .quick-action-label{font-size:13px;font-weight:600;color:#D8E0EC}
        .quick-action-sub{font-size:11px;color:#4B5B73;margin-top:2px}

        /* ===== RIWAYAT ===== */
        .riwayat-tabs{display:flex;gap:8px;margin-bottom:16px}
        .riwayat-tab{
            background:#111827;border:1px solid #1E293B;
            padding:7px 18px;border-radius:40px;
            font-size:13px;font-weight:600;cursor:pointer;
            color:#6B7A8E;transition:all 0.25s;
        }
        .riwayat-tab.active{background:#22C55E;border-color:#22C55E;color:#0B0F17}

        .tx-list{background:#111827;border-radius:22px;padding:4px 16px;border:1px solid #1E293B}
        .transaction-item{
            display:flex;align-items:center;gap:12px;
            padding:13px 0;border-bottom:1px solid rgba(30,41,59,0.35);
            position:relative;
        }
        .transaction-item:last-child{border-bottom:none}
        .transaction-icon{
            width:42px;height:42px;
            background:#1A2030;border-radius:14px;
            display:flex;align-items:center;justify-content:center;font-size:20px;
            flex-shrink:0;
        }
        .transaction-detail{flex:1;min-width:0}
        .transaction-name{font-weight:600;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#E2E8F0}
        .transaction-time{font-size:11px;color:#4B5B73}
        .transaction-amount{font-weight:700;font-size:14px;flex-shrink:0}
        .income-text{color:#22C55E}
        .expense-text{color:#EF4444}
        .transaction-delete{
            position:absolute;right:-4px;top:50%;transform:translateY(-50%);
            background:#EF444418;border:none;color:#EF4444;
            width:28px;height:28px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:13px;cursor:pointer;transition:0.2s;
            opacity:0;pointer-events:none;
        }
        .transaction-item:hover .transaction-delete,
        .transaction-item:active .transaction-delete{opacity:1;pointer-events:auto}
        @media(hover:none){
            .transaction-delete{opacity:0.35;pointer-events:auto}
        }
        .transaction-delete:active{background:#EF444440;transform:translateY(-50%) scale(1.15)}

        .empty-state{text-align:center;padding:36px 20px;color:#4B5B73}
        .empty-state-icon{font-size:44px;margin-bottom:10px;opacity:0.5}
        .empty-state-text{font-size:13px;font-weight:500}

        /* ===== CHAT ===== */
        .chat-area{display:flex;flex-direction:column;min-height:calc(100vh - 200px)}
        .chat-messages{flex:1;display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
        .message{display:flex;gap:8px;max-width:88%;animation:msgIn 0.3s ease}
        .message.user{align-self:flex-end;flex-direction:row-reverse}
        .message-avatar{
            width:30px;height:30px;
            background:#1A2030;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:14px;flex-shrink:0;
        }
        .message.user .message-avatar{background:#22C55E20}
        .message-bubble{
            background:#111827;padding:10px 14px;border-radius:18px;
            font-size:13px;line-height:1.55;
            border:1px solid #1E293B;
            white-space:pre-line;word-break:break-word;
        }
        .message.user .message-bubble{
            background:linear-gradient(135deg,#22C55E,#16A34A);
            color:#052E16;border:none;font-weight:500;
        }
        .message-time{font-size:10px;margin-top:4px;opacity:0.45}

        .quick-chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
        .quick-chip{
            background:#111827;border:1px solid #1E293B;
            padding:6px 14px;border-radius:30px;
            font-size:12px;color:#7E8A98;cursor:pointer;
            font-weight:500;transition:all 0.2s;
        }
        .quick-chip:active{background:#22C55E15;border-color:#22C55E;color:#22C55E}

        .chat-input-wrapper{
            display:flex;gap:8px;
            background:#111827;border-radius:32px;
            padding:5px 5px 5px 16px;
            border:1px solid #1E293B;
            transition:border-color 0.25s;
            margin-top:auto;
        }
        .chat-input-wrapper:focus-within{border-color:#22C55E40}
        .chat-input{
            flex:1;background:none;border:none;
            color:#FFF;font-size:14px;outline:none;
            font-family:inherit;
        }
        .chat-input::placeholder{color:#3E4A5C}
        .chat-send{
            background:linear-gradient(135deg,#22C55E,#16A34A);
            border:none;width:40px;height:40px;border-radius:30px;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;transition:transform 0.15s;flex-shrink:0;
        }
        .chat-send:active{transform:scale(0.9)}
        .chat-send svg{width:18px;height:18px;fill:#fff}

        /* ===== MODAL ===== */
        .modal-overlay{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.7);
            display:none;align-items:flex-end;
            z-index:100;
            backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
        }
        .modal-overlay.show{display:flex}
        .modal-content{
            background:#111827;width:100%;max-width:420px;margin:0 auto;
            border-radius:28px 28px 0 0;
            padding:20px 20px calc(24px + env(safe-area-inset-bottom));
            animation:slideUp 0.3s ease;
        }
        .modal-handle{width:40px;height:4px;background:#2D3A4E;border-radius:4px;margin:0 auto 16px}
        .modal-title{font-size:18px;font-weight:700;margin-bottom:2px}

        .type-toggle{display:flex;gap:10px;margin:14px 0}
        .type-btn{
            flex:1;padding:11px;border-radius:40px;
            background:#1A2030;border:1.5px solid transparent;
            color:#6B7A8E;font-weight:600;font-size:14px;
            cursor:pointer;transition:all 0.25s;font-family:inherit;
        }
        .type-btn.active-income{background:#22C55E18;border-color:#22C55E;color:#22C55E}
        .type-btn.active-expense{background:#EF444418;border-color:#EF4444;color:#EF4444}

        .category-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
        .category-item{
            text-align:center;padding:10px 4px;border-radius:14px;
            background:#1A2030;cursor:pointer;
            border:1.5px solid transparent;transition:all 0.2s;
            font-size:11px;font-weight:500;color:#6B7A8E;
        }
        .category-item .cat-icon{font-size:20px;display:block;margin-bottom:4px}
        .category-item.selected{background:#22C55E12;border-color:#22C55E;color:#22C55E}
        .category-item.selected.expense-cat{background:#EF444412;border-color:#EF4444;color:#EF4444}

        .form-input{
            width:100%;padding:13px 16px;border-radius:18px;
            background:#1A2030;border:1.5px solid #2D3A4E;
            color:#FFF;font-size:15px;font-family:inherit;
            outline:none;transition:border-color 0.25s;
        }
        .form-input:focus{border-color:#22C55E40}
        .form-input::placeholder{color:#3E4A5C}
        .form-input+.form-input{margin-top:10px}

        .btn-primary{
            background:linear-gradient(135deg,#22C55E,#16A34A);
            width:100%;padding:15px;border-radius:40px;border:none;
            font-weight:700;color:#052E16;font-size:15px;
            margin-top:16px;cursor:pointer;
            transition:transform 0.15s;font-family:inherit;
        }
        .btn-primary:active{transform:scale(0.97)}
        .btn-primary.expense-mode{background:linear-gradient(135deg,#EF4444,#DC2626);color:#FFF}
        .btn-danger{
            background:linear-gradient(135deg,#EF4444,#DC2626);
            width:100%;padding:14px;border-radius:40px;border:none;
            font-weight:700;color:#FFF;font-size:14px;
            margin-top:10px;cursor:pointer;font-family:inherit;
        }
        .btn-secondary{
            background:#1A2030;width:100%;padding:14px;border-radius:40px;
            border:1px solid #2D3A4E;font-weight:600;color:#6B7A8E;
            font-size:14px;margin-top:8px;cursor:pointer;font-family:inherit;
            transition:all 0.2s;
        }
        .btn-secondary:active{background:#2D3A4E;color:#D8E0EC}

        /* ===== TOAST ===== */
        .toast{
            position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
            background:#22C55E;color:#052E16;
            padding:10px 24px;border-radius:40px;
            font-size:13px;font-weight:600;z-index:200;
            opacity:0;pointer-events:none;
            transition:opacity 0.3s,transform 0.3s;
            box-shadow:0 4px 20px rgba(34,197,94,0.3);
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.error{background:#EF4444;color:#FFF;box-shadow:0 4px 20px rgba(239,68,68,0.3)}

        /* ===== CONFIRM DIALOG ===== */
        .confirm-overlay{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.8);
            display:none;align-items:center;justify-content:center;
            z-index:150;padding:20px;
            backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
        }
        .confirm-overlay.show{display:flex}
        .confirm-box{
            background:#111827;border-radius:24px;padding:24px;
            max-width:320px;width:100%;text-align:center;
            border:1px solid #1E293B;
            animation:scaleIn 0.25s ease;
        }
        .confirm-icon{font-size:40px;margin-bottom:12px}
        .confirm-title{font-size:17px;font-weight:700;margin-bottom:6px;color:#E2E8F0}
        .confirm-text{font-size:13px;color:#7E8A98;margin-bottom:20px;line-height:1.5}
        .confirm-btns{display:flex;gap:10px}
        .confirm-btns button{flex:1;padding:12px;border-radius:40px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;transition:0.2s}
        .confirm-cancel{background:#1A2030;border:1px solid #2D3A4E;color:#7E8A98}
        .confirm-cancel:active{background:#2D3A4E}
        .confirm-ok{background:#EF4444;border:none;color:#FFF}
        .confirm-ok:active{background:#DC2626}

        /* ===== PROFIL ===== */
        .profile-card{
            background:#111827;border-radius:24px;padding:28px 20px;
            border:1px solid #1E293B;margin-bottom:16px;text-align:center;
        }
        .profile-avatar{
            background:linear-gradient(135deg,#22C55E18,#22C55E06);
            width:76px;height:76px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 14px;font-size:34px;
            border:2px solid #22C55E25;
        }
        .profile-name{font-size:20px;font-weight:700}
        .profile-email{color:#4B5B73;font-size:13px;margin-top:4px}
        .profile-stats{display:flex;gap:8px;margin-top:20px}
        .profile-stat{
            flex:1;padding:14px 6px;
            background:#0F172A;border-radius:16px;
            border:1px solid #1E293B;
        }
        .profile-stat-value{font-size:18px;font-weight:700;color:#22C55E}
        .profile-stat-label{font-size:9px;color:#4B5B73;margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}

        .security-badge{
            background:#0F172A;border-radius:20px;padding:16px;
            text-align:center;border:1px solid #1E293B;
        }
        .security-badge .lock{font-size:18px;margin-bottom:4px}
        .security-badge p{font-size:12px;color:#4B5B73;line-height:1.5}

        /* ===== REDUCED MOTION ===== */
        @media(prefers-reduced-motion:reduce){
            *{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
        }
    </style>
</head>
<body>
<div class="app">
    <div class="main-content" id="mainContent"></div>

    <div class="bottom-nav">
        <button class="nav-item" data-nav="chat" aria-label="Chat">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Chat</span>
        </button>
        <button class="nav-item active" data-nav="dashboard" aria-label="Dashboard">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Dashboard</span>
        </button>
        <button class="nav-add" id="openModalBtn" aria-label="Tambah transaksi">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <button class="nav-item" data-nav="riwayat" aria-label="Riwayat">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Riwayat</span>
        </button>
        <button class="nav-item" data-nav="profil" aria-label="Profil">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profil</span>
        </button>
    </div>
</div>

<!-- Modal Tambah Transaksi -->
<div id="transactionModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title">Tambah Transaksi</div>
        <div class="type-toggle">
            <button class="type-btn active-income" data-type="income">Pemasukan</button>
            <button class="type-btn" data-type="expense">Pengeluaran</button>
        </div>
        <input type="number" id="modalAmount" class="form-input" placeholder="Jumlah (Rp)" inputmode="numeric">
        <div id="modalCategories" class="category-grid"></div>
        <input type="text" id="modalDesc" class="form-input" placeholder="Keterangan (opsional)">
        <button id="saveModalBtn" class="btn-primary">Simpan Transaksi</button>
    </div>
</div>

<!-- Confirm Dialog -->
<div id="confirmDialog" class="confirm-overlay">
    <div class="confirm-box">
        <div class="confirm-icon" id="confirmIcon">⚠️</div>
        <div class="confirm-title" id="confirmTitle">Konfirmasi</div>
        <div class="confirm-text" id="confirmText">Apakah kamu yakin?</div>
        <div class="confirm-btns">
            <button class="confirm-cancel" id="confirmCancel">Batal</button>
            <button class="confirm-ok" id="confirmOk">Hapus</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toastMsg" class="toast"></div>

<script>
// ==========================================
// DATA STORE (100% OFFLINE, localStorage)
// ==========================================
let transactions = JSON.parse(localStorage.getItem('finansbot_data')) || [
    { id: 1, type: 'income',  amount: 8500000, category: 'gaji',     desc: 'Gaji Bulanan',   date: new Date(Date.now() - 86400000).toISOString(), icon: '\u{1F4BC}' },
    { id: 2, type: 'expense', amount: 25000,   category: 'rokok',    desc: 'Rokok',          date: new Date(Date.now() - 3600000).toISOString(),  icon: '\u{1F6AC}' },

// ==========================================
function formatRupiah(amount) {
    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
}

function formatShortRupiah(amount) {
    if (amount >= 1000000000) return 'Rp' + (amount / 1000000000).toFixed(1) + 'M';
    if (amount >= 1000000) return 'Rp' + (amount / 1000000).toFixed(1) + 'jt';
    if (amount >= 1000) return 'Rp' + (amount / 1000).toFixed(0) + 'rb';
    return 'Rp' + amount;
}

function formatRelativeTime(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Baru saja';
    if (mins < 60) return mins + ' menit lalu';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + ' jam lalu';
    const days = Math.floor(hrs / 24);
    if (days < 7) return days + ' hari lalu';
    return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
}

function saveToLocal() {
    localStorage.setItem('finansbot_data', JSON.stringify(transactions));
}

function getSummary() {
    let income = 0, expense = 0;
    transactions.forEach(t => { if (t.type === 'income') income += t.amount; else expense += t.amount; });
    return { income, expense, balance: income - expense };
}

function getCategoryLabel(name, type) {
    const list = categoriesMap[type] || categoriesMap.expense;
    const found = list.find(c => c.name === name);
    return found ? found.label : name;
}

function showToast(message, isError) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = message;
    toast.className = 'toast' + (isError ? ' error' : '');
    void toast.offsetWidth;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

function showConfirm(icon, title, text, okText, callback) {
    const overlay = document.getElementById('confirmDialog');
    document.getElementById('confirmIcon').textContent = icon;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmText').textContent = text;
    document.getElementById('confirmOk').textContent = okText;
    overlay.classList.add('show');

    const okBtn = document.getElementById('confirmOk');
    const cancelBtn = document.getElementById('confirmCancel');
    const newOk = okBtn.cloneNode(true);
    const newCancel = cancelBtn.cloneNode(true);
    okBtn.parentNode.replaceChild(newOk, okBtn);
    cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);

    newOk.addEventListener('click', () => { overlay.classList.remove('show'); callback(true); });
    newCancel.addEventListener('click', () => { overlay.classList.remove('show'); callback(false); });
}

function renderExpenseChart() {

    const expenses = transactions.filter(t => t.type === 'expense');

    expenses.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });

    const labels = Object.keys(catTotals);
    const data = Object.values(catTotals);
    const palette = ['#22C55E','#EF4444','#F59E0B','#8B5CF6','#3B82F6','#EC4899','#14B8A6','#F97316','#6B7280','#06B6D4','#A855F7','#84CC16'];

    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    if (labels.length) {
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels.map(l => getCategoryLabel(l, 'expense')),
                datasets: [{ data, backgroundColor: palette.slice(0, labels.length), borderWidth: 0, hoverOffset: 6 }]
            },
            options: {
                responsive: true, maintainAspectRatio: true, cutout: '68%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1E293B', titleColor: '#E2E8F0', bodyColor: '#94A3B8',

            `<div class="legend-item"><div class="legend-dot" style="background:${palette[i % palette.length]}"></div>${getCategoryLabel(l, 'expense')} <span class="legend-amount">${formatShortRupiah(data[i])}</span></div>`

                    renderRiwayat();

function addChatMessage(role, text) {
    chatHistory.push({ role, text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
}

function sendChat() {
    const input = document.getElementById('chatInputField');
    if (!input) return;
    const msg = input.value.trim();
    if (!msg) return;

    addChatMessage('user', msg);
    input.value = '';
    renderChat();

    setTimeout(() => {
        const response = processChatCommand(msg);
        addChatMessage('bot', response);
        renderChat();
    }, 350 + Math.random() * 350);
}

function processChatCommand(text) {
    const lower = text.toLowerCase();

    if (lower.includes('saldo') || lower.includes('dashboard') || lower.includes('dasbor') || lower.includes('balance')) {
        const s = getSummary();
        return '\u{1F4CA} Ringkasan Keuangan:\n\n\u{1F4B5} Pemasukan: ' + formatRupiah(s.income) + '\n\u{1F4B8} Pengeluaran: ' + formatRupiah(s.expense) + '\n\u{1F4B0} Saldo: ' + formatRupiah(s.balance);
    }

    if (lower.includes('riwayat') || lower.includes('transaksi terakhir') || lower.includes('history')) {
        const last5 = transactions.slice(-5).reverse();
        if (!last5.length) return 'Belum ada transaksi tercatat.';
        let txt = '\u{1F4CB} 5 Transaksi Terbaru:\n\n';
        last5.forEach(t => { txt += t.icon + ' ' + t.desc + '  ' + (t.type === 'income' ? '+' : '-') + formatRupiah(t.amount) + '\n'; });
        return txt;
    }

    const amountMatch = text.match(/(\d+(?:[.,]\d+)*)\s*(rb|ribu|k|jt|juta)?/i);
    if (!amountMatch) return 'Aku tidak menangkap nominalnya. Coba kirim seperti:\n\u2022 "beli kopi 15rb"\n\u2022 "gaji 8.5jt"\n\u2022 "makan 25ribu"';

    let amount = parseFloat(amountMatch[1].replace(',', '.'));
    const unit = (amountMatch[2] || '').toLowerCase();
    if (unit === 'rb' || unit === 'ribu' || unit === 'k') amount *= 1000;
    if (unit === 'jt' || unit === 'juta') amount *= 1000000;
    if (isNaN(amount) || amount <= 0) return 'Nominal tidak valid. Gunakan angka positif.';

    let type = 'expense';
    const incomeKw = ['gaji','gajian','bonus','masuk','terima','jual','jualan','freelance','investasi','pendapatan','thr'];
    if (incomeKw.some(k => lower.includes(k))) type = 'income';

    let category = 'lainnya';
    let desc = text.replace(amountMatch[0], '').replace(/[^\w\s]/g, '').trim();
    if (!desc) desc = type === 'income' ? 'Pemasukan' : 'Pengeluaran';

    if (type === 'expense') {
        if (lower.includes('makan') || lower.includes('siang') || lower.includes('malam') || lower.includes('sarapan')) category = 'makanan';
        else if (lower.includes('minum') || lower.includes('es') || lower.includes('jus')) category = 'minuman';
        else if (lower.includes('rokok') || lower.includes('surya') || lower.includes('gudang')) category = 'rokok';
        else if (lower.includes('kopi') || lower.includes('ngopi') || lower.includes('coffee')) category = 'kopi';
        else if (lower.includes('transport') || lower.includes('bensin') || lower.includes('ojol') || lower.includes('grab') || lower.includes('gojek') || lower.includes('parkir')) category = 'transport';
        else if (lower.includes('belanja') || lower.includes('supermarket')) category = 'belanja';
        else if (lower.includes('nonton') || lower.includes('film') || lower.includes('bioskop') || lower.includes('hiburan') || lower.includes('game')) category = 'hiburan';
        else if (lower.includes('obat') || lower.includes('dokter') || lower.includes('sakit') || lower.includes('kesehatan') || lower.includes('apotek')) category = 'kesehatan';
        else if (lower.includes('sekolah') || lower.includes('kuliah') || lower.includes('kursus') || lower.includes('buku')) category = 'pendidikan';
        else if (lower.includes('listrik') || lower.includes('air') || lower.includes('internet') || lower.includes('tagihan') || lower.includes('bayar')) category = 'tagihan';
        else if (lower.includes('tabung') || lower.includes('nabung') || lower.includes('saving')) category = 'tabungan';
    } else {
        if (lower.includes('gaji') || lower.includes('gajian') || lower.includes('salary')) category = 'gaji';
        else if (lower.includes('bonus') || lower.includes('thr')) category = 'bonus';
        else if (lower.includes('jual') || lower.includes('jualan') || lower.includes('olshop')) category = 'jualan';
        else if (lower.includes('freelance') || lower.includes('project') || lower.includes('kerja')) category = 'freelance';
        else if (lower.includes('investasi') || lower.includes('saham') || lower.includes('crypto') || lower.includes('bunga')) category = 'investasi';
    }

    const catList = categoriesMap[type];
    const catObj = catList.find(c => c.name === category) || catList[catList.length - 1];

    const newTx = {
        id: Date.now(), type, amount, category,
        desc: desc.slice(0, 40),
        date: new Date().toISOString(),
        icon: catObj.icon
    };
    transactions.push(newTx);
    saveToLocal();

    const emoji = type === 'income' ? '\u{1F4B5}' : '\u{1F4B8}';
    const typeLabel = type === 'income' ? 'Pemasukan' : 'Pengeluaran';
    const newBalance = getSummary().balance;
    return emoji + ' Tercatat! ' + typeLabel + ' ' + formatRupiah(amount) + '\n\nKategori: ' + catObj.icon + ' ' + catObj.label + '\nCatatan: ' + desc + '\n\nSaldo sekarang: ' + formatRupiah(newBalance);
}

    document.getElementById('mainContent').innerHTML = html;

    document.getElementById('resetDataBtn')?.addEventListener('click', () => {
        showConfirm('\u{1F5D1}\uFE0F', 'Reset Semua Data', 'Semua transaksi akan dihapus secara permanen dan tidak bisa dikembalikan. Lanjutkan?', 'Hapus Semua', (ok) => {
            if (ok) {
                transactions = [];
                chatHistory = [];
                saveToLocal();
                showToast('Data berhasil direset');
                renderProfil();
            }
        });
    });

    document.getElementById('exportBtn')?.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(transactions, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'finansbot_' + new Date().toISOString().slice(0, 10) + '.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('Data berhasil diekspor');
    });
}

// ==========================================
// MODAL LOGIC
// ==========================================
function openModal() {
    document.getElementById('transactionModal').classList.add('show');
    document.getElementById('modalAmount').value = '';
    document.getElementById('modalDesc').value = '';
    updateModalUI();
    setTimeout(() => document.getElementById('modalAmount')?.focus(), 250);
}

function closeModal() {
    document.getElementById('transactionModal').classList.remove('show');
}

function updateModalUI() {
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.remove('active-income', 'active-expense');
        if (btn.dataset.type === currentType) {
            btn.classList.add(currentType === 'income' ? 'active-income' : 'active-expense');
        }
    });

    const container = document.getElementById('modalCategories');
    const list = categoriesMap[currentType];
    container.innerHTML = list.map(cat => `
        <div class="category-item ${selectedCategory === cat.name ? 'selected' : ''} ${currentType === 'expense' ? 'expense-cat' : ''}" data-cat="${cat.name}">
            <span class="cat-icon">${cat.icon}</span>${cat.label}
        </div>
    `).join('');

    const saveBtn = document.getElementById('saveModalBtn');
    saveBtn.className = 'btn-primary' + (currentType === 'expense' ? ' expense-mode' : '');

    document.querySelectorAll('.category-item').forEach(el => {
        el.addEventListener('click', () => {
            selectedCategory = el.dataset.cat;
            updateModalUI();
        });
    });
}

document.getElementById('openModalBtn')?.addEventListener('click', () => {
    currentType = 'expense';
    selectedCategory = 'makanan';
    openModal();
});

document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentType = btn.dataset.type;
        selectedCategory = categoriesMap[currentType][0].name;
        updateModalUI();
    });
});

document.getElementById('saveModalBtn')?.addEventListener('click', () => {
    const amount = parseFloat(document.getElementById('modalAmount').value);
    const desc = document.getElementById('modalDesc').value.trim() || getCategoryLabel(selectedCategory, currentType);
    if (isNaN(amount) || amount <= 0) { showToast('Masukkan nominal yang valid', true); return; }

    const catList = categoriesMap[currentType];
    const catItem = catList.find(c => c.name === selectedCategory) || catList[0];

    transactions.push({
        id: Date.now(), type: currentType, amount,
        category: selectedCategory, desc,
        date: new Date().toISOString(), icon: catItem.icon
    });
    saveToLocal();
    closeModal();
    showToast(currentType === 'income' ? 'Pemasukan dicatat!' : 'Pengeluaran dicatat!');

    if (currentScreen === 'dashboard') renderDashboard();
    else if (currentScreen === 'riwayat') renderRiwayat();
});

document.getElementById('transactionModal')?.addEventListener('click', (e) => {
    if (e.target === document.getElementById('transactionModal')) closeModal();
});

// ==========================================
// NAVIGATION
// ==========================================
function switchScreen(screen) {
    currentScreen = screen;
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    const activeNav = document.querySelector('.nav-item[data-nav="' + screen + '"]');
    if (activeNav) activeNav.classList.add('active');

    const mc = document.getElementById('mainContent');
    mc.scrollTop = 0;

    if (screen === 'dashboard') renderDashboard();
    else if (screen === 'riwayat') renderRiwayat();
    else if (screen === 'chat') renderChat();
    else if (screen === 'profil') renderProfil();
}

document.querySelectorAll('.nav-item').forEach(nav => {
    nav.addEventListener('click', () => switchScreen(nav.dataset.nav));
});

// ==========================================
// INIT
// ==========================================
switchScreen('dashboard');
</script>
