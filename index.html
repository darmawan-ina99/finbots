<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinansBot · Laporan Harian & Bulanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:radial-gradient(circle at 20% 30%,#0a0e1a,#03060c);font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#fff}
        .app{max-width:450px;width:100%;height:100vh;height:100dvh;background:rgba(8,12,20,.75);backdrop-filter:blur(2px);position:relative;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 45px rgba(0,0,0,.5),0 0 0 1px rgba(34,197,94,.15)}
        .main-content{flex:1;overflow-y:auto;padding:16px 14px 88px;scrollbar-width:thin}
        .main-content::-webkit-scrollbar{width:3px}
        .main-content::-webkit-scrollbar-track{background:#1e293b;border-radius:10px}
        .main-content::-webkit-scrollbar-thumb{background:#22c55e;border-radius:10px}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:450px;margin:0 auto;background:rgba(15,20,30,.9);backdrop-filter:blur(20px);border-top:1px solid rgba(34,197,94,.3);box-shadow:0 -8px 20px rgba(0,0,0,.3);display:flex;justify-content:space-around;align-items:center;padding:6px 12px 18px;z-index:20}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:0 0;border:none;color:#8ca3b9;font-size:10px;font-weight:600;cursor:pointer;transition:.25s;padding:4px 0}
        .nav-item.active{color:#22C55E;filter:drop-shadow(0 0 6px #22c55e80)}
        .nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;transition:.2s}
        /* Login */
        .login-container{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,rgba(34,197,94,.05),transparent)}
        .login-logo{width:100px;height:100px;margin-bottom:28px;border-radius:30px;overflow:hidden;box-shadow:0 16px 30px -8px rgba(34,197,94,.4),0 0 0 2px rgba(34,197,94,.3)}
        .login-logo img{width:100%;height:100%;object-fit:cover}
        .login-title{font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
        .login-title .asisten{color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.3)}
        .login-title .keuangan{color:#22C55E;text-shadow:0 0 8px #22C55E80}
        .login-sub{font-size:13px;color:#a0b3d0;margin-bottom:28px}
        .login-input{width:100%;background:rgba(17,24,39,.7);backdrop-filter:blur(8px);border:1px solid rgba(34,197,94,.4);border-radius:60px;padding:14px 18px;font-size:15px;color:#fff;margin-bottom:16px;outline:none;transition:.2s;text-align:center;letter-spacing:2px;box-shadow:0 4px 10px rgba(0,0,0,.2)}
        .login-input:focus{border-color:#22C55E;box-shadow:0 0 15px rgba(34,197,94,.3)}
        .login-btn{width:100%;background:linear-gradient(135deg,#22C55E,#15803d);border:none;border-radius:60px;padding:13px;font-weight:800;font-size:15px;color:#fff;cursor:pointer;transition:.2s;box-shadow:0 8px 18px -4px rgba(34,197,94,.4);letter-spacing:.5px}
        .login-btn:active{transform:scale(.97)}
        .login-error{color:#FFB3B3;font-size:12px;margin-top:10px;display:none}

        /* Chat */
        .chat-area{display:flex;flex-direction:column;height:100%}
        .chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:6px;scrollbar-width:none}
        .chat-messages::-webkit-scrollbar{display:none}
        .date-separator{text-align:center;font-size:10px;font-weight:500;color:#a0b3d0;margin:12px 0 6px}
        .date-separator span{background:rgba(17,24,39,.7);backdrop-filter:blur(8px);padding:3px 12px;border-radius:30px;display:inline-block;border:.5px solid rgba(34,197,94,.25)}
        .message-row{display:flex;gap:7px;margin-bottom:3px;max-width:88%;clear:both}
        .message-row.bot{align-self:flex-start}
        .message-row.user{align-self:flex-end;flex-direction:row-reverse}
        .message-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#1E293B;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3);border:1px solid rgba(34,197,94,.25)}
        .message-avatar img{width:100%;height:100%;object-fit:cover}
        .message-avatar .default-avatar{font-size:14px}
        .message-bubble-wrapper{max-width:calc(100% - 42px)}
        .message-bubble{background:rgba(17,24,39,.85);backdrop-filter:blur(10px);padding:9px 13px;border-radius:18px;font-size:12.5px;line-height:1.45;border:1px solid rgba(34,197,94,.18);white-space:pre-line;word-break:break-word;box-shadow:0 3px 10px rgba(0,0,0,.2)}
        .message-row.user .message-bubble{background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff;border:none;font-weight:500;box-shadow:0 4px 12px rgba(34,197,94,.3)}
        .message-time{font-size:9px;opacity:.6;margin-top:3px;text-align:right}
        .message-row.user .message-time{text-align:left}
        .chat-input-wrapper{display:flex;gap:8px;background:rgba(17,24,39,.8);backdrop-filter:blur(12px);border-radius:40px;padding:4px 4px 4px 16px;border:1px solid rgba(34,197,94,.35);transition:.2s;margin-top:10px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
        .chat-input-wrapper:focus-within{border-color:#22C55E;box-shadow:0 0 10px rgba(34,197,94,.35)}
        .chat-input{flex:1;background:0 0;border:none;color:#fff;font-size:13px;outline:none;font-family:inherit;padding:9px 0}
        .chat-input::placeholder{color:#7e8a98}
        .chat-send{background:#22C55E;border:none;width:40px;height:40px;border-radius:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(34,197,94,.4)}
        .chat-send:active{transform:scale(.9)}

        /* Dashboard */
        .greeting-box{background:rgba(17,24,39,.7);backdrop-filter:blur(10px);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:12px 16px;margin-bottom:14px;border-left:4px solid #22C55E;box-shadow:0 8px 20px rgba(0,0,0,.2)}
        .greeting-text{font-size:13px;font-weight:500;color:#e2e8f0}
        .user-name{font-weight:700;color:#22C55E;text-shadow:0 0 6px #22C55E50}
        .card-balance{background:linear-gradient(145deg,rgba(17,24,39,.8),rgba(8,12,24,.8));backdrop-filter:blur(10px);border:1px solid rgba(34,197,94,.2);border-radius:24px;padding:18px 16px;margin-bottom:14px;box-shadow:0 12px 28px rgba(0,0,0,.3)}
        .balance-label{font-size:10px;color:#b9c7da;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
        .balance-amount{font-size:26px;font-weight:800;letter-spacing:-.5px;text-shadow:0 2px 5px rgba(0,0,0,.3);margin:4px 0 10px}
        .stats-row{display:flex;gap:8px}
        .stat-card{background:rgba(0,0,0,.3);border-radius:16px;padding:10px 12px;border:1px solid rgba(34,197,94,.15);backdrop-filter:blur(4px);flex:1}
        .stat-label{font-size:9px;color:#b9c7da;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
        .stat-value{font-size:14px;font-weight:700;color:#22C55E;margin-top:2px}
        .stat-card.expense .stat-value{color:#EF4444}
        .section-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
        .section-title{font-size:12px;font-weight:700;color:#e2e8f0;letter-spacing:.2px}
        .chart-card{background:rgba(17,24,39,.7);backdrop-filter:blur(10px);border:1px solid rgba(34,197,94,.18);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.25)}
        .chart-wrapper{max-width:180px;margin:0 auto}
        .chart-wrapper canvas{width:100%!important;height:100%!important}
        .legend-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center}
        .legend-item{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);border-radius:20px;padding:4px 10px;font-size:10px;color:#cbd5e1;font-weight:500}
        .legend-dot{width:8px!important;height:8px!important;border-radius:8px}
        .summary-card{background:rgba(17,24,39,.7);backdrop-filter:blur(10px);border:1px solid rgba(34,197,94,.18);border-radius:20px;padding:14px 16px;box-shadow:0 10px 24px rgba(0,0,0,.25);margin-top:12px}
        .summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(34,197,94,.08);font-size:11.5px;color:#b9c7da}
        .summary-row:last-child{border-bottom:none}
        .summary-row .green{color:#22C55E;font-weight:600}
        .summary-row .red{color:#EF4444;font-weight:600}
        .tx-list{background:rgba(17,24,39,.5);border-radius:20px;padding:2px 12px;border:1px solid rgba(34,197,94,.12)}
        .transaction-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid rgba(34,197,94,.1)}
        .transaction-item:last-child{border-bottom:none}
        .transaction-icon{width:32px;height:32px;border-radius:12px;background:rgba(30,41,59,.7);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.2)}
        .transaction-detail{flex:1;min-width:0}
        .transaction-name{font-size:11.5px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .transaction-meta{font-size:9.5px;color:#7e8a98;margin-top:1px}
        .transaction-amount{font-size:11.5px;font-weight:700;white-space:nowrap}
        .income-text{color:#22C55E}
        .expense-text{color:#EF4444}
        .group-header{font-size:10px;font-weight:700;color:#a0b3d0;margin:12px 0 6px;padding-bottom:2px;border-bottom:1px dashed rgba(34,197,94,.2)}
        .group-summary{font-size:9px;color:#6B7280;text-align:right;margin-top:-4px;margin-bottom:6px}

        /* Riwayat */
        .filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
        .filter-btn{background:rgba(17,24,39,.7);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:6px 14px;font-size:10px;color:#b9c7da;font-weight:600;cursor:pointer;transition:.2s}
        .filter-btn.active{background:#22C55E;color:#fff;border-color:#22C55E}
        .report-toggle{display:flex;gap:8px;margin-bottom:12px}
        .report-btn{background:rgba(17,24,39,.7);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:6px 14px;font-size:10px;color:#b9c7da;font-weight:600;cursor:pointer;transition:.2s}
        .report-btn.active{background:#3B82F6;border-color:#3B82F6;color:#fff}

        /* Profil */
        .profile-card{background:rgba(17,24,39,.7);backdrop-filter:blur(10px);border:1px solid rgba(34,197,94,.2);border-radius:28px;padding:24px 18px;text-align:center;box-shadow:0 12px 28px rgba(0,0,0,.3)}
        .profile-avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;margin:0 auto 12px;border:2px solid #22C55E;box-shadow:0 6px 16px rgba(34,197,94,.3)}
        .profile-avatar img{width:100%;height:100%;object-fit:cover}
        .profile-name{font-size:18px;margin-bottom:2px}
        .profile-name .asisten{color:#fff;font-weight:700}
        .profile-name .keuangan{color:#22C55E;font-weight:800;text-shadow:0 0 6px #22C55E60}
        .profile-email{font-size:11px;color:#7e8a98;margin-bottom:14px}
        .name-input-group{display:flex;gap:8px;margin-bottom:4px}
        .name-input{flex:1;background:#1E293B;border:1px solid #22C55E60;border-radius:60px;padding:9px 14px;font-size:12px;color:#fff;outline:none}
        .name-input:focus{border-color:#22C55E;box-shadow:0 0 8px rgba(34,197,94,.25)}
        .name-save-btn{background:#22C55E;border:none;border-radius:60px;padding:9px 16px;font-size:11px;font-weight:700;color:#fff;cursor:pointer}
        .btn-danger,.btn-secondary,.btn-logout{display:block;width:100%;border:none;border-radius:60px;padding:11px;font-weight:700;font-size:12px;color:#fff;cursor:pointer;transition:.2s;margin-top:10px}
        .btn-danger{background:#EF4444;box-shadow:0 4px 10px #EF444430}
        .btn-secondary{background:#1E293B;border:1px solid #4B5563}
        .btn-logout{background:#3B4252}
        .footer-badge{text-align:center;background:rgba(15,23,42,.5);padding:10px;border-radius:20px;margin:16px 0 4px;font-size:10px;color:#4B5563}
        .empty-state{text-align:center;padding:28px 16px;color:#7e8a98;font-size:12px}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#22C55E;color:#fff;padding:10px 22px;border-radius:40px;font-size:12px;font-weight:700;z-index:999;box-shadow:0 8px 20px rgba(34,197,94,.4);transition:transform .35s cubic-bezier(.4,0,.2,1);pointer-events:none}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.25s}
        .modal-overlay.show{opacity:1;pointer-events:auto}
        .modal-box{background:#111827;border:1px solid rgba(34,197,94,.3);border-radius:24px;padding:24px 20px;max-width:320px;width:100%;text-align:center}
        .modal-title{font-size:15px;font-weight:700;margin-bottom:8px}
        .modal-desc{font-size:12px;color:#9CA3AF;margin-bottom:18px}
        .modal-actions{display:flex;gap:10px}
        .modal-actions button{flex:1;border:none;border-radius:60px;padding:10px;font-size:12px;font-weight:700;cursor:pointer}
        .modal-cancel{background:#374151;color:#9CA3AF}
        .modal-confirm{background:#EF4444;color:#fff}
    </style>
</head>
<body>
<div class="app">
    <div id="loginScreen" class="login-container">
        <div class="login-logo"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Logo"></div>
        <div class="login-title"><span class="asisten">Asisten</span> <span class="keuangan">Keuangan</span></div>
        <div class="login-sub">Catat keuangan semudah chat · Laporan Harian & Bulanan</div>
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" autocomplete="off">
        <button id="loginBtn" class="login-btn">MASUK</button>
        <div id="loginError" class="login-error">Password salah! Gunakan "abc123"</div>
    </div>

    <div id="mainApp" style="display:none;flex:1;flex-direction:column;height:100%">
        <div class="main-content" id="mainContent"></div>
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-item" data-nav="chat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></button>
            <button class="nav-item" data-nav="dashboard"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard</span></button>
            <button class="nav-item" data-nav="riwayat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Riwayat</span></button>
            <button class="nav-item" data-nav="profil"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profil</span></button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast">✓ Tersimpan</div>
<div id="confirmModal" class="modal-overlay"><div class="modal-box"><div class="modal-title" id="modalTitle">Hapus Data?</div><div class="modal-desc" id="modalDesc">Semua transaksi akan dihapus permanen.</div><div class="modal-actions"><button class="modal-cancel" id="modalCancel">Batal</button><button class="modal-confirm" id="modalConfirm">Hapus</button></div></div></div>

<script>
// ========== DATA ==========
let transactions = JSON.parse(localStorage.getItem('finansbot_clean_data')) || [
    {id:1,type:'income',amount:5000000,category:'gaji',desc:'Gaji Pokok',date:new Date(Date.now()-86400000).toISOString(),icon:'💼'},
    {id:2,type:'expense',amount:25000,category:'makanan',desc:'Ayam Goreng',date:new Date(Date.now()-7200000).toISOString(),icon:'🍗'},
    {id:3,type:'expense',amount:15000,category:'minuman',desc:'Es Teh',date:new Date(Date.now()-10800000).toISOString(),icon:'🧋'},
    {id:4,type:'expense',amount:40000,category:'transport',desc:'Gojek',date:new Date(Date.now()-14400000).toISOString(),icon:'🚗'}
];
let userName = localStorage.getItem('finansbot_user_name') || 'Pengguna';
let riwayatFilter = 'semua';
let reportView = 'harian'; // 'harian' atau 'bulanan'

const categoryMap = {
    income:[{name:'gaji',label:'Gaji',icon:'💼'},{name:'bonus',label:'Bonus',icon:'🎁'},{name:'jualan',label:'Jualan',icon:'🛒'},{name:'lainnya',label:'Lainnya',icon:'💰'}],
    expense:[{name:'makanan',label:'Makanan',icon:'🍗'},{name:'minuman',label:'Minuman',icon:'🧋'},{name:'transport',label:'Transport',icon:'🚗'},{name:'belanja',label:'Belanja',icon:'🛍️'},{name:'hiburan',label:'Hiburan',icon:'🎬'},{name:'rokok',label:'Rokok',icon:'🚬'},{name:'kopi',label:'Kopi',icon:'☕'},{name:'lainnya',label:'Lainnya',icon:'📦'}]
};

let currentScreen = 'chat';
let chartInstance = null;
let chatHistory = [];
let isLoggedIn = false;

// ========== UTILS ==========
function formatRupiah(n){return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n)}
function formatShortRupiah(n){if(n>=1e6)return'Rp'+(n/1e6).toFixed(1)+'jt';if(n>=1e3)return'Rp'+(n/1e3).toFixed(0)+'rb';return'Rp'+n}
function getRelativeTime(d){const df=Date.now()-new Date(d).getTime(),m=Math.floor(df/60000);if(m<1)return'baru saja';if(m<60)return m+' menit lalu';const h=Math.floor(m/60);if(h<24)return h+' jam lalu';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}
function saveToLocal(){localStorage.setItem('finansbot_clean_data',JSON.stringify(transactions));localStorage.setItem('finansbot_user_name',userName)}
function getSummary(){let i=0,e=0;transactions.forEach(t=>{if(t.type==='income')i+=t.amount;else e+=t.amount});return{income:i,expense:e,balance:i-e}}
function getGreeting(){const h=new Date().getHours();if(h<12)return'Selamat pagi';if(h<15)return'Selamat siang';if(h<19)return'Selamat sore';return'Selamat malam'}
function showToast(msg,err=false){const t=document.getElementById('toastMsg');t.textContent=msg;t.style.background=err?'#EF4444':'#22C55E';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function showConfirm(title,desc,onConfirm){
    const m=document.getElementById('confirmModal');
    document.getElementById('modalTitle').textContent=title;
    document.getElementById('modalDesc').textContent=desc;
    m.classList.add('show');
    document.getElementById('modalCancel').onclick=()=>m.classList.remove('show');
    document.getElementById('modalConfirm').onclick=()=>{m.classList.remove('show');onConfirm()};
}

// ========== PARSING CHAT (dengan perintah laporan) ==========
function parseTransactionFromText(text){
    const lower=text.toLowerCase();
    if(lower.includes('saldo')||lower.includes('dashboard')||lower.includes('ringkasan'))return{command:'summary'};
    if(lower.includes('riwayat')||lower.includes('transaksi terakhir')||lower.includes('history'))return{command:'history'};
    if(lower.includes('laporan harian')||lower.includes('laporan hari ini'))return{command:'laporan_harian'};
    if(lower.includes('laporan bulanan')||lower.includes('laporan bulan ini'))return{command:'laporan_bulanan'};
    const am=text.match(/(\d+(?:[.,]\d+)?)\s*(rb|ribu|k|jt|juta)?/i);
    if(!am)return null;
    let amount=parseFloat(am[1].replace(',','.'));
    const unit=(am[2]||'').toLowerCase();
    if(unit==='rb'||unit==='ribu'||unit==='k')amount*=1000;
    if(unit==='jt'||unit==='juta')amount*=1000000;
    if(isNaN(amount)||amount<=0)return null;
    let type='expense';
    const ek=['beli','bayar','membayar','belanja','keluar','habis'];
    const ik=['dapat','mendapat','bonus','menerima','pembayaran','terima','gaji','masuk','pendapatan'];
    let isE=ek.some(k=>lower.includes(k)),isI=ik.some(k=>lower.includes(k));
    if(isI&&!isE)type='income';else if(isE)type='expense';else if(lower.includes('gaji')||lower.includes('bonus'))type='income';
    let desc=text.replace(am[0],'').trim();
    desc=desc.replace(/^(beli|bayar|membayar|dapat|mendapat|menerima|pembayaran|terima)/i,'').trim();
    if(!desc)desc=type==='income'?'Pemasukan':'Pengeluaran';
    desc=desc.slice(0,40);
    let category='lainnya';
    if(type==='expense'){
        if(lower.includes('makan')||lower.includes('ayam')||lower.includes('nasi'))category='makanan';
        else if(lower.includes('minum')||lower.includes('teh')||lower.includes('es'))category='minuman';
        else if(lower.includes('rokok'))category='rokok';
        else if(lower.includes('kopi'))category='kopi';
        else if(lower.includes('transport')||lower.includes('bensin')||lower.includes('gojek'))category='transport';
        else if(lower.includes('belanja'))category='belanja';
        else if(lower.includes('nonton')||lower.includes('film'))category='hiburan';
    }else{
        if(lower.includes('gaji'))category='gaji';
        else if(lower.includes('bonus'))category='bonus';
        else if(lower.includes('jual'))category='jualan';
    }
    const cl=categoryMap[type],co=cl.find(c=>c.name===category)||cl[cl.length-1];
    return{command:'add',type,amount,category,desc,icon:co.icon};
}
function addTransactionFromChat(p){const tx={id:Date.now(),type:p.type,amount:p.amount,category:p.category,desc:p.desc,date:new Date().toISOString(),icon:p.icon};transactions.push(tx);saveToLocal();return tx}

// ========== LAPORAN HARIAN & BULANAN (untuk chat) ==========
function getLaporanHarian(){
    const today=new Date();today.setHours(0,0,0,0);
    const startOfDay=today;
    const endOfDay=new Date(today);endOfDay.setHours(23,59,59,999);
    const hariIni=transactions.filter(t=>new Date(t.date)>=startOfDay&&new Date(t.date)<=endOfDay);
    let totalIncome=0,totalExpense=0;
    hariIni.forEach(t=>{if(t.type==='income')totalIncome+=t.amount;else totalExpense+=t.amount});
    return `📅 *Laporan Harian (${today.toLocaleDateString('id-ID')})*\n💵 Pemasukan: ${formatRupiah(totalIncome)}\n💸 Pengeluaran: ${formatRupiah(totalExpense)}\n💰 Saldo harian: ${formatRupiah(totalIncome-totalExpense)}`;
}
function getLaporanBulanan(){
    const now=new Date();
    const startOfMonth=new Date(now.getFullYear(),now.getMonth(),1);
    const endOfMonth=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
    const bulanIni=transactions.filter(t=>new Date(t.date)>=startOfMonth&&new Date(t.date)<=endOfMonth);
    let totalIncome=0,totalExpense=0;
    bulanIni.forEach(t=>{if(t.type==='income')totalIncome+=t.amount;else totalExpense+=t.amount});
    return `📆 *Laporan Bulanan (${now.toLocaleDateString('id-ID',{month:'long',year:'numeric'})})*\n💵 Pemasukan: ${formatRupiah(totalIncome)}\n💸 Pengeluaran: ${formatRupiah(totalExpense)}\n💰 Saldo bulan ini: ${formatRupiah(totalIncome-totalExpense)}`;
}

// ========== CHAT RENDER ==========
function renderChat(){
    const groups={};
    chatHistory.forEach(msg=>{
        const d=msg.timestamp,today=new Date(),yest=new Date(today);
        today.setHours(0,0,0,0);yest.setDate(yest.getDate()-1);yest.setHours(0,0,0,0);
        let key;
        if(d.toDateString()===today.toDateString())key='Hari ini';
        else if(d.toDateString()===yest.toDateString())key='Kemarin';
        else key=d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
        if(!groups[key])groups[key]=[];groups[key].push(msg);
    });
    let mh='';
    for(const[dl,msgs]of Object.entries(groups)){
        mh+=`<div class="date-separator"><span>${dl}</span></div>`;
        msgs.forEach(msg=>{
            const ib=msg.role==='bot';
            const av=ib?`<div class="message-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="logo"></div>`:`<div class="message-avatar"><div class="default-avatar">👤</div></div>`;
            mh+=`<div class="message-row ${msg.role}">${av}<div class="message-bubble-wrapper"><div class="message-bubble">${msg.text}</div><div class="message-time">${msg.timeStr}</div></div></div>`;
        });
    }
    const wh=chatHistory.length===0?`
        <div class="date-separator"><span>Hari ini</span></div>
        <div class="message-row bot">
            <div class="message-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="logo"></div>
            <div class="message-bubble-wrapper">
                <div class="message-bubble">👋 ${getGreeting()}, ${userName}!\n\n✍️ <strong>Asisten Keuangan</strong> siap membantu.\nCukup ketik transaksi seperti:\n• "beli ayam 25rb"\n• "dapat bonus 500rb"\n• "bayar listrik 150rb"\n\n📊 Ketik "saldo", "riwayat", "laporan harian", atau "laporan bulanan"</div>
                <div class="message-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
            </div>
        </div>`:'';
    document.getElementById('mainContent').innerHTML=`<div class="chat-area"><div class="chat-messages" id="chatMessagesList">${wh}${mh}</div><div class="chat-input-wrapper"><input type="text" id="chatInputField" class="chat-input" placeholder="Ketik transaksi di sini..." autocomplete="off"><button id="chatSendBtn" class="chat-send"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button></div></div>`;
    setTimeout(()=>{const md=document.getElementById('chatMessagesList');if(md)md.scrollTop=md.scrollHeight},50);
    document.getElementById('chatSendBtn')?.addEventListener('click',sendChatMessage);
    document.getElementById('chatInputField')?.addEventListener('keypress',e=>{if(e.key==='Enter')sendChatMessage()});
}
function addChatMessage(role,text){const n=new Date();chatHistory.push({role,text,timestamp:n,timeStr:n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});if(chatHistory.length>200)chatHistory=chatHistory.slice(-150)}
function sendChatMessage(){
    const inp=document.getElementById('chatInputField'),msg=inp.value.trim();
    if(!msg)return;inp.value='';
    addChatMessage('user',msg);renderChat();
    setTimeout(()=>{
        const p=parseTransactionFromText(msg);let r='';
        if(!p){r='😅 Tidak ada nominal atau perintah yang dikenali.\nContoh: "beli nasi 15rb", "laporan harian", "saldo"';addChatMessage('bot',r);renderChat();return}
        if(p.command==='summary'){const s=getSummary();r=`📊 Ringkasan ${userName}\n💵 Pemasukan: ${formatRupiah(s.income)}\n💸 Pengeluaran: ${formatRupiah(s.expense)}\n💰 Saldo: ${formatRupiah(s.balance)}`;addChatMessage('bot',r);renderChat();return}
        if(p.command==='history'){const l5=[...transactions].reverse().slice(0,5);if(!l5.length)r='Belum ada transaksi.';else r='📋 5 Transaksi Terakhir:\n'+l5.map(t=>`${t.icon} ${t.desc}: ${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}`).join('\n');addChatMessage('bot',r);renderChat();return}
        if(p.command==='laporan_harian'){r=getLaporanHarian();addChatMessage('bot',r);renderChat();return}
        if(p.command==='laporan_bulanan'){r=getLaporanBulanan();addChatMessage('bot',r);renderChat();return}
        if(p.command==='add'){addTransactionFromChat(p);const s=getSummary();r=`✅ Tersimpan!\n${p.type==='income'?'➕ Pemasukan':'➖ Pengeluaran'} ${formatRupiah(p.amount)} untuk ${p.desc}\n💳 Saldo: ${formatRupiah(s.balance)}`;addChatMessage('bot',r);renderChat();if(currentScreen==='dashboard')renderDashboard();if(currentScreen==='riwayat')renderRiwayat();return}
        r='Format tidak dikenali.';addChatMessage('bot',r);renderChat();
    },300);
}

// ========== RIWAYAT dengan laporan harian & bulanan ==========
function renderRiwayat(){
    const s=getSummary();
    let filtered=[...transactions].reverse();
    if(riwayatFilter==='income')filtered=filtered.filter(t=>t.type==='income');
    else if(riwayatFilter==='expense')filtered=filtered.filter(t=>t.type==='expense');

    let grouped;
    if(reportView==='harian'){
        grouped={};
        filtered.forEach(t=>{
            const d=new Date(t.date);
            const key=d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
            if(!grouped[key])grouped[key]={items:[],income:0,expense:0};
            grouped[key].items.push(t);
            if(t.type==='income')grouped[key].income+=t.amount;
            else grouped[key].expense+=t.amount;
        });
    }else{
        grouped={};
        filtered.forEach(t=>{
            const d=new Date(t.date);
            const key=d.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
            if(!grouped[key])grouped[key]={items:[],income:0,expense:0};
            grouped[key].items.push(t);
            if(t.type==='income')grouped[key].income+=t.amount;
            else grouped[key].expense+=t.amount;
        });
    }

    let itemsHtml='';
    for(const [label,data] of Object.entries(grouped)){
        itemsHtml+=`<div class="group-header">📌 ${label} ${reportView==='bulanan'?'':''}</div>`;
        itemsHtml+=`<div class="group-summary">💵 +${formatRupiah(data.income)} &nbsp; 💸 -${formatRupiah(data.expense)} &nbsp; Saldo: ${formatRupiah(data.income-data.expense)}</div>`;
        data.items.forEach(t=>{
            itemsHtml+=`<div class="transaction-item"><div class="transaction-icon">${t.icon}</div><div class="transaction-detail"><div class="transaction-name">${t.desc}</div><div class="transaction-meta">${getRelativeTime(t.date)} · ${t.category}</div></div><div class="transaction-amount ${t.type==='income'?'income-text':'expense-text'}">${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}</div></div>`;
        });
    }
    if(!Object.keys(grouped).length) itemsHtml='<div class="empty-state">Belum ada transaksi</div>';

    const html=`
        <div class="stats-row" style="margin-bottom:12px">
            <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div>
            <div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div>
        </div>
        <div class="report-toggle">
            <button class="report-btn ${reportView==='harian'?'active':''}" data-view="harian">📅 Harian</button>
            <button class="report-btn ${reportView==='bulanan'?'active':''}" data-view="bulanan">📆 Bulanan</button>
        </div>
        <div class="filter-row">
            <button class="filter-btn ${riwayatFilter==='semua'?'active':''}" data-filter="semua">Semua</button>
            <button class="filter-btn ${riwayatFilter==='income'?'active':''}" data-filter="income">Pemasukan</button>
            <button class="filter-btn ${riwayatFilter==='expense'?'active':''}" data-filter="expense">Pengeluaran</button>
        </div>
        <div class="tx-list">${itemsHtml}</div>
    `;
    document.getElementById('mainContent').innerHTML=html;
    document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{riwayatFilter=b.dataset.filter;renderRiwayat()}));
    document.querySelectorAll('.report-btn').forEach(b=>b.addEventListener('click',()=>{reportView=b.dataset.view;renderRiwayat()}));
}

// ========== DASHBOARD ==========
function renderDashboard(){
    const s=getSummary();
    const recent=transactions.slice(-3).reverse();
    let rh=recent.map(t=>`<div class="transaction-item"><div class="transaction-icon">${t.icon}</div><div class="transaction-detail"><div class="transaction-name">${t.desc}</div><div class="transaction-meta">${getRelativeTime(t.date)}</div></div><div class="transaction-amount ${t.type==='income'?'income-text':'expense-text'}">${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}</div></div>`).join('');
    const html=`
        <div class="greeting-box"><div class="greeting-text">${getGreeting()}, <span class="user-name">${userName}</span> 👋</div></div>
        <div class="card-balance"><div class="balance-label">Saldo Tersedia</div><div class="balance-amount">${formatRupiah(s.balance)}</div><div class="stats-row"><div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div><div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div></div></div>
        <div class="section-header"><div class="section-title">📊 Grafik Pengeluaran</div></div>
        <div class="chart-card"><div class="chart-wrapper"><canvas id="expenseChartCanvas"></canvas></div><div id="legendContainer" class="legend-list"></div></div>
        <div class="summary-card"><div class="section-title">Ringkasan</div><div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div><div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div><div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div></div>
        <div class="section-header"><div class="section-title">🕒 Transaksi Terbaru</div></div><div class="tx-list">${rh||'<div class="empty-state">Belum ada transaksi</div>'}</div>
        <div class="footer-badge">🔒 100% Offline · Laporan Harian & Bulanan</div>`;
    document.getElementById('mainContent').innerHTML=html;
    setTimeout(()=>{
        const ctx=document.getElementById('expenseChartCanvas')?.getContext('2d');
        if(!ctx)return;
        const exp=transactions.filter(t=>t.type==='expense');
        const ct={};exp.forEach(e=>{ct[e.category]=(ct[e.category]||0)+e.amount});
        const labels=Object.keys(ct),data=Object.values(ct),colors=['#22C55E','#EF4444','#F59E0B','#8B5CF6','#3B82F6','#EC4899','#14B8A6','#F97316'];
        if(chartInstance)chartInstance.destroy();
        if(labels.length){
            chartInstance=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors.slice(0,labels.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,cutout:'68%',plugins:{legend:{display:false},tooltip:{bodyFont:{size:11},titleFont:{size:11}}}}});
            const catLabels={makanan:'Makanan',minuman:'Minuman',transport:'Transport',belanja:'Belanja',hiburan:'Hiburan',rokok:'Rokok',kopi:'Kopi',lainnya:'Lainnya'};
            document.getElementById('legendContainer').innerHTML=labels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${colors[i%colors.length]}"></div>${catLabels[l]||l} ${formatShortRupiah(data[i])}</div>`).join('');
        }else{
            document.getElementById('legendContainer').innerHTML='<div style="color:#6B7280;font-size:10px;">Belum ada pengeluaran</div>';
        }
    },60);
}

// ========== PROFIL ==========
function renderProfil(){
    const s=getSummary(),total=transactions.length,ic=transactions.filter(t=>t.type==='income').length,ec=total-ic;
    const html=`
        <div class="profile-card"><div class="profile-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Avatar"></div><div class="profile-name"><span class="asisten">Asisten</span> <span class="keuangan">Keuangan</span></div><div class="profile-email">pengguna@finansbot.id</div><div class="name-input-group"><input type="text" id="editNameInput" class="name-input" placeholder="Nama panggilan" value="${userName}"><button id="saveNameBtn" class="name-save-btn">Simpan</button></div><div class="stats-row" style="margin-top:10px"><div class="stat-card"><div class="stat-label">Transaksi</div><div class="stat-value">${total}</div></div><div class="stat-card"><div class="stat-label">Masuk</div><div class="stat-value" style="color:#22C55E">${ic}</div></div><div class="stat-card expense"><div class="stat-label">Keluar</div><div class="stat-value" style="color:#EF4444">${ec}</div></div></div></div>
        <div class="summary-card"><div class="section-title">Ringkasan</div><div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div><div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div><div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div></div>
        <button id="exportBtn" class="btn-secondary">📥 Ekspor ke JSON</button><button id="resetDataBtn" class="btn-danger">🗑 Hapus Semua Data</button><button id="logoutBtn" class="btn-logout">🚪 Logout</button>`;
    document.getElementById('mainContent').innerHTML=html;
    document.getElementById('saveNameBtn')?.addEventListener('click',()=>{const n=document.getElementById('editNameInput').value.trim();if(n){userName=n;saveToLocal();showToast('Nama diperbarui ✓');renderProfil()}else showToast('Nama tidak boleh kosong',true);});
    document.getElementById('resetDataBtn')?.addEventListener('click',()=>{showConfirm('Hapus Semua Data?','Semua transaksi akan dihapus permanen.',()=>{transactions=[];chatHistory=[];saveToLocal();showToast('Data dihapus');renderProfil();});});
    document.getElementById('exportBtn')?.addEventListener('click',()=>{const b=new Blob([JSON.stringify(transactions,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`finansbot_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);showToast('Data diekspor ✓');});
    document.getElementById('logoutBtn')?.addEventListener('click',()=>logout());
}

// ========== NAVIGATION ==========
function switchScreen(screen){
    currentScreen=screen;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.nav-item[data-nav="${screen}"]`)?.classList.add('active');
    if(screen==='chat')renderChat();
    else if(screen==='dashboard')renderDashboard();
    else if(screen==='riwayat')renderRiwayat();
    else if(screen==='profil')renderProfil();
}

// ========== AUTH ==========
function login(pwd){if(pwd==='abc123'){isLoggedIn=true;document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='flex';switchScreen('chat');showToast(`${getGreeting()}, ${userName}! 👋`);}else{const err=document.getElementById('loginError');err.style.display='block';setTimeout(()=>err.style.display='none',2500);}}
function logout(){isLoggedIn=false;chatHistory=[];document.getElementById('mainApp').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('passwordInput').value='';showToast('Logout berhasil',true);}

document.getElementById('loginBtn').addEventListener('click',()=>login(document.getElementById('passwordInput').value));
document.getElementById('passwordInput').addEventListener('keypress',e=>{if(e.key==='Enter')login(e.target.value)});
document.querySelectorAll('.nav-item').forEach(nav=>nav.addEventListener('click',()=>{if(isLoggedIn)switchScreen(nav.dataset.nav)}));
</script>
