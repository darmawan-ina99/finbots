<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#03060c" id="themeColorMeta">
    <title>Asisten Finance · Kelola Uang Bijak</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ========== CSS VARIABLES (DEFAULT DARK) ========== */
        :root {
            --bg: #03060c;
            --bg-app: rgba(8,12,20,.78);
            --fg: #f1f5f9;
            --muted: #64748b;
            --accent: #00dc82;
            --accent-dim: rgba(0,220,130,.15);
            --accent-glow: rgba(0,220,130,.35);
            --card: rgba(15,20,32,.75);
            --card-solid: #111827;
            --border: rgba(0,220,130,.18);
            --border-focus: rgba(0,220,130,.5);
            --danger: #f43f5e;
            --danger-dim: rgba(244,63,94,.15);
            --info: #38bdf8;
            --warning: #f59e0b;
            --header-bg: rgba(12,16,28,.7);
            --input-bg: rgba(17,24,39,.7);
            --input-border: var(--border);
            --toast-bg: rgba(0,220,130,.9);
            --toast-error: rgba(244,63,94,.9);
            --modal-bg: #111827;
            --chart-text: #cbd5e1;
        }

        /* ========== LIGHT THEME ========== */
        body.light {
            --bg: #f0f4f8;
            --bg-app: rgba(245,248,250,.85);
            --fg: #1e293b;
            --muted: #5b6e8c;
            --accent: #059669;
            --accent-dim: rgba(5,150,105,.12);
            --accent-glow: rgba(5,150,105,.25);
            --card: rgba(255,255,255,.75);
            --card-solid: #ffffff;
            --border: rgba(5,150,105,.2);
            --border-focus: rgba(5,150,105,.5);
            --danger: #dc2626;
            --danger-dim: rgba(220,38,38,.1);
            --info: #0284c7;
            --warning: #d97706;
            --header-bg: rgba(255,255,255,.85);
            --input-bg: rgba(255,255,255,.9);
            --input-border: rgba(5,150,105,.2);
            --toast-bg: rgba(5,150,105,.9);
            --toast-error: rgba(220,38,38,.9);
            --modal-bg: #ffffff;
            --chart-text: #334155;
        }

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:var(--fg);overflow:hidden;transition:background .25s ease, color .2s ease}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 25% 20%,rgba(0,220,130,.04),transparent 55%),radial-gradient(ellipse at 75% 80%,rgba(56,189,248,.03),transparent 55%);animation:bgPulse 12s ease-in-out infinite alternate;pointer-events:none;z-index:0}
        body.light::before{opacity:0.3}
        @keyframes bgPulse{0%{opacity:.6}100%{opacity:1}}

        .app{max-width:450px;width:100%;height:100vh;height:100dvh;background:var(--bg-app);backdrop-filter:blur(2px);position:relative;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 45px rgba(0,0,0,.5),0 0 0 1px var(--border);z-index:1;transition:background .25s ease}

        /* ========== HEADER ========== */
        .app-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;background:var(--header-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:15}
        .header-left{display:flex;align-items:center;gap:12px}
        .app-header .logo{width:36px;height:36px;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px var(--accent-glow)}
        .app-header .logo img{width:100%;height:100%;object-fit:cover}
        .app-header .app-name{font-size:18px;font-weight:700;letter-spacing:-.3px}
        .app-header .app-name span:first-child{color:var(--fg)}
        .app-header .app-name span:last-child{color:var(--accent);text-shadow:0 0 8px var(--accent-glow)}
        .theme-toggle{background:var(--card);border:1px solid var(--border);border-radius:40px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
        .theme-toggle:hover{background:var(--accent-dim)}
        .theme-toggle svg{width:18px;height:18px;stroke:var(--fg);fill:none;stroke-width:2;transition:stroke .2s}
        body.light .theme-toggle svg{stroke:#1e293b}

        /* ========== SCROLLABLE CONTENT ========== */
        .main-content{flex:1;overflow-y:auto;padding:16px 14px 88px;scrollbar-width:thin;scroll-behavior:smooth}
        .main-content::-webkit-scrollbar{width:3px}
        .main-content::-webkit-scrollbar-track{background:transparent}
        .main-content::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}

        /* ========== BOTTOM NAV ========== */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:450px;margin:0 auto;background:rgba(12,16,28,.92);backdrop-filter:blur(24px);border-top:1px solid var(--border);box-shadow:0 -8px 24px rgba(0,0,0,.35);display:flex;justify-content:space-around;align-items:center;padding:6px 12px 20px;z-index:20}
        body.light .bottom-nav{background:rgba(255,255,255,.92)}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:0 0;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:.25s;padding:6px 10px;border-radius:12px;position:relative}
        .nav-item.active{color:var(--accent);filter:drop-shadow(0 0 6px var(--accent-glow))}
        .nav-item.active::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--accent);border-radius:4px;box-shadow:0 0 8px var(--accent-glow)}
        .nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:.2s}
        .nav-item:active svg{transform:scale(.85)}

        /* ========== LOGIN ========== */
        .login-container{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,var(--accent-dim),transparent)}
        .login-logo{width:100px;height:100px;margin-bottom:28px;border-radius:30px;overflow:hidden;box-shadow:0 16px 40px -8px var(--accent-glow),0 0 0 2px var(--border);animation:logoPulse 3s ease-in-out infinite}
        @keyframes logoPulse{0%,100%{box-shadow:0 16px 40px -8px var(--accent-glow),0 0 0 2px var(--border)}50%{box-shadow:0 16px 50px -4px var(--accent-glow),0 0 0 3px var(--border-focus)}}
        .login-logo img{width:100%;height:100%;object-fit:cover}
        .login-title{font-size:28px;font-weight:800;margin-bottom:6px}
        .login-title .asisten{color:var(--fg)}
        .login-title .keuangan{color:var(--accent);text-shadow:0 0 10px var(--accent-glow)}
        .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
        .login-input{width:100%;background:var(--input-bg);backdrop-filter:blur(8px);border:1px solid var(--input-border);border-radius:60px;padding:14px 18px;font-size:15px;color:var(--fg);margin-bottom:16px;outline:none;text-align:center;letter-spacing:2px;font-family:inherit;transition:.2s}
        .login-input:focus{border-color:var(--accent);box-shadow:0 0 20px var(--accent-dim)}
        .login-btn{width:100%;background:linear-gradient(135deg,var(--accent),#059669);border:none;border-radius:60px;padding:14px;font-weight:800;font-size:15px;color:#fff;cursor:pointer;transition:.2s;box-shadow:0 8px 24px -4px var(--accent-glow);font-family:inherit}
        .login-btn:active{transform:scale(.97)}
        .login-error{color:#fca5a5;font-size:12px;margin-top:10px;display:none;animation:shake .4s ease}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

        /* ========== CHAT ========== */
        .chat-area{display:flex;flex-direction:column;height:100%}
        .chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:6px;scrollbar-width:thin}
        .chat-messages::-webkit-scrollbar{width:2px}
        .chat-messages::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}
        .date-separator{text-align:center;font-size:10px;font-weight:500;color:var(--muted);margin:14px 0 8px}
        .date-separator span{background:var(--card);backdrop-filter:blur(8px);padding:3px 14px;border-radius:30px;display:inline-block;border:.5px solid var(--border)}
        .message-row{display:flex;gap:7px;margin-bottom:3px;max-width:88%;clear:both;animation:msgIn .35s ease-out both}
        @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message-row.bot{align-self:flex-start}
        .message-row.user{align-self:flex-end;flex-direction:row-reverse}
        .message-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#1e293b;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3);border:1px solid var(--border)}
        .message-avatar img{width:100%;height:100%;object-fit:cover}
        .message-avatar .default-avatar{font-size:14px}
        .message-bubble-wrapper{max-width:calc(100% - 42px)}
        .message-bubble{background:var(--card);backdrop-filter:blur(10px);padding:10px 14px;border-radius:18px;font-size:12.5px;line-height:1.5;border:1px solid var(--border);white-space:pre-line;word-break:break-word;box-shadow:0 3px 12px rgba(0,0,0,.15)}
        .message-bubble strong{color:var(--accent);font-weight:700}
        .message-row.user .message-bubble{background:linear-gradient(135deg,var(--accent),#059669);color:#fff;border:none;font-weight:500;box-shadow:0 4px 16px var(--accent-glow)}
        .message-time{font-size:9px;opacity:.5;margin-top:3px;text-align:right}
        .message-row.user .message-time{text-align:left}
        .typing-indicator{display:flex;gap:4px;padding:12px 16px;align-self:flex-start;animation:msgIn .3s ease-out both}
        .typing-indicator .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.5;animation:typingBounce 1.2s ease-in-out infinite}
        .typing-indicator .dot:nth-child(2){animation-delay:.15s}
        .typing-indicator .dot:nth-child(3){animation-delay:.3s}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
        .chat-input-wrapper{display:flex;gap:8px;background:var(--input-bg);backdrop-filter:blur(16px);border-radius:40px;padding:4px 4px 4px 16px;border:1px solid var(--border);transition:.25s;margin-top:10px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
        .chat-input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 16px var(--accent-dim),0 4px 16px rgba(0,0,0,.2)}
        .chat-input{flex:1;background:0 0;border:none;color:var(--fg);font-size:13px;outline:none;font-family:inherit;padding:10px 0}
        .chat-input::placeholder{color:var(--muted)}
        .chat-send{background:var(--accent);border:none;width:40px;height:40px;border-radius:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;box-shadow:0 2px 10px var(--accent-glow)}
        .chat-send:active{transform:scale(.88)}
        .chat-send svg{transition:.15s}

        /* ========== DASHBOARD / RIWAYAT / PROFIL ========== */
        .greeting-box{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:20px;padding:14px 18px;margin-bottom:14px;border-left:4px solid var(--accent);animation:fadeSlideUp .4s ease-out both}
        .greeting-text{font-size:13px;font-weight:500;color:var(--fg)}
        .user-name{font-weight:700;color:var(--accent)}
        @keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .card-balance{background:linear-gradient(145deg,var(--card),rgba(0,0,0,.1));backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:24px;padding:20px 18px;margin-bottom:14px;position:relative;overflow:hidden}
        .balance-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
        .balance-amount{font-size:28px;font-weight:800;margin:6px 0 14px;letter-spacing:-.5px}
        .stats-row{display:flex;gap:8px}
        .stat-card{background:rgba(0,0,0,.15);border-radius:16px;padding:10px 12px;border:1px solid rgba(255,255,255,.05);flex:1;transition:.2s}
        .stat-card:hover{border-color:var(--border);background:rgba(0,0,0,.2)}
        .stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600}
        .stat-value{font-size:14px;font-weight:700;color:var(--accent);margin-top:3px}
        .stat-card.expense .stat-value{color:var(--danger)}
        .section-header{display:flex;justify-content:space-between;margin:16px 0 8px;align-items:center}
        .section-title{font-size:12px;font-weight:700;color:var(--fg)}
        .chart-card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:20px;padding:16px}
        .chart-wrapper{max-width:180px;margin:0 auto}
        .legend-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;justify-content:center}
        .legend-item{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--chart-text)}
        .legend-dot{width:8px;height:8px;border-radius:8px}
        .summary-card{background:var(--card);backdrop-filter:blur(10px);border-radius:20px;padding:14px 18px;margin-top:12px;border:1px solid var(--border)}
        .summary-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11.5px;color:var(--muted)}
        .summary-row:last-child{border-bottom:none}
        .summary-row .green{color:var(--accent);font-weight:600}
        .summary-row .red{color:var(--danger);font-weight:600}
        .tx-list{background:rgba(0,0,0,.2);border-radius:20px;padding:2px 12px;border:1px solid var(--border)}
        .transaction-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,.04);position:relative;transition:.15s}
        .transaction-item:last-child{border-bottom:none}
        .transaction-item:hover{background:var(--accent-dim);border-radius:12px}
        .transaction-icon{width:34px;height:34px;border-radius:12px;background:rgba(30,41,59,.6);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1px solid rgba(255,255,255,.04)}
        .transaction-detail{flex:1;min-width:0}
        .transaction-name{font-size:11.5px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .transaction-meta{font-size:9.5px;color:var(--muted);margin-top:1px}
        .transaction-amount{font-size:11.5px;font-weight:700;flex-shrink:0}
        .income-text{color:var(--accent)}
        .expense-text{color:var(--danger)}
        .action-buttons{display:flex;gap:5px;align-items:center;flex-shrink:0}
        .act-btn{background:rgba(255,255,255,.06);border:none;border-radius:10px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;padding:0}
        .act-btn:active{transform:scale(.85)}
        .act-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
        .act-btn.edit-btn{color:var(--info)}
        .act-btn.edit-btn:hover{background:rgba(56,189,248,.15)}
        .act-btn.del-btn{color:var(--danger)}
        .act-btn.del-btn:hover{background:var(--danger-dim)}
        .search-bar{display:flex;gap:8px;margin-bottom:10px}
        .search-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:40px;padding:9px 16px;font-size:12px;color:var(--fg);outline:none;font-family:inherit;transition:.2s}
        .search-input:focus{border-color:var(--accent);box-shadow:0 0 12px var(--accent-dim)}
        .group-header{font-size:10px;font-weight:700;color:var(--muted);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px dashed var(--border)}
        .group-summary{font-size:9px;color:var(--muted);text-align:right;margin-top:-2px;margin-bottom:6px}
        .filter-row,.report-toggle{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
        .filter-btn,.report-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:10px;color:var(--muted);font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
        .filter-btn.active,.report-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 10px var(--accent-glow)}
        .btn-pdf{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:6px 14px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
        .btn-pdf:hover{background:rgba(139,92,246,.25)}
        .warning-banner{background:var(--danger-dim);border-left:3px solid var(--danger);padding:10px 14px;border-radius:12px;margin-bottom:12px;font-size:11px;line-height:1.5;color:#fca5a5}
        .profile-card{background:var(--card);backdrop-filter:blur(10px);border-radius:28px;padding:28px 20px;text-align:center;border:1px solid var(--border);animation:fadeSlideUp .4s ease-out both}
        .profile-avatar{width:76px;height:76px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:2px solid var(--accent);box-shadow:0 0 20px var(--accent-dim)}
        .profile-avatar img{width:100%;height:100%;object-fit:cover}
        .profile-name{font-size:18px;font-weight:700;margin-bottom:2px}
        .profile-name .keuangan{color:var(--accent)}
        .profile-email{font-size:11px;color:var(--muted);margin-bottom:16px}
        .name-input-group{display:flex;gap:8px;margin-bottom:4px}
        .name-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:60px;padding:9px 14px;font-size:12px;color:var(--fg);outline:none;font-family:inherit;transition:.2s}
        .name-input:focus{border-color:var(--accent);box-shadow:0 0 12px var(--accent-dim)}
        .name-save-btn{background:var(--accent);border:none;border-radius:60px;padding:9px 18px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;transition:.2s}
        .btn-danger,.btn-secondary,.btn-logout{display:block;width:100%;border:none;border-radius:60px;padding:12px;font-weight:700;font-size:12px;color:#fff;cursor:pointer;margin-top:10px;font-family:inherit;transition:.2s}
        .btn-danger{background:var(--danger);box-shadow:0 4px 12px var(--danger-dim)}
        .btn-secondary{background:var(--card-solid);border:1px solid var(--border);color:var(--fg)}
        .btn-logout{background:var(--card-solid);border:1px solid rgba(255,255,255,.08);color:var(--muted)}
        .footer-badge{text-align:center;background:rgba(0,0,0,.2);padding:10px;border-radius:20px;margin:16px 0 4px;font-size:10px;color:var(--muted)}
        .empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:12px}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 24px;border-radius:40px;font-size:12px;font-weight:700;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;backdrop-filter:blur(12px)}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.success{background:var(--toast-bg);color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
        .toast.error{background:var(--toast-error);color:#fff}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.25s}
        .modal-overlay.show{opacity:1;pointer-events:auto}
        .modal-overlay.show .modal-box{transform:scale(1);opacity:1}
        .modal-box{background:var(--modal-bg);border:1px solid var(--border);border-radius:24px;padding:24px 20px;max-width:320px;width:100%;text-align:center;transform:scale(.92);opacity:0;transition:.25s cubic-bezier(.34,1.56,.64,1)}
        .modal-title{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--fg)}
        .modal-desc{font-size:12px;color:var(--muted);margin-bottom:18px;text-align:left;line-height:1.5}
        .modal-actions{display:flex;gap:10px}
        .modal-actions button{flex:1;border:none;border-radius:60px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
        .modal-cancel{background:#374151;color:#9ca3af}
        .modal-confirm{background:var(--danger);color:#fff}
        .modal-confirm.green{background:var(--accent);color:#fff}
        .modal-desc label{display:block;margin-bottom:6px;font-size:11px;font-weight:600;color:var(--fg)}
        .modal-desc select{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:9px 12px;font-size:12px;color:var(--fg);outline:none;font-family:inherit}

        :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:12px}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
        input,select{font-family:inherit}
    </style>
</head>
<body>

<script>
/* ========== DATA & STATE ========== */
let transactions = JSON.parse(localStorage.getItem('finansbot_data_v2')) || [
    {id:1,type:'income',amount:5000000,category:'gaji',desc:'Gaji Pokok',date:new Date(Date.now()-86400000).toISOString(),icon:'💼'},
    {id:2,type:'expense',amount:25000,category:'makanan',desc:'Ayam Goreng',date:new Date(Date.now()-7200000).toISOString(),icon:'🍗'},
    {id:3,type:'expense',amount:15000,category:'minuman',desc:'Es Teh Manis',date:new Date(Date.now()-10800000).toISOString(),icon:'🧋'},
    {id:4,type:'expense',amount:40000,category:'transport',desc:'Gojek ke Kantor',date:new Date(Date.now()-14400000).toISOString(),icon:'🚗'}
];
let userName = localStorage.getItem('finansbot_user_v2') || 'Pengguna';
let riwayatFilter = 'semua';
let reportView = 'harian';
let searchQuery = '';
let currentScreen = 'chat';
let chartInstance = null;
let chatHistory = [];
let isLoggedIn = false;
let editingId = null;

const categoryMap = {
    income:[
        {name:'gaji',label:'Gaji',icon:'💼'},
        {name:'bonus',label:'Bonus',icon:'🎁'},
        {name:'jualan',label:'Jualan',icon:'🛒'},
        {name:'lainnya',label:'Lainnya',icon:'💰'}
    ],
    expense:[
        {name:'makanan',label:'Makanan',icon:'🍗'},
        {name:'minuman',label:'Minuman',icon:'🧋'},
        {name:'transport',label:'Transport',icon:'🚗'},
        {name:'belanja',label:'Belanja',icon:'🛍️'},
        {name:'hiburan',label:'Hiburan',icon:'🎬'},
        {name:'rokok',label:'Rokok',icon:'🚬'},
        {name:'kopi',label:'Kopi',icon:'☕'},
        {name:'lainnya',label:'Lainnya',icon:'📦'}
    ]
};
const catLabels = {makanan:'Makanan',minuman:'Minuman',transport:'Transport',belanja:'Belanja',hiburan:'Hiburan',rokok:'Rokok',kopi:'Kopi',lainnya:'Lainnya',gaji:'Gaji',bonus:'Bonus',jualan:'Jualan'};
const chartColors = ['#00dc82','#f43f5e','#f59e0b','#8b5cf6','#38bdf8','#ec4899','#14b8a6','#f97316'];

/* ========== UTILITAS ========== */
function formatRupiah(n){return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n)}
function formatShortRupiah(n){if(n>=1e6)return'Rp'+(n/1e6).toFixed(1)+'jt';if(n>=1e3)return'Rp'+(n/1e3).toFixed(0)+'rb';return'Rp'+n}
function getRelativeTime(d){const df=Date.now()-new Date(d).getTime(),m=Math.floor(df/60000);if(m<1)return'baru saja';if(m<60)return m+' menit lalu';const h=Math.floor(m/60);if(h<24)return h+' jam lalu';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}
function saveToLocal(){localStorage.setItem('finansbot_data_v2',JSON.stringify(transactions));localStorage.setItem('finansbot_user_v2',userName)}
function getSummary(){let i=0,e=0;transactions.forEach(t=>{if(t.type==='income')i+=t.amount;else e+=t.amount});return{income:i,expense:e,balance:i-e}}
function getGreeting(){const h=new Date().getHours();if(h<12)return'Selamat pagi';if(h<15)return'Selamat siang';if(h<19)return'Selamat sore';return'Selamat malam'}

function showToast(msg,isError=false){const t=document.getElementById('toastMsg');t.textContent=msg;t.className='toast '+(isError?'error':'success');requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>t.classList.remove('show'),2400)}

function showConfirm(title,desc,onConfirm){const m=document.getElementById('confirmModal');document.getElementById('modalTitle').textContent=title;document.getElementById('modalDesc').textContent=desc;m.classList.add('show');const close=()=>m.classList.remove('show');document.getElementById('modalCancel').onclick=close;document.getElementById('modalConfirm').onclick=()=>{close();onConfirm()};}

function getExpenseToIncomeRatio(){const{income,expense}=getSummary();return income===0?0:expense/income}
function getWarningMessage(){const r=getExpenseToIncomeRatio();if(r>0.7){const p=Math.round(r*100);return`\n\n⚠️ PERINGATAN! Pengeluaran sudah ${p}% dari pemasukan (ideal <70%).\n💡 "Hemat pangkal kaya, bijak itu keren."\n📌 Evaluasi pengeluaran, buat anggaran mingguan, sisihkan minimal 20% untuk tabungan.`;}return''}

/* ========== IKON SVG UNTUK TOMBOL ========== */
const svgEdit='<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
const svgDel='<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';

/* ========== EDIT & DELETE ========== */
function openEditById(id){const tx=transactions.find(t=>t.id===id);if(!tx)return;editingId=id;document.getElementById('editAmount').value=tx.amount;document.getElementById('editDesc').value=tx.desc;const catList=categoryMap[tx.type];const sel=document.getElementById('editCategory');sel.innerHTML=catList.map(c=>`<option value="${c.name}"${c.name===tx.category?' selected':''}>${c.icon} ${c.label}</option>`).join('');document.getElementById('editModal').classList.add('show')}
function saveEdit(){const amt=parseFloat(document.getElementById('editAmount').value);if(isNaN(amt)||amt<=0){showToast('Jumlah tidak valid',true);return}const ndesc=document.getElementById('editDesc').value.trim()||'Transaksi';const ncat=document.getElementById('editCategory').value;const idx=transactions.findIndex(t=>t.id===editingId);if(idx===-1)return;const old=transactions[idx];const newIcon=categoryMap[old.type].find(c=>c.name===ncat)?.icon||'📦';transactions[idx]={...old,amount:amt,desc:ndesc,category:ncat,icon:newIcon};saveToLocal();showToast('Transaksi diperbarui');document.getElementById('editModal').classList.remove('show');refreshCurrentScreen()}
function deleteTransaction(id){showConfirm('Hapus Transaksi','Yakin ingin menghapus transaksi ini?',()=>{transactions=transactions.filter(t=>t.id!==id);saveToLocal();showToast('Transaksi dihapus');refreshCurrentScreen()})}
function refreshCurrentScreen(){if(currentScreen==='riwayat')renderRiwayat();else if(currentScreen==='dashboard')renderDashboard()}

document.getElementById('editCancelBtn').addEventListener('click',()=>document.getElementById('editModal').classList.remove('show'));
document.getElementById('editSaveBtn').addEventListener('click',saveEdit);

/* ========== EKSPOR PDF ========== */
async function exportToPDF(){const{jsPDF}=window.jspdf;const doc=new jsPDF();const s=getSummary();const d=new Date().toLocaleDateString('id-ID');doc.setFontSize(16);doc.text('Laporan Keuangan - '+userName,20,20);doc.setFontSize(10);doc.text('Tanggal: '+d,20,30);doc.text('Pemasukan: '+formatRupiah(s.income),20,42);doc.text('Pengeluaran: '+formatRupiah(s.expense),20,50);doc.text('Saldo Akhir: '+formatRupiah(s.balance),20,58);let y=72;doc.setFontSize(11);doc.text('Daftar Transaksi:',20,y);y+=10;doc.setFontSize(9);const sorted=[...transactions].reverse();for(let tx of sorted){const line=tx.icon+' '+tx.desc+' ('+tx.category+') : '+(tx.type==='income'?'+':'-')+formatRupiah(tx.amount)+' - '+new Date(tx.date).toLocaleDateString('id-ID');if(y>275){doc.addPage();y=20}doc.text(line,20,y);y+=8}doc.save('laporan_keuangan_'+userName+'_'+d.replace(/\//g,'-')+'.pdf');showToast('PDF berhasil diekspor')}

/* ========== PARSING CHAT ========== */
function isGreeting(text){const l=text.toLowerCase();return['selamat pagi','selamat siang','selamat sore','selamat malam','pagi','siang','sore','malam','halo','hai','hi','hello'].some(g=>l===g||l.startsWith(g+' '))}
function parseTransactionFromText(text){const lower=text.toLowerCase();
    if(isGreeting(text))return{command:'greeting'};
    if(lower.includes('saldo')||lower.includes('dashboard')||lower.includes('ringkasan'))return{command:'summary'};
    if(lower.includes('riwayat')||lower.includes('transaksi terakhir'))return{command:'history'};
    if(lower.includes('laporan harian'))return{command:'laporan_harian'};
    if(lower.includes('laporan bulanan'))return{command:'laporan_bulanan'};
    if(lower.includes('bantuan')||lower.includes('help')||lower.includes('bantu'))return{command:'help'};
    const am=lower.match(/(?:rp\.?\s?)?(\d+(?:[.,]\d+)*)\s*(rb|ribu|k|jt|juta)?/i);
    if(!am)return null;
    let amount=parseFloat(am[1].replace(',','.'));
    const unit=(am[2]||'').toLowerCase();
    if(unit==='rb'||unit==='ribu'||unit==='k')amount*=1000;
    if(unit==='jt'||unit==='juta')amount*=1000000;
    if(isNaN(amount)||amount<=0||amount>1e10)return null;
    let type='expense';
    const ek=['beli','bayar','membayar','belanja','keluar','habis','spending'];
    const ik=['dapat','mendapat','bonus','menerima','pembayaran','terima','gaji','masuk','pendapatan','transfer'];
    let isE=ek.some(k=>lower.includes(k)),isI=ik.some(k=>lower.includes(k));
    if(isI&&!isE)type='income';else if(isE)type='expense';else if(lower.includes('gaji')||lower.includes('bonus'))type='income';
    let desc=text.replace(am[0],'').trim();
    desc=desc.replace(/^(beli|bayar|membayar|dapat|mendapat|menerima|pembayaran|terima|spending)\s*/i,'').trim();
    desc=desc.replace(/^rp\.?\s*\d*[.,]?\d*\s*(rb|ribu|k|jt|juta)?\s*/i,'').trim();
    if(!desc)desc=type==='income'?'Pemasukan':'Pengeluaran';
    desc=desc.slice(0,40);
    let category='lainnya';
    if(type==='expense'){
        if(lower.includes('makan')||lower.includes('ayam')||lower.includes('nasi'))category='makanan';
        else if(lower.includes('minum')||lower.includes('teh')||lower.includes('es'))category='minuman';
        else if(lower.includes('rokok'))category='rokok';
        else if(lower.includes('kopi'))category='kopi';
        else if(lower.includes('transport')||lower.includes('bensin')||lower.includes('gojek'))category='transport';
        else if(lower.includes('belanja'))category='belanja';
        else if(lower.includes('nonton')||lower.includes('film'))category='hiburan';
    }else{
        if(lower.includes('gaji'))category='gaji';
        else if(lower.includes('bonus'))category='bonus';
        else if(lower.includes('jual'))category='jualan';
    }
    const cl=categoryMap[type],co=cl.find(c=>c.name===category)||cl[cl.length-1];
    return{command:'add',type,amount,category,desc,icon:co.icon};
}
function addTransactionFromChat(p){const tx={id:Date.now(),type:p.type,amount:p.amount,category:p.category,desc:p.desc,date:new Date().toISOString(),icon:p.icon};transactions.push(tx);saveToLocal();return tx}
function getLaporanHarian(){const today=new Date();today.setHours(0,0,0,0);const end=new Date(today);end.setHours(23,59,59,999);const hariIni=transactions.filter(t=>{const d=new Date(t.date);return d>=today&&d<=end});let ti=0,te=0;hariIni.forEach(t=>{if(t.type==='income')ti+=t.amount;else te+=t.amount});const w=getWarningMessage();return`Laporan Harian (${today.toLocaleDateString('id-ID')})\nPemasukan: ${formatRupiah(ti)}\nPengeluaran: ${formatRupiah(te)}\nSaldo: ${formatRupiah(ti-te)}${w}`}
function getLaporanBulanan(){const now=new Date();const start=new Date(now.getFullYear(),now.getMonth(),1);const end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);const bulanIni=transactions.filter(t=>{const d=new Date(t.date);return d>=start&&d<=end});let ti=0,te=0;bulanIni.forEach(t=>{if(t.type==='income')ti+=t.amount;else te+=t.amount});const w=getWarningMessage();return`Laporan Bulanan (${now.toLocaleDateString('id-ID',{month:'long',year:'numeric'})})\nPemasukan: ${formatRupiah(ti)}\nPengeluaran: ${formatRupiah(te)}\nSaldo: ${formatRupiah(ti-te)}${w}`}
function getHelpResponse(){return`Panduan Asisten Finance:\n\nCatat transaksi:\n• "beli ayam 25rb"\n• "dapat bonus 500rb"\n• "bayar listrik 150rb"\n\nLihat ringkasan:\n• "saldo" / "ringkasan"\n• "riwayat"\n• "laporan harian"\n• "laporan bulanan"\n\nEdit & Hapus:\nBuka tab Riwayat, tekan tombol edit atau hapus.\n\nEkspor:\nTekan "Ekspor PDF" di halaman Riwayat.`}

/* ========== CHAT RENDER ========== */
function renderChat(){
    const groups={};
    chatHistory.forEach(msg=>{
        const d=msg.timestamp;
        const today=new Date();today.setHours(0,0,0,0);
        const yest=new Date(today);yest.setDate(yest.getDate()-1);
        let key;
        if(d.toDateString()===today.toDateString())key='Hari ini';
        else if(d.toDateString()===yest.toDateString())key='Kemarin';
        else key=d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
        if(!groups[key])groups[key]=[];
        groups[key].push(msg);
    });
    let mh='';
    for(const[dl,msgs]of Object.entries(groups)){
        mh+=`<div class="date-separator"><span>${dl}</span></div>`;
        msgs.forEach((msg,i)=>{
            const isBot=msg.role==='bot';
            const av=isBot?`<div class="message-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Bot"></div>`:`<div class="message-avatar"><div class="default-avatar">👤</div></div>`;
            mh+=`<div class="message-row ${msg.role}" style="animation-delay:${i*0.04}s">${av}<div class="message-bubble-wrapper"><div class="message-bubble">${msg.text}</div><div class="message-time">${msg.timeStr}</div></div></div>`;
        });
    }
    const welcomeHtml=chatHistory.length===0?`<div class="date-separator"><span>Hari ini</span></div><div class="message-row bot"><div class="message-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Bot"></div><div class="message-bubble-wrapper"><div class="message-bubble">${getGreeting()}, <strong>${userName}</strong>!\n\nAsisten Finance siap membantu mencatat keuanganmu.\n\nCukup ketik seperti:\n• "beli ayam 25rb"\n• "dapat bonus 500rb"\n• "bayar listrik 150rb"\n\nKetik "bantuan" untuk panduan lengkap.\n\nDi tab Riwayat kamu bisa edit/hapus transaksi dan ekspor PDF.</div><div class="message-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div></div>`:'';
    document.getElementById('mainContent').innerHTML=`
        <div class="chat-area">
            <div class="chat-messages" id="chatMsgList">${welcomeHtml}${mh}</div>
            <div class="chat-input-wrapper">
                <input type="text" id="chatInputField" class="chat-input" placeholder="Ketik transaksi di sini..." autocomplete="off" aria-label="Ketik pesan">
                <button id="chatSendBtn" class="chat-send" aria-label="Kirim pesan">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>`;
    requestAnimationFrame(()=>{const md=document.getElementById('chatMsgList');if(md)md.scrollTop=md.scrollHeight});
    const inputField=document.getElementById('chatInputField');
    const sendBtn=document.getElementById('chatSendBtn');
    if(inputField)inputField.addEventListener('keypress',e=>{if(e.key==='Enter')sendChatMessage()});
    if(sendBtn)sendBtn.addEventListener('click',sendChatMessage);
}
function addChatMessage(role,text){const n=new Date();chatHistory.push({role,text,timestamp:n,timeStr:n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});if(chatHistory.length>200)chatHistory=chatHistory.slice(-150)}
function showTypingIndicator(){const list=document.getElementById('chatMsgList');if(!list)return;const ind=document.createElement('div');ind.className='typing-indicator';ind.id='typingIndicator';ind.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';list.appendChild(ind);list.scrollTop=list.scrollHeight}
function removeTypingIndicator(){const el=document.getElementById('typingIndicator');if(el)el.remove()}
function sendChatMessage(){
    const inp=document.getElementById('chatInputField');
    const msg=inp?inp.value.trim():'';
    if(!msg)return;
    inp.value='';
    addChatMessage('user',msg);
    renderChat();
    showTypingIndicator();
    setTimeout(()=>{
        removeTypingIndicator();
        const p=parseTransactionFromText(msg);
        let r='';
        if(!p){r='Maaf, aku tidak mengerti. Coba ketik:\n• "beli nasi 15rb"\n• "dapat gaji 5jt"\n• "saldo"\n• "bantuan"';addChatMessage('bot',r);renderChat();return}
        if(p.command==='greeting'){r=getGreetingResponse();addChatMessage('bot',r);renderChat();return}
        if(p.command==='help'){r=getHelpResponse();addChatMessage('bot',r);renderChat();return}
        if(p.command==='summary'){const s=getSummary();const w=getWarningMessage();r=`Ringkasan Keuangan ${userName}\nPemasukan: ${formatRupiah(s.income)}\nPengeluaran: ${formatRupiah(s.expense)}\nSaldo: ${formatRupiah(s.balance)}${w}`;addChatMessage('bot',r);renderChat();return}
        if(p.command==='history'){const l5=[...transactions].reverse().slice(0,5);if(!l5.length)r='Belum ada transaksi.';else r='5 Transaksi Terakhir:\n'+l5.map(t=>`${t.icon} ${t.desc}: ${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}`).join('\n');addChatMessage('bot',r);renderChat();return}
        if(p.command==='laporan_harian'){r=getLaporanHarian();addChatMessage('bot',r);renderChat();return}
        if(p.command==='laporan_bulanan'){r=getLaporanBulanan();addChatMessage('bot',r);renderChat();return}
        if(p.command==='add'){
            addTransactionFromChat(p);
            const s=getSummary();
            const w=(p.type==='expense')?getWarningMessage():'';
            r=`Tersimpan!\n${p.type==='income'?'+ Pemasukan':'- Pengeluaran'} ${formatRupiah(p.amount)} untuk ${p.desc}\nSaldo: ${formatRupiah(s.balance)}${w}`;
            addChatMessage('bot',r);
            renderChat();
            if(currentScreen==='dashboard')renderDashboard();
            if(currentScreen==='riwayat')renderRiwayat();
            return;
        }
        r='Format tidak dikenali. Ketik "bantuan" untuk panduan.';
        addChatMessage('bot',r);
        renderChat();
    },400+Math.random()*300);
}
function getGreetingResponse(){const h=new Date().getHours();let timeGreet=h<12?'pagi':h<15?'siang':h<19?'sore':'malam';return`🌤️ Selamat ${timeGreet}, ${userName}! Semoga harimu menyenangkan ✨\n\nAda yang bisa aku bantu catat?`}

/* ========== RIWAYAT ========== */
function renderRiwayat(){
    const s=getSummary();
    let filtered=[...transactions].reverse();
    if(riwayatFilter==='income')filtered=filtered.filter(t=>t.type==='income');
    else if(riwayatFilter==='expense')filtered=filtered.filter(t=>t.type==='expense');
    if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(t=>t.desc.toLowerCase().includes(q)||t.category.toLowerCase().includes(q))}
    let grouped={};
    filtered.forEach(t=>{
        const d=new Date(t.date);
        const key=reportView==='harian'
            ?d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})
            :d.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
        if(!grouped[key])grouped[key]={items:[],income:0,expense:0};
        grouped[key].items.push(t);
        if(t.type==='income')grouped[key].income+=t.amount;
        else grouped[key].expense+=t.amount;
    });
    let itemsHtml='';
    for(const[label,data]of Object.entries(grouped)){
        itemsHtml+=`<div class="group-header">${label}</div>`;
        itemsHtml+=`<div class="group-summary">+${formatRupiah(data.income)} / -${formatRupiah(data.expense)} = ${formatRupiah(data.income-data.expense)}</div>`;
        data.items.forEach(t=>{
            itemsHtml+=`<div class="transaction-item" data-id="${t.id}">
                <div class="transaction-icon">${t.icon}</div>
                <div class="transaction-detail">
                    <div class="transaction-name">${t.desc}</div>
                    <div class="transaction-meta">${getRelativeTime(t.date)} · ${catLabels[t.category]||t.category}</div>
                </div>
                <div class="transaction-amount ${t.type==='income'?'income-text':'expense-text'}">${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}</div>
                <div class="action-buttons">
                    <button class="act-btn edit-btn" data-action="edit" data-id="${t.id}" aria-label="Edit">${svgEdit}</button>
                    <button class="act-btn del-btn" data-action="delete" data-id="${t.id}" aria-label="Hapus">${svgDel}</button>
                </div>
            </div>`;
        });
    }
    if(!Object.keys(grouped).length)itemsHtml='<div class="empty-state"><div class="empty-icon">📋</div>Belum ada transaksi. Mulai chat untuk mencatat!</div>';
    const warning=getWarningMessage();
    const html=`
        <div class="stats-row" style="margin-bottom:12px">
            <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div>
            <div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div>
        </div>
        ${warning?`<div class="warning-banner">${warning.replace(/\n/g,'<br>')}</div>`:''}
        <div class="section-header">
            <div class="section-title">Laporan</div>
            <button class="btn-pdf" id="btnExportPdf">Ekspor PDF</button>
        </div>
        <div class="report-toggle">
            <button class="report-btn${reportView==='harian'?' active':''}" data-view="harian">Harian</button>
            <button class="report-btn${reportView==='bulanan'?' active':''}" data-view="bulanan">Bulanan</button>
        </div>
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInputField" placeholder="Cari transaksi..." value="${searchQuery}" aria-label="Cari transaksi">
        </div>
        <div class="filter-row">
            <button class="filter-btn${riwayatFilter==='semua'?' active':''}" data-filter="semua">Semua</button>
            <button class="filter-btn${riwayatFilter==='income'?' active':''}" data-filter="income">Pemasukan</button>
            <button class="filter-btn${riwayatFilter==='expense'?' active':''}" data-filter="expense">Pengeluaran</button>
        </div>
        <div class="tx-list" id="txListContainer">${itemsHtml}</div>`;
    document.getElementById('mainContent').innerHTML=html;
    document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{riwayatFilter=b.dataset.filter;renderRiwayat()}));
    document.querySelectorAll('.report-btn').forEach(b=>b.addEventListener('click',()=>{reportView=b.dataset.view;renderRiwayat()}));
    const searchInput=document.getElementById('searchInputField');
    if(searchInput){
        searchInput.addEventListener('input',e=>{searchQuery=e.target.value.trim();renderRiwayat();searchInput.focus()});
        if(searchQuery){const len=searchQuery.length;requestAnimationFrame(()=>{searchInput.setSelectionRange(len,len)})}
    }
    document.getElementById('btnExportPdf')?.addEventListener('click',exportToPDF);
    document.getElementById('txListContainer')?.addEventListener('click',e=>{
        const btn=e.target.closest('[data-action]');
        if(!btn)return;
        const id=parseInt(btn.dataset.id);
        if(btn.dataset.action==='edit')openEditById(id);
        else if(btn.dataset.action==='delete')deleteTransaction(id);
    });
}

/* ========== DASHBOARD ========== */
function renderDashboard(){
    const s=getSummary();
    const recent=transactions.slice(-3).reverse();
    let rh=recent.map(t=>`<div class="transaction-item" data-id="${t.id}">
        <div class="transaction-icon">${t.icon}</div>
        <div class="transaction-detail">
            <div class="transaction-name">${t.desc}</div>
            <div class="transaction-meta">${getRelativeTime(t.date)}</div>
        </div>
        <div class="transaction-amount ${t.type==='income'?'income-text':'expense-text'}">${t.type==='income'?'+':'-'}${formatRupiah(t.amount)}</div>
        <div class="action-buttons">
            <button class="act-btn edit-btn" data-action="edit" data-id="${t.id}" aria-label="Edit">${svgEdit}</button>
            <button class="act-btn del-btn" data-action="delete" data-id="${t.id}" aria-label="Hapus">${svgDel}</button>
        </div>
    </div>`).join('');
    const warning=getWarningMessage();
    const html=`
        <div class="greeting-box"><div class="greeting-text">${getGreeting()}, <span class="user-name">${userName}</span></div></div>
        ${warning?`<div class="warning-banner">${warning.replace(/\n/g,'<br>')}</div>`:''}
        <div class="card-balance">
            <div class="balance-label">Saldo Tersedia</div>
            <div class="balance-amount">${formatRupiah(s.balance)}</div>
            <div class="stats-row">
                <div class="stat-card"><div class="stat-label">Pemasukan</div><div class="stat-value">${formatShortRupiah(s.income)}</div></div>
                <div class="stat-card expense"><div class="stat-label">Pengeluaran</div><div class="stat-value">${formatShortRupiah(s.expense)}</div></div>
            </div>
        </div>
        <div class="section-header"><div class="section-title">Grafik Pengeluaran</div></div>
        <div class="chart-card">
            <div class="chart-wrapper"><canvas id="expenseChartCanvas"></canvas></div>
            <div id="legendContainer" class="legend-list"></div>
        </div>
        <div class="summary-card">
            <div class="section-title" style="margin-bottom:6px">Ringkasan</div>
            <div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div>
            <div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div>
            <div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div>
        </div>
        <div class="section-header"><div class="section-title">Transaksi Terbaru</div></div>
        <div class="tx-list" id="dashTxList">${rh||'<div class="empty-state"><div class="empty-icon">📭</div>Belum ada transaksi</div>'}</div>
        <div class="footer-badge">100% Offline · Edit/Hapus lewat tombol aksi</div>`;
    document.getElementById('mainContent').innerHTML=html;
    document.getElementById('dashTxList')?.addEventListener('click',e=>{
        const btn=e.target.closest('[data-action]');
        if(!btn)return;
        const id=parseInt(btn.dataset.id);
        if(btn.dataset.action==='edit')openEditById(id);
        else if(btn.dataset.action==='delete')deleteTransaction(id);
    });
    setTimeout(()=>{
        const ctx=document.getElementById('expenseChartCanvas')?.getContext('2d');
        if(!ctx)return;
        const exp=transactions.filter(t=>t.type==='expense');
        const ct={};exp.forEach(e=>{ct[e.category]=(ct[e.category]||0)+e.amount});
        const labels=Object.keys(ct),data=Object.values(ct);
        if(chartInstance)chartInstance.destroy();
        if(labels.length){
            chartInstance=new Chart(ctx,{
                type:'doughnut',
                data:{labels,datasets:[{data,backgroundColor:chartColors.slice(0,labels.length),borderWidth:0,hoverOffset:6}]},
                options:{responsive:true,maintainAspectRatio:true,cutout:'70%',animation:{animateRotate:true,duration:800},plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--card-solid)',titleColor:'var(--fg)',bodyColor:'var(--muted)',borderColor:'var(--border)',borderWidth:1,padding:10,cornerRadius:10}}}
            });
            document.getElementById('legendContainer').innerHTML=labels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${chartColors[i%chartColors.length]}"></div>${catLabels[l]||l} ${formatShortRupiah(data[i])}</div>`).join('');
        }else{
            document.getElementById('legendContainer').innerHTML='<div style="color:var(--muted);font-size:10px">Belum ada pengeluaran</div>';
        }
    },80);
}

/* ========== PROFIL ========== */
function renderProfil(){
    const s=getSummary(),total=transactions.length,ic=transactions.filter(t=>t.type==='income').length,ec=total-ic;
    const html=`
        <div class="profile-card">
            <div class="profile-avatar"><img src="https://i.imgur.com/cbPGl9R.jpeg" alt="Avatar"></div>
            <div class="profile-name"><span>Asisten</span> <span class="keuangan">Keuangan</span></div>
            <div class="profile-email">pengguna@finansbot.id</div>
            <div class="name-input-group">
                <input type="text" id="editNameInput" class="name-input" placeholder="Nama panggilan" value="${userName}" maxlength="20" aria-label="Nama panggilan">
                <button id="saveNameBtn" class="name-save-btn">Simpan</button>
            </div>
            <div class="stats-row" style="margin-top:14px">
                <div class="stat-card"><div class="stat-label">Transaksi</div><div class="stat-value">${total}</div></div>
                <div class="stat-card"><div class="stat-label">Masuk</div><div class="stat-value" style="color:var(--accent)">${ic}</div></div>
                <div class="stat-card expense"><div class="stat-label">Keluar</div><div class="stat-value" style="color:var(--danger)">${ec}</div></div>
            </div>
        </div>
        <div class="summary-card" style="margin-top:12px">
            <div class="section-title" style="margin-bottom:6px">Ringkasan</div>
            <div class="summary-row"><span>Total Pemasukan</span><span class="green">${formatRupiah(s.income)}</span></div>
            <div class="summary-row"><span>Total Pengeluaran</span><span class="red">${formatRupiah(s.expense)}</span></div>
            <div class="summary-row"><span>Saldo Akhir</span><span class="green">${formatRupiah(s.balance)}</span></div>
        </div>
        <button id="exportJsonBtn" class="btn-secondary">Ekspor ke JSON</button>
        <button id="resetDataBtn" class="btn-danger">Hapus Semua Data</button>
        <button id="logoutBtn" class="btn-logout">Logout</button>`;
    document.getElementById('mainContent').innerHTML=html;
    document.getElementById('saveNameBtn')?.addEventListener('click',()=>{
        const n=document.getElementById('editNameInput').value.trim();
        if(n){userName=n;saveToLocal();showToast('Nama diperbarui');renderProfil()}else showToast('Nama tidak boleh kosong',true);
    });
    document.getElementById('resetDataBtn')?.addEventListener('click',()=>{
        showConfirm('Hapus Semua Data?','Semua transaksi akan dihapus permanen dan tidak bisa dikembalikan.',()=>{
            transactions=[];chatHistory=[];saveToLocal();showToast('Data dihapus');renderProfil();
        });
    });
    document.getElementById('exportJsonBtn')?.addEventListener('click',()=>{
        const b=new Blob([JSON.stringify(transactions,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(b);
        a.download=`finansbot_${new Date().toISOString().slice(0,10)}.json`;
        a.click();URL.revokeObjectURL(a.href);showToast('Data diekspor');
    });
    document.getElementById('logoutBtn')?.addEventListener('click',logout);
}

/* ========== NAVIGASI ========== */
function switchScreen(screen){
    currentScreen=screen;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.nav-item[data-nav="${screen}"]`)?.classList.add('active');
    if(screen==='chat')renderChat();
    else if(screen==='dashboard')renderDashboard();
    else if(screen==='riwayat')renderRiwayat();
    else if(screen==='profil')renderProfil();
}

/* ========== TEMA TERANG/GELAP ========== */
function initTheme(){
    const savedTheme = localStorage.getItem('finansbot_theme');
    if(savedTheme === 'light'){
        document.body.classList.add('light');
        document.getElementById('themeColorMeta')?.setAttribute('content', '#f0f4f8');
    } else {
        document.body.classList.remove('light');
        document.getElementById('themeColorMeta')?.setAttribute('content', '#03060c');
    }
}
function toggleTheme(){
    if(document.body.classList.contains('light')){
        document.body.classList.remove('light');
        localStorage.setItem('finansbot_theme', 'dark');
        document.getElementById('themeColorMeta')?.setAttribute('content', '#03060c');
    } else {
        document.body.classList.add('light');
        localStorage.setItem('finansbot_theme', 'light');
        document.getElementById('themeColorMeta')?.setAttribute('content', '#f0f4f8');
    }
    // Refresh chart jika dashboard sedang aktif
    if(currentScreen === 'dashboard') renderDashboard();
}
document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
initTheme();

/* ========== AUTENTIKASI ========== */
function login(pwd){
    if(pwd==='abc123'){
        isLoggedIn=true;
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('mainApp').style.display='flex';
        switchScreen('chat');
        showToast(`${getGreeting()}, ${userName}!`);
    }else{
        const err=document.getElementById('loginError');
        err.style.display='block';
        setTimeout(()=>err.style.display='none',2500);
    }
}
function logout(){
    isLoggedIn=false;chatHistory=[];
    document.getElementById('mainApp').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('passwordInput').value='';
    showToast('Logout berhasil',true);
}
document.getElementById('loginBtn').addEventListener('click',()=>login(document.getElementById('passwordInput').value));
document.getElementById('passwordInput').addEventListener('keypress',e=>{if(e.key==='Enter')login(e.target.value)});
document.querySelectorAll('.nav-item').forEach(nav=>nav.addEventListener('click',()=>{if(isLoggedIn)switchScreen(nav.dataset.nav)}));
document.querySelectorAll('.modal-overlay').forEach(overlay=>{overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('show')})});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));}});
</script>
